<title>神圣家族，或对批判的批判所做的批判</title>

<body>
<p>再对这一发展本身进行评论，那是因为我们所阐述的对象的本性使我们完全有理由这样做。</p>
<p>更确切地说，是批判的批判使我们不得不用现已达到的成果本身来批驳它。</p>
<p>因此，我们先发表这部论战性的著作，然后再写几部独立的著作，在那些著作里，我们——当然是各自单独地——将正面阐述自己的观点，从而也正面阐述自己对现代哲学学说和社会学说的态度。</p>
<p align="right">恩格斯 马克思</p>
<p align="right">1844年9月于巴黎</p>
