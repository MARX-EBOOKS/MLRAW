<p style="text-indent: 0;">的救世主终于显化为<b>批判的救世主鲍威尔先生</b>了。</p>
<p>鲍威尔先生的最后阶段并不是他发展中的反常现象，这个阶段是他的发展从<b>外化</b>向<b>自身的返回</b>。不言而喻，<b>神的批判</b>使自己<b>外化</b>并超出自身范围的那一瞬间，是与它部分地背弃自己而创造<b>某种人的东西</b>的那一瞬间相吻合的。</p>
<p><b>绝对的批判</b>返回到自己的出发点以后，就结束了<b>思辨的循环</b>，从而也结束了自己的<b>生涯</b>。它的往后的运动是纯粹的——<b>超越一切群众利益的自己体内的循环</b>，因此，群众对它已丝毫不感兴趣了。</p>
