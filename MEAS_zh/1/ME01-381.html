<p>么多代表的德国人和法国人，将以自己的进一步的成绩来鼓舞英国人的奋斗精神。人们在不久的将来会发现，新议会奈何不得格莱斯顿先生，格莱斯顿先生也奈何不得新议会；到那时，英国的工人政党将会完善地组织起来，足以很快地结束那两个轮流执政并以这种方式使资产阶级统治永存的旧政党的跷跷板游戏。</p>
<p align="right">弗·恩格斯<br>1892 年 7 月 21 日于伦敦</p>
