<title>英国工人阶级状况</title>

<body>
<p>育的。我确信，你们不仅仅是<b>英国人</b>，不仅仅是单个的、孤立的民族的成员；我确信，你们是认识到自己的利益和全人类的利益相一致的人，是伟大的人类大家庭的成员。对你们作为这样的人，作为这个“统一而不可分的”人类<b>家庭</b>的成员，作为真正符合人这个词的含义的人，我以及大陆上其他许多人祝贺你们在各方面的进步，并希望你们很快获得成功。</p>
<p>继续像以前那样前进吧！你们还将经受许多历练；要坚定，要勇敢，你们必定会获得成功，你们前进中的每一步都将为我们共同的事业，人类的事业所共有！</p>
<p align="right">弗里德里希·恩格斯</p>
<p align="right">1845年3月15日于巴门(莱茵普鲁士)</p>
