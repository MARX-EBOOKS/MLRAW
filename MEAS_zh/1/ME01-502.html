<p align="center">九</p>
<p>直观的唯物主义，即不是把感性理解为实践活动的唯物主义，至多也只能达到对单个人和市民社会<sup>[11]</sup>的直观。</p>
<p align="center">十</p>
<p>旧唯物主义的立脚点是市民社会，新唯物主义的立脚点则是人类社会或社会的人类。</p>
<p align="center">十一</p>
<p>哲学家们只是用不同的方式<b>解释</b>世界，问题在于<b>改变</b>世界。</p>
