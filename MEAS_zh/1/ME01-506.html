<p>东西，都能在人的实践中以及对这种实践的理解中得到合理的解决。</p>
<p align="center">九</p>
<p><b>直观的唯物主义</b>，即不是把感性理解为实践活动的唯物主义，至多也只能做到对“市民社会”中的单个人的直观。</p>
<p align="center">十</p>
<p><b>旧唯物主义</b>的立脚点是“市民”社会；新唯物主义的立脚点则是人类社会或社会化的人类。</p>
<p align="center">十一</p>
<p><b>哲学家们</b>只是用不同的方式解释世界，而问题在于改变世界。</p>
