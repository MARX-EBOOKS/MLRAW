<p style="text-indent: 0;">个运动是在现实的党派利益之外产生的，而且在共产主义党派形成以后还想不顾它而继续存在。不言而喻，从名副其实的共产主义党派在德国产生的时候起，“真正的社会主义者”必将越来越局限于把小资产者作为自己的公众，并把那些委靡和堕落的著作家作为这些公众的代表。</p>
