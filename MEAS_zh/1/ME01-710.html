<title>雇佣劳动与资本</title>
</head>
<body>
<p style="text-indent: 0;">划地利用和进一步发展一切社会成员的现有的巨大生产力，在人人都必须劳动的条件下，人人也都将同等地、愈益丰富地得到生活资料、享受资料、发展和表现一切体力和智力所需的资料。现在工人们正日益坚决地为实现这个新的社会制度而斗争，这一点，明天（5月1日）和星期日（5月3日）<sup>[239]</sup>将在大洋两岸都得到验证。</p>
<p align="right">弗里德里希·恩格斯<br>1891年4月30日于伦敦</p>
