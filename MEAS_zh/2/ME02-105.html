<title>1848年的六月失败</title>
</head>
<body>
<p>最后，神圣同盟<sup><a id="ZF60" href="#F60">60</a></sup>的胜利使欧洲的局面发生了变化，只要法国发生任何一次新的无产阶级起义，都必然会引起<b>世界战争</b>。新的法国革命将被迫立刻越出本国范围去<b>夺取欧洲的地区</b>，因为只有在这里才能够实现19世纪的社会革命。</p>
<p>总之，只有六月失败才造成了所有那些使法国能够发挥欧洲革命<b>首倡作用</b>的条件。只有浸过了六月起义者的<b>鲜血</b>之后，三色旗才变成了欧洲革命的旗帜——<b>红旗</b>！<sup><a id="ZF66" href="#F66">66</a></sup></p>
<p>因此我们高呼：<b>革命死了！</b>——<b>革命万岁！</b></p>
</body>
