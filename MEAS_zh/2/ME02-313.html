<p style="text-indent: 0;">是在洽谈过程中，他竟死于刺客之手。只要盖斯迈尔还活着，斐迪南大公和萨尔茨堡大主教<sup><a id="ZF1" href="#F1">1</a></sup>就不得安宁。他们收买了一个匪徒，这个匪徒于 1527 年杀害了这位危险的造反者。<sup><a id="ZF2" href="#F2">2</a></sup></p>
