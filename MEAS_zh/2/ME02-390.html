<title>德国的革命和反革命</title>
</head>
<body>
<p>一般来说不那么厉害。可是由于上述种种原因，这里的资产阶级立即转而反对自己最早的、最不可少的同盟者——农民。同资产者一样被所谓对私有财产的侵犯吓坏了的民主派，也不再支持农民；这样，在三个月的解放之后，在流血冲突和军事屠杀（尤其是在西里西亚）之后，封建制度便通过昨天还在反封建的资产阶级之手恢复了。再没有比这更可耻的事实可以用来谴责他们了。历史上从来没有任何一个党派这样出卖自己最好的同盟者，出卖自己。不管这个资产阶级党后来遭到怎样的侮辱与惩罚，单单由于它的这一种行为，它也完全是罪有应得。</p>
<p align="right">1851年10月于伦敦</p>
