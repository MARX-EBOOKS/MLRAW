<p style="text-indent: 0;">个事实就足以证明，这个机构不过是一个由一群轻信的笨伯组成的辩论俱乐部。他们让各邦政府把自己当做议会傀儡，登场演戏，使各小邦和小城市的小店主和小手工业者开心，因为政府认为暂时有必要转移一下这一部分人的视线。这种做法需要保持多久，我们很快就可以看到。但一个值得注意的事实是：在这个议会的所有的“卓越”人物中，任何一个人都丝毫没有感觉到人家要他扮演的是什么角色，甚至直到今天，法兰克福俱乐部的旧日的成员们也还原封未动地保留着他们所特有的历史感觉器官。</p>
<p align="right">1852年3月于伦敦</p>
