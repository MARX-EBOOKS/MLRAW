<title>1869年第二版序言</title>
</head>
<body>
<p>的舞台台柱。人们忘记了西斯蒙第所说的一句名言：罗马的无产阶级依靠社会过活，现代社会则依靠无产阶级过活。<sup>[28]</sup>由于古代阶级斗争同现代阶级斗争在物质经济条件方面存在这样的根本区别，由这种斗争所产生的政治怪物之间的共同点也就不可能比坎特伯雷大主教与最高祭司撒母耳之间的共同点更多。</p>
<p align="right">卡尔·马克思<br>1869年6月23日于伦敦</p>
