<p>有事变的性质时，我才较为详细地予以论述。不过这里还应该指出，国民议会在一个相当长的时期内退出舞台，只留下路易·波拿巴这一个——虽然是可怜的——人物在众目睽睽之下占据共和国首脑的地位，国民议会的这种举动是失策的，而这时秩序党却分解为保皇派的各个构成部分，发泄其彼此敌对的复辟欲望，使公众为之哗然。每当这种休会期间议会的喧闹声趋于沉寂而议会的身体消融到国民里去的时候，就显然可以看出，这个共和国为要显出自己的真面目来，只缺少一件东西——<b>使议会的休会继续不断</b>，并把共和国的“自由，平等，博爱”这句格言代以毫不含糊的“<b>步兵，骑兵，炮兵！</b>”</p>
