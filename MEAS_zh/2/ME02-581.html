<title>在《人民报》创刊纪念会上的演说</title>
</head>
<body>
<p style="text-indent: 0;">级的罪行，在中世纪的德国曾有过一种叫做“菲默法庭”<sup>[344]</sup>的秘密法庭。如果某一所房子画上了一个红十字，大家就知道，这所房子的主人受到了“菲默法庭”的判决。现在，欧洲所有的房子都画上了神秘的红十字。历史本身就是审判官，而无产阶级就是执刑者。</p>
