<p style="text-indent: 0;">新出丑。在这个时候，我们党却因为重新得到了几分宁静从事研究工作而高兴。我们党有个很大的优点，就是有一个新的科学的世界观作为理论的基础，制定这个世界观就已经够忙了；单是这一点，我们党就决不可能堕落到像流亡中的“大人物”<sup><a id="ZF1" href="#F1">1</a></sup>那样深的程度。</p>
