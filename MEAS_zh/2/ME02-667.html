<p>尽的报告到达以前，关于战争问题暂不作决定。这样一来，迫在眉睫的问题就得以延缓。然而帕麦斯顿的真正意图，却通过他的痞棍报刊《每日电讯》透露出来，该报最近有一期上说：</p>
<blockquote>
<p>“如果明年有任何事件导致不利于政府的表决，肯定必将诉诸选民……下院将用一项关于中国问题的决定来检验一下那些人活动的结果，因为必须看到，在以迪斯累里先生为首的职业恶棍之外，还有一批宣称道理完全在蒙古人一边的世界主义者呢。”</p>
</blockquote>
<p>托利党人<sup>[55]</sup>由于自己上当而陷入替帕麦斯顿所策划、由他的两个代理人额尔金勋爵和普鲁斯先生（额尔金勋爵之弟）干出的事负责的窘境，这一情况我可能将另找机会加以评论。<sup>[400]</sup></p>
