<p>正是这种农业与手工业的结合，过去长期阻挡了而且现时仍然妨碍着英国商品输往东印度。但在东印度，那种农业与手工业的结合是以一种特殊的土地所有制为基础的。而英国人凭着自己作为当地最高地主的地位，能够破坏这种土地所有制，从而强使一部分印度自给自足的公社变成纯粹的农场，生产鸦片、棉花、靛青、大麻之类的原料来和英国货交换。在中国，英国人还没有能够行使这种权力，将来也未必能做到这一点。</p>
