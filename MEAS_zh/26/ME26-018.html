<title>三个版本的序言</title>
</head>
<body>
<p style="text-indent: 0;">马克思说明配第、诺思、洛克、休谟等人在古典经济学产生过程中所应占的地位的那些部分，尽可能完全地并逐字逐句地发表出来；而他对魁奈的《经济表》<sup>[19]</sup>所作的解释就更是如此了，这个表对整个现代经济学来说，仍然是不可解的斯芬克斯之谜。相反，凡是专门涉及杜林先生著作的地方，只要不影响上下文的联系，我都把它删掉了。</p>
<p>最后，我感到十分满意的是，自从第二版以来，本书所主张的观点已经深入科学界和工人阶级的公众意识，而且是在世界上一切文明国家里。</p>
<p align="right">弗·恩格斯<br>
1894 年 5 月 23 日于伦敦</p>
</body>
