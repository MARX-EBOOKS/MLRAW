<title>反杜林论 引论</title>
</head>
<body>
<p>杜林先生稍稍有点教养的话，他在谩骂时就不会把任何东西都看做是卑劣的和无礼的——是否也是最后的终极的真理。将来，尤其是现在，我们要留神，丝毫不要怀疑这些谩骂的深厚根底，因为不然，也许我们甚至要被禁止去挑选我们所应属的白痴的范畴。我们认为我们的责任只是在于，一方面举例说明杜林先生所谓</p>
<blockquote>
<p>“讲究措辞的谨慎而又真正谦虚的表达方法”；</p>
</blockquote>
<p>另一方面确认：在杜林先生那里，他的先驱者的一无是处，正像他自己的没有谬误一样，是肯定无疑的。如果一切确实是这样，那么，我们就得在这位一切时代最伟大的天才面前诚惶诚恐，毕恭毕敬。</p>
