<p style="text-indent: 0;">和劳动的一切稍微合理的东西，同样是对马克思的庸俗化了的剽窃。在《教程》中，作者把“大土地占有者”放在文明民族的历史的开端，而对于真正是全部历史出发点的氏族公社和农村公社的土地公有制则一无所知——这种在今天看来几乎是难以理解的无知，几乎又被《批判史》中以“历史眼光的广博远大”自诩的无知所超越，关于这种无知，我们在上面只举出几个惊人的例子。一句话：最初为自我吹嘘、大吹大擂、许下一个胜似一个的诺言付出了巨大的“耗费”，而后来的“成果”却等于零。</p>
