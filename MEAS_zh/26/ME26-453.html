<p>　　<b>三、无产阶级革命，矛盾的解决：</b>无产阶级将取得公共权力，并且利用这个权力把脱离资产阶级掌握的社会化生产资料变为公共财产。通过这个行动，无产阶级使生产资料摆脱了它们迄今具有的资本属性，使它们的社会性质有充分的自由得以实现。从此按照预定计划进行的社会生产就成为可能的了。生产的发展使不同社会阶级的继续存在成为时代错乱。随着社会生产的无政府状态的消失，国家的政治权威也将消失。人终于成为自己的社会结合的主人，从而也就成为自然界的主人，成为自身的主人——自由的人。[参看《马克思恩格斯全集》中文第 2 版第 25 卷第 413—414 页]</p>
