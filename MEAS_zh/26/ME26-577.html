<p>在人类历史中，黑格尔承认无限的进展过程是“精神”的唯一真实的存在形式，只不过他以幻想的方式设想这个发展有一个终点——这个终点就是黑格尔哲学的确立。</p>
<p>3. 还有无限的认识：事物在进展中所没有的无限，在循环中却有了<sup>[260]</sup>（量，第 259 页，天文学）<sup>[261]</sup>。这样，运动形式变换的规律便是无限的、自我闭合的规律。但是这样的无限性又被有限性所纠缠，只是一段段地出现的。<sup>1</sup>/<sub>r<sup>2</sup></sub> 也是如此。<sup>[262]</sup></p>
