<p style="text-indent: 0;">生矛盾了。</p>
<p>关于力的观念甚至在亥姆霍兹这样的物理学家那里都引起了这样的概念混乱，这就最好不过地证明，它在计算力学范围以外的任何研究部门中，在科学上都是不适用的。在力学中，运动的原因被当做已知的，人们关心的不是运动的起源，而只是运动的作用。因此，如果有人把某种运动的原因称做某种力，这丝毫无损于力学本身；但是人们习惯于把这个名称也搬到物理学、化学和生物学中去，这样一来混乱就不可避免了。这一点我们已经看到而且还会常常看到。</p>
<p>关于功的概念，我们在下一章中再谈。</p>
