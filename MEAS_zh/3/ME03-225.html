<title>关于工人阶级的政治行动</title>
</head>
<body>
<p>成为一个独立的政党，它有自己的目的和自己的政治。</p>
<p>政治自由、集会结社的权利和新闻出版自由是我们的武器；如果有人想从我们手里夺走这些武器，难道我们能够置之不理和放弃政治吗？有人说，进行任何政治行动都意味着承认现状。但是，既然这种现状为我们提供了反对它的手段，那么利用这些手段就是不承认现状。</p>
<div class="src">
弗·恩格斯记录于1871年9月21日<br>
