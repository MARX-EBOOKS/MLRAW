<title>流亡者文献</title>

<p>战争得手，为此需要有金钱和可靠的同盟者，或者是过早的起义尝试把有产阶级再次赶入政府的怀抱。</p>
<p align="right">弗·恩格斯</p>
<div class="src">
弗·恩格斯写于1874年5月中—1875年4月<br>
载于1874年6月17和26日，10月6和8日《人民国家报》第69、73、117和118号；1875年3月28日，4月2、16、18和21日《人民国家报》第36、37、43、44和45号
