<title>巴枯宁《国家制度和无政府状态》一书摘要</title>
</head>
<body>
<p><b>“通过同他们的论战〈这场论战显然早在我反对蒲鲁东的那本书和《共产主义宣言》问世以前，甚至早在圣西门以前，就已经进行了：好一个逆序法！〉，我们使他们认识到，自由或者无政府状态〈巴枯宁先生仅仅是把蒲鲁东和施蒂纳的无政府状态翻译成野蛮的鞑靼语罢了〉，即工人群众自下而上的自由组织〈胡说八道！〉，是社会发展的最终目的，而任何‘国家’，人民国家也不例外，都是一种羁绊，它一方面产生专制，另一方面产生奴役”（第280页）。</b></p>

<div class="src">
卡·马克思写于1874—1875年初<br>
第一次发表于1926年《马克思主义年鉴》杂志第2期
</div>
