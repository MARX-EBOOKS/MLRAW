<title>给奥·倍倍尔的信</title>
</head>
<body>
<p>告诉我们(而朗姆和其他人以为他已经详细地通知我们了)。虽说他从来就是这样做的——因此,我们,马克思和我,同他进行了多次不愉快的通信——,而这一次做得实在太不像话了,<b>我们坚决不和他一起走</b>。</p>
<p>希望您设法夏天到这里来,当然您将住在我这里,如果天气好,我们可以去洗几天海水浴,这对于过了很久牢狱生活的您一定颇有裨益。</p>
<p>致友好的问候。</p>
<p align="right">您的 弗·恩·</p>
<p>马克思刚刚搬了家。他的住址是:伦敦西北区梅特兰公园月牙街41号。</p>
<div class="src">
弗·恩格斯写于1875年3月18—28日<br>
第一次发表于奥·倍倍尔《我的一生》1911年斯图加特版第2卷
</div>
