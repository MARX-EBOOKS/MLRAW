<p>会均等，他们根据土壤的自然差别和经济差别把土地分成一定数量的地段，然后按农民的人数把这些比较大的地段再分成小块。然后，每一个人在每一地段中得到一份土地。这种直到今天还在俄国公社里实行的做法，毫无疑问是和农艺学的要求相矛盾的。除其他种种不便外，这种做法也造成人力和时间的浪费。可是，这种做法虽然乍看起来似乎和集体耕种相矛盾，但它的确有助于向集体耕种的过渡。小块土地……<sup><a id="ZF1" href="#F1">1</a></sup></p>
