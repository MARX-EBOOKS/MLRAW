<p style="text-indent: 0;">昂，有500人遭到逮捕，借口就是他们是国际会员。国际是让人害怕的。若贝尔伯爵——一具干巴的木乃伊，一位1834年的大臣，一个以支持对新闻出版采取严厉措施而闻名的人物——前几天在法国国民议会发表演说时曾说，在恢复秩序以后，政府的首要任务应该是追查国际的活动并加以取缔。</p>
