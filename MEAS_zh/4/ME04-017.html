<title>1884年第一版序言</title>
</head>
<body>
<p>不多只是第二手的材料，而关于德意志人的材料——除了塔西佗以外——还只是弗里曼先生的不高明的自由主义的赝品<sup><a id="ZF1" href="#F1">1</a></sup>。经济方面的论证，对摩尔根的目的来说已经很充分了，对我的目的来说就完全不够，所以我把它全部重新改写过了。最后，凡是没有明确引证摩尔根而作出的结论，当然都由我来负责。</p>
<div class="src">
弗·恩格斯写于1884年3月底—5月26日<br>
载于1884年在苏黎世出版的《家庭、私有制和国家的起源》一书
