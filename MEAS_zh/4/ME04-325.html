<p>同我们一起工作的各国社会主义者40多年来所遵循的策略。结果是这个策略到处都把我们引向胜利，目前欧洲广大的社会主义者，在德国和法国，在比利时、荷兰和瑞士，在丹麦和瑞典，以及在西班牙和葡萄牙，就像一支统一的<sup><a id="ZF1" href="#F1">①</a></sup>军队在同一的旗帜下战斗着。</p>
<p align="right">弗里德里希·恩格斯</p>
<p align="right">1887年1月26日于伦敦</p>
