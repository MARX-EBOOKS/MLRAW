<body>
<p>跳最后的大战舞，那我们只能听其自然。战争可能会把我们暂时抛到次要地位，可能会夺走一些我们已经占领的阵地。但是，如果你们放纵你们以后将无法对付的力量，那么不管那时情况如何，在悲剧结束时你们也就垮台了，而无产阶级的胜利要么已经取得，要么已经不可避免。</p>
<p align="right">弗里德里希·恩格斯<br>
1887年12月15日于伦敦</p>
