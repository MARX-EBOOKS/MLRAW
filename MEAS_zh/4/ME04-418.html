<p>（8）和（9）这里我提请你们考虑：这两条要求对 1.<b>律师</b>，2.<b>医师</b>，3.<b>药剂师、牙医、助产士、看护</b>等等实行国有化，后面还要求对工人的保险事业实行完全国有化。是否能把这一切都托付给卡普里维先生呢？而这是否和前面所宣称的拒绝一切国家社会主义相一致呢？</p>
<p>（10）这里，我会这样说：“为了支付国家、专区和市镇的一切靠征税支付的开支，征收累进的……税。取消国家和地方的一切间接税、关税等。”其他都是多余的，都是起削弱作用的解释或论证。</p>
