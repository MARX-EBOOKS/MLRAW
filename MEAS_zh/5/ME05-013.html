<p>且经常处于变化过程中的有机体。</p>
<p>这部著作的第二卷将探讨资本的流通过程（第二册）和总过程的各种形式（第三册），第三卷即最后一卷（第四册）将探讨理论史。<sup>[12]</sup></p>
<p>任何的科学批评的意见我都是欢迎的。而对于我从来就不让步的所谓舆论的偏见，我仍然遵守伟大的佛罗伦萨人的格言：</p>
<blockquote>
<p>走你的路，让人们去说罢！<sup>[13]</sup></p>
</blockquote>
<p align="right">卡尔·马克思<br>1867 年 7 月 25 日于伦敦</p>
