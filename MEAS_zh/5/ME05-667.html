<title>第二十一章 简单再生产</title>
</head>
<body>
<p align="center">生产资本关系本身：一方面是资本家，另一方面是雇佣工人。<sup><a id="ZM20" href="#M20">(20)</a></sup></p>
<aside>
<p><a id="M20" href="#ZM20">(20)</a> “资本以雇佣劳动为前提，而雇佣劳动又以资本为前提。两者相互制约；两者相互产生。一个棉纺织厂的工人是不是只生产棉织品呢？不是，他生产资本。他生产重新供人利用去支配他的劳动并通过他的劳动创造新价值的价值。”（卡尔·马克思《雇佣劳动与资本》，载于《新莱茵报》1849年4月7日第266号）</p>
<p>用这个标题在《新莱茵报》上发表的文章，是1847年我在布鲁塞尔德意志工人协会<sup>[406]</sup>就这个题目发表的演说的一部分，文章的登载由于二月革命而中断。</p>
</aside>
</body>
</html>
