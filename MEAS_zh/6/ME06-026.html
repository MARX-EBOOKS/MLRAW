<h1>第二版序言<sup><a id="ZF1" href="#F1">①</a></sup></h1>
<p style="text-indent: 2em;">这里印出的第二版，基本上是按第一版原样翻印的。印刷错误改正了，若干文体上不讲究的地方纠正了，若干短的、内容重复的段落删掉了。</p>
<p style="text-indent: 2em;">第三册虽然遇到完全料想不到的困难，但手稿现在也已大体整理就绪。只要我还健康，今年秋天就可以开始付印。</p>
<p align="right">弗·恩格斯</p>
<p align="right">1893 年 7 月 15 日于伦敦</p>
<p style="text-indent: 2em;">为了便于查阅，这里把所有采自第 II—VIII 稿的地方，简单综合如下：</p>
<p align="center"><b>第一篇</b></p>
<p style="text-indent: 2em;">第 31—32 页采自第 II 稿。——第 32—44 页采自第 VII 稿。——第 44—48 页采自第 VI 稿。——第 48—134 页采自第 V</p>
<aside>
<p><a id="F1" href="#ZF1">①</a> 标题是德文版编者加的。——编者注</p>
</aside>
</body>
