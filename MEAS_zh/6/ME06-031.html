<h1>第一篇<br>资本形态变化及其循环</h1>
<h2>第一章<br>货币资本的循环</h2>
<p>资本的循环过程<sup><a id="ZM1" href="#M1">(1)</a></sup>经过三个阶段；根据第一卷的叙述，这些阶段形成如下的序列：</p>
<p><b>第一阶段</b>：资本家作为买者出现于商品市场和劳动市场；他的货币转化为商品，或者说，经历 G—W 这个流通行为。</p>
<p><b>第二阶段</b>：资本家用购买的商品从事生产消费。他作为资本主义商品生产者进行活动；他的资本经历生产过程。结果产生了一种商品，这种商品的价值大于它的生产要素的价值。</p>
<p><b>第三阶段</b>：资本家作为卖者回到市场；他的商品转化为货币，或者说，经历 W—G 这个流通行为。</p>
