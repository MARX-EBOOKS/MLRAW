<title>第三章 商品资本的循环</title>
</head>
<body>
<p style="text-indent: 0;">产品的待资本化的部分已经包含追加生产资本的物质要素时才能进行；因而也表明，既然一年的生产是下年的生产的前提，或者说，既然规模扩大的再生产能够在一年之内和简单的再生产过程同时进行，所以剩余产品就立即在那种能使它作为追加资本执行职能的形式上被生产出来。提高了的生产率只能增加资本物质，而不增大资本价值；但以此它也就为价值增殖形成追加的材料。</p>
<p>W'...W'是魁奈《经济表》的基础。他选用这个形式，而不选用 P...P 形式，来和 G...G'（重商主义体系孤立地坚持的形式）相对立，这就显示出他的伟大的正确的见识。</p>
