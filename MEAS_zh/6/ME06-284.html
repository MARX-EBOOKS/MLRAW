<body>
<p>我们在下一章会看到：另一些情况——不管它们发生在生产过程还是流通过程——怎样使预付资本的一定部分必须以货币形式存在。但是应该指出，经济学家们总爱忘记，企业所需资本的一部分不仅不断交替地通过货币资本、生产资本和商品资本这三种形式，而且这一资本的不同部分不断地同时分担这三种形式，尽管这些部分的相对量是不断变化的。经济学家们爱忘记的，特别是不断作为货币资本存在的部分，虽然正是这种情况对理解资产阶级的经济十分必要，因而这种情况本身在实践中也是很重要的。</p>
