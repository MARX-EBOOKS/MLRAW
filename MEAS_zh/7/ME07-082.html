<body>
<p>3. 剩余价值率不等，资本的百分比构成也不等。这时，利润率之比，等于 m'v 的乘积即按总资本的百分比计算的剩余价值量之比。<sup><a id="ZM10" href="#M10">(10)</a></sup></p>
<aside>
<p><a id="M10" href="#ZM10">(10)</a> 在手稿中，关于剩余价值率和利润率的差数(m'-p')，还可以看到各种极为详细的计算。这种差数具有各式各样的有趣的特色，它的运动显示出这两个比率相距越来越远或越来越近的各种情况。这些运动还可以用曲线来表示。我没有把这个资料编入，因为它对本书的直接目的不怎么重要，对那些想进一步研究这个问题的读者来说，简单地指出这一点也就够了。——弗·恩·</p>
</aside>
