<title>第二篇 利润转化为平均利润</title>
</head>
<body>
<p>从本册第一篇可以得出，不同的生产部门，不管资本的有机构成如何不同，只要为生产产品所预付的资本部分相等，其产品的成本价格总是相等的。对资本家来说，在成本价格上，可变资本和不变资本的区别消失了。资本家为了生产一种商品，必须支出 100 镑，不管他的支出是 90c + 10v 还是 10c + 90v，这种商品总是耗费一样多。对他来说，商品总是要耗费 100 镑，不多也不少。不管所生产的价值和剩余价值多么不同，成本价格对投在不同部门的等量资本来说总是一样的。成本价格的这种等同性，形成各个投资竞争的基础，而平均利润就是通过这种竞争确定的。</p>
</body>
