<p style="text-indent: 0;">是对这一发展的<b>限制</b>的不断扬弃，这种限制被意识到是限制，而不是被当做<b>神圣的界限</b>。个人的全面性不是想象的或设想的全面性，而是他的现实联系和观念联系的全面性。由此而来的是把他自己的历史作为<b>过程</b>来理解，把对自然界的认识（这也作为支配自然界的实践力量而存在着）当做对他自己的现实躯体的认识。发展过程本身被设定为并且被意识到是这个过程的前提。但是，要达到这点，首先必须使生产力的充分发展成为<b>生产条件</b>，不是使一定的<b>生产条件</b>表现为生产力发展的界限。</p>
