<p class='title1'>60．<br>
马克思致恩格斯</p>
<p class='author'>曼彻斯特</p>
<p align="right"><b>1859年11月7日于伦敦</b></p>
<br>
亲爱的恩格斯：<br>
　　格林的书<a name='_ftnref1' title href='#_ftn1'><sup>[1]</sup></a>将寄给你。<br>
　　<b>关于摩洛哥<sup>〔139〕</sup>，我还没有写什么</b>，也没有写高加索<sup>〔140〕</sup>，也没有写关于亚洲的军事文章。我没有任何关于摩洛哥的外交详情。因此还必须由你来写。在目前的情况下，我简直不可能继续写第二分册。我认为这个分册具有决定性的重要意义。<sup>〔141〕</sup>实际上，这是全部资产阶级污垢的核心……<br>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
<br><a name='_ftn1' title href='#_ftnref1'><sup>[1]</sup></a>  雅・格林《德意志语言史》1853年莱比锡第2版。――编者注</span><br>
