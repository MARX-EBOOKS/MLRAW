<p class='title1'>50．<br>
马克思致恩格斯</p>
<p class='author'>曼彻斯特</p>
<p align="right"><b>1858年3月2日［于伦敦］</b></p>
<br>
<br>
亲爱的弗雷德里克：<br>
　　……再者，你能否告诉我，你们隔多少时间――例如在你们的工厂――更新一次机器设备？拜比吉断言，在曼彻斯特大多数机器设备平均每隔五年更新一次。<a name='_ftnref1' title href='#_ftn1'><sup>[1]</sup></a>这种说法在我看来有点奇怪，不太可信。机器设备更新的平均时间，是说明大工业巩固以来工业发展所经过的多年周期的重要因素之一……<br>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
<br><a name='_ftn1' title href='#_ftnref1'><sup>[1]</sup></a>  参看查・拜比吉《论机器和工厂的节约》1832年伦敦版第285页。――编者注</span><br>
