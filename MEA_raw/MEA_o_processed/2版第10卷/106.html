<p class='title1'>106．<br>
马克思致约瑟夫・狄慈根</p>
<p class='author'>彼得堡</p>
<p align="right"><b>［1868年5月9日于伦敦］</b></p>
<br>
<br>
　　……一旦我卸下经济负担，我就要写《辩证法》。辩证法的真正规律在黑格尔那里已经有了，当然是具有神秘的形式。必须去除这种形式……<sup>〔251〕</sup><br>
