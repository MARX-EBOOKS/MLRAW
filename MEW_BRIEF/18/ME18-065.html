<h1>Friedrich Engels<br>[An den Kongreß von Saragossa]</h1>
<p align="right">[„La Emancipacion“<br>Nr. 44 vom 13. April 1872]</p>
<p align="center"><b>Telegramm</b></p>
<p align="right">London, 6. April [1872]</p>
<p>Der Generalrat und der Englische Föderalrat grüßen den Kongreß von Saragossa.</p>
<p>Es lebe die Befreiung des Proletariats!</p>
<p align="right"><i>Engels</i></p>
<p>Aus dem Spanischen.</p>
