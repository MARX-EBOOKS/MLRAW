<title>Über den Antisemitismus</title>
</head>
<body>
<p>Paul Singer, einer unserer besten Reichstagsmänner – Leute, auf deren Freundschaft ich stolz bin, und alles Juden! Bin ich doch selbst von der „Gartenlaube“<a id="A82"></a> zum Juden gemacht worden, und allerdings, wenn ich wählen müßte, dann lieber Jude als „Herr von“!</p>
<p>London, 19.April 1890</p>
<p align="right"><i>Friedrich Engels</i></p>
