<title>Kapitel III</title>
</head>
<body>
<p>Vulgärphilosophie die religiöse Form überkommen, worin allein er die Massen ergreifen konnte. Aber einmal diese Vermittlung gefunden, konnte er Weltreligion werden nur in der griechisch-römischen Welt und durch Fortentwicklung in und Verschmelzung mit dem durch sie eroberten Gedankenstoff.</p>
