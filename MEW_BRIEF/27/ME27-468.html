<h1>35<br>Marx an Moses Heß<br>in Brüssel</h1>
<p align="right">[Brüssel] 2. September [1847]</p>
<p>Lieber Heß!</p>
<p>Melde Dir, heute in der <i>Chaussée d'Etterbeck</i>, im Grand Salon, auch Palais royal benamst.</p>
<p align="right"><i>Marx</i></p>
