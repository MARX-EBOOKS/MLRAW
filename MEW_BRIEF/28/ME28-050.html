<h1 align="center">21<br>Marx an Engels<br>in Manchester</h1>
<p align="right">14. April 1852<br>28, Dean Street, Soho, London</p>
<p>Lieber Frederic,<br>
Ich schreibe Dir nur diese 2 Zeilen, um anzuzeigen, daß das kleine Kind<sup><a id="ZF1" href="#F1">1</a></sup> heute ¼ nach 1 Uhr gestorben ist.</p>
<p align="right">Dein<br>K.M.</p>
<aside>
<p><a id="F1" href="#ZF1">1</a> Marx' Töchterchen Franziska</p>
</aside>
