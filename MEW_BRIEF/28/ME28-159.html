<title>Marx an Engels · 20. Oktober 1852</title>
<body>
<h1 align="center">73<br>
Marx an Engels<br>in Manchester</h1>
<p align="right">20. Oktober 1852<br>28, Dean Street, Soho, London</p>
<p>Lieber Engels!<br>
Ich empfehle Dir bestens den Überbringer dieser Zeilen, Oberst Pleyel. Ich kenne ihn zwar nicht persönlich, aber er wird „aufs beste“ empfohlen durch Oberst Bangya, den Du ja kennst.</p>
<p align="right">Dein<br>
<i>K. Marx</i></p>
