<h1 align="center">207<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 16.April [1855]</p>
<p>Lieber Engels,</p>
<p>Mittwoch morgen werde ich mit dem parliamentary train<a id="A81"></a> von hier nach M[anchester] abreisen mit meiner Frau.</p>
<p>Eben sahen Dronke und ich Badinguet die Westminsterbridge<a id="A450"></a> passieren. Affe in Uniform.</p>
<p align="right">Dein<br>K.M.</p>
</body>
