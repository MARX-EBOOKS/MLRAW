<h1>20<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 6. Juni 1856</p>
<p>Lieber Engels,</p>
<p>Plan again changed.<sup><a id="ZF1" href="#F1">1</a></sup> Warum, mündlich. Pieper begleitet mich nach Hull, reist dann nach London zurück. Ich komme von Hull zu Dir.<a id="A77"></a></p>
<p align="right">Dein<br><i>K.M.</i></p>
<aside>
<p><a id="F1" href="#ZF1">1</a> Plan wieder geändert.</p>
</aside>
