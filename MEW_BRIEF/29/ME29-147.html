<h1 align="center">62<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 3. Juli [1857]</p>
<p>Dear Frederic,<br>
Ich schreibe wieder, um den ersten Zettel to gainsay<sup><a id="ZF1" href="#F1">1</a></sup>. Nr. II langte an, Punkt 6. Da nie früher ein Brief so spät ankam, schrieb ich, um etwaiges mischief<sup><a id="ZF2" href="#F2">2</a></sup> zu verhüten. Salut.</p>
<p align="right">Dein<br>K.M.</p>
<aside>
<p><a id="F1" href="#ZF1">1</a> zu widerrufen</p>
<p><a id="F2" href="#ZF2">2</a> Unheil</p>
</aside>
