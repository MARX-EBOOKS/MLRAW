<h1>77<br>Engels an Marx<br>in London</h1>
<p align="right">[Ryde] 10. Sept. [1857] Donnerstag</p>
<p>Lieber Marx,</p>
<p>Hierbei „Bennigsen“ und „Barclay“. Die napoleonischen Generale geh' ich etwas näher durch, sie folgen morgen oder übermorgen. „Army“ bald fertig.</p>
<p align="right">Dein<br><i>F. E.</i></p>
