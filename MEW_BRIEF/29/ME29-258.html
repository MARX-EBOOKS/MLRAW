<h1 align="center">115<br>Engels an Marx<br>in London</h1>
<p align="right">[Manchester] 15.Jan. 58</p>
<p>Lieber Marx,</p>
<p>Nach inliegendem Brief von Harney scheint Schramm wohl schwerlich noch am Leben zu sein. Ich habe gleich an H[arney] geschrieben. Sobald ich weiteres höre, teile ich Dir's mit.</p>
<p align="right">Dein<br>F. E.</p>
