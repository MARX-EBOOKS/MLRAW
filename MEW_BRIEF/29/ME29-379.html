<h1>174<br>Marx an Engels<br>in Manchester</h1>
<p align="right">London, 28. Dez. 58</p>
<p>Prost Neujahr!<br>Für Lupus ditto.<br>How with Servia?<sup><a id="ZF1" href="#F1">1</a></sup><a id="A327"></a><br>Salut.</p>
<p align="right"><i>K. Marx</i></p>
<aside>
<p><a id="F1" href="#ZF1">1</a> Wie ist es mit Serbien?</p>
