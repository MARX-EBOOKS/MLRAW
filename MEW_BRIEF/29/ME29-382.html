<h1>177<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 8. Jan. 1859</p>
<p>Dear Frederick,<br>Einliegend Brief von Freiligrath. (Ich hatte ihm einiges geschrieben über die Kinkelaffäre.) Prospekt des „Hermann".<a id="A331"></a> Brief des Herrn Willich. Salut.</p>
<p align="right">Dein<br>K.M.</p>
