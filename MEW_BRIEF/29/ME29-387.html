<h1>180<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London, 26. Januar 1859]</p>
<p>Dear Frederick,</p>
<p>Die £ 2 richtig erhalten; das Manuskript<a id="A263"></a> fortgeschickt; gestern an die „Tribune" geschrieben economical Review<sup><a id="ZF1" href="#F1">1</a></sup>.<a id="A334"></a></p>
<p>Morgen mehr und something very amusing too<sup><a id="ZF2" href="#F2">2</a></sup>.</p>
<p align="right">Dein<br>K.M.</p>
<aside>
<p><a id="F1" href="#ZF1">1</a> ökonomische Umschau</p>
<p><a id="F2" href="#ZF2">2</a> auch etwas sehr Amüsantes</p>
</aside>
</body>
