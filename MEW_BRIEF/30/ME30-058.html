<h1>31<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 28. Mai 60</p>
<p>Lieber Engels,</p>
<p>Einliegend von Lassalle. Schreibe mir <i>umgehend</i>, was Du denkst, daß ich ihm wegen dem Fischel schreiben soll.</p>
<p>Auf seinen Vorschlag wegen Berlin laß ich mich nicht ein.<a id="A89"></a></p>
<p>Von Lommel noch nichts.</p>
<p align="right">Dein<br>K.M.</p>
</body>
