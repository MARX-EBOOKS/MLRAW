<h1>64<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 11. Okt. 1860</p>
<p>Dear Frederick,<br>
Ich bin sehr beschäftigt diesen Augenblick. Schreibe Dir am Sonnabend. Broschüre von Braß<a id="A135"></a> einiges Gute drin.<br>
Wo möglich, schick mir ein paar Instruktionszeilen (bis Sonnabend) über Garibaldis grand battle.<a id="A131"></a></p>
<p align="right">Dein<br>
<i>K.M.</i></p>
</body>
