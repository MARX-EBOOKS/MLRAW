<h1>118<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 5.Dez. [1861]</p>
<p>Lieber Engels,<br>Nicht früher Anzeige gemacht, weil von großem trouble<sup><a id="ZF1" href="#F1">1</a></sup> heimgesucht. Meine Frau ist sehr leidend. Ich schreibe Dir heut abend, da ich heut am Tag Artikel zu fabrizieren.<br>Salut.</p>
<p align="right">Dein<br><i>K.M.</i></p>
<aside>
<p><a id="F1" href="#ZF1">1</a> Kummer</p>
</aside>
</body>
