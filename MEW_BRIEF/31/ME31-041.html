<h1>15<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 22. Dez. 64</p>
<p>Lieber Frederick,<br>In aller Eile. Schick mir Beckers Brief<sup><a id="ZF1" href="#F1">1</a></sup> zurück. Ich hoffe, Du hast ihn nicht verloren.<br>Prost Neujahr!</p>
<p align="right">Dein<br>K.M.</p>
<aside>
<p><a id="F1" href="#ZF1">1</a> Siehe vorl. Band, S. 36</p>
</aside>
