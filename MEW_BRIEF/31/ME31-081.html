<h1>34<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London, vor dem 22. Februar 1865]</p>
<p>Lieber Frederick,<br>
Einliegend zum <i>Sonntagsvergnügen</i> und <i>pour la bonne bouche</i><sup><a id="ZF1" href="#F1">1</a></sup> geheime Beiträge zur <i>crème bonapartiste</i>.<a id="A109"></a><br>
Du mußt die Zettel aufheben. My compliments to Mrs. Lizzie.</p>
<p align="right">Dein<br>
K.M.</p>
<aside>
<p><a id="F1" href="#ZF1">1</a> als Leckerbissen</p>
</aside>
