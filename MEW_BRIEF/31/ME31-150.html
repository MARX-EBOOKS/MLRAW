<h1>69<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 19.Okt.1865</p>
<p>Dear Fred,<br>
Ich bin morgen nachmittag about<sup><a id="ZF1" href="#F1">1</a></sup> 4.40 in Manchester und werde mich nach Deiner offiziellen Wohnung verfügen.<a id="A193"></a></p>
<p align="right">Dein<br>K.M.</p>
<aside>
<p><a id="F1" href="#ZF1">1</a> ungefähr</p>
</aside>
