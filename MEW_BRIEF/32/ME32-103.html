<h1>54<br>Marx an Engels<br>in Manchester</h1>
<p align="right">London, 24 June [1868]</p>
<p>Lieber Fred,</p>
<p>Leider hat sich die Krankheit beider Mädchen als Scarlatina<sup><a id="ZF1" href="#F1">1</a></sup> ausgewiesen, bei Tussychen namentlich in sehr bösartiger Form.</p>
<p>Salut.</p>
<p align="right">Dein<br>K.M.</p>
<aside>
<p><a id="F1" href="#ZF1">1</a> Scharlach</p>
</aside>
