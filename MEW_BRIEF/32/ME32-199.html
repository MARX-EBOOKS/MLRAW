<h1>114<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 8.Nov. [1868]</p>
<p>Second Letter.<sup><a id="ZF1" href="#F1">1</a></sup><br><i>Postskriptum.</i><br>Eben komme ich von Bork[heim]. Gegen Erwartung habe ich fertiggebracht, daß er Deine 2 Artikel<sup><a id="ZF2" href="#F2">2</a></sup> <i>nicht</i> unter seiner Patronage druckt.</p>
<p align="right">Dein<br>K.M.</p>
