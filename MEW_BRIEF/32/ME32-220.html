<h1>128<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 6. Dez. 1868</p>
<p>Dear Fred,<br>
Kannst Du mir bis Mittwoch (übermorgen) next<sup><a id="ZF1" href="#F1">1</a></sup> £ 3 schicken, da Gaszahlung etc. fällig und ich bis dahin Zahlung versprochen.<br>
Salut.</p>
<p align="right">Dein<br>K.M.</p>
<p>Also Lowe und Bright Co.!</p>
