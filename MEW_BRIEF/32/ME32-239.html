<h1>139<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 23. Dez. 1868</p>
<p>Dear Fred,<br>
Ich zeige Dir – da ich gleich zur City – nur den Empfang Deines brillanten Christmasgeschenks an. Du kannst Dir denken, welcher Jubel im Haus war.<br>
Salut.</p>
<p align="right">Dein<br>K.M.</p>
