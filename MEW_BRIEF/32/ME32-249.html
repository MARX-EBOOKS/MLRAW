<title>Engels an Marx · 26. Januar 1869</title>
<body>
<p align="center">146<br>
Engels an Marx<br>
in London<a id="A63"></a></p>
<p align="right">Manchester, 7, Southgate,<br>
26. Jan. 1869</p>
<p>Lieber Mohr,</p>
<p>Heute mittag 2 Uhr ist Ernest Jones an der Lungenentzündung gestorben. Er war seit Donnerstag krank und seit Freitag von den Ärzten aufgegeben.</p>
<p>Das ist wieder einer von den Alten!</p>
<p align="right">Dein<br>
F. E.</p>
</body>
