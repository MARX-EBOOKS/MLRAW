<h1>174<br>Marx an Engels<br>in Manchester</h1>
<p align="right">[London] 7.April 1869</p>
<p>Dear Fred,</p>
<p>Einliegend Brief von Wilhelmchen.<a id="A331"></a> Schick ihn nach Durchlesung zurück. Was soll ich ihm über den „Bauernkrieg“ schreiben?</p>
<p>Eben kommt Strohn. Also Addio.</p>
<p align="right">Dein<br>K.M.</p>
