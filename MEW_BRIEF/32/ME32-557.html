<h1>16<br>Marx an Friedrich Leßner<br>in London<a id="A629"></a></h1>
<p align="right">London, 11.August 1868</p>
<p>Lieber Leßner,<br>Wegen der orthographischen Fehler habe ich beifolgend den ganzen Aufruf abgeschrieben. Du mußt ihn jetzt in <i>Deiner Handschrift</i> kopieren.<br>Salut.</p>
<p align="right">Dein<br>K.M.</p>
