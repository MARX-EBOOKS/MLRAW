<h1>36<br>Marx an Pjotr Lawrowitsch Lawrow<br>in Paris<a id="A218"></a></h1>
<p align="right">London, 27. Februar 1871</p>
<p>Sehr geehrter Herr,</p>
<p>Lopatin ist nach den Vereinigten Staaten abgereist, und ich habe noch keine Nachricht von ihm.</p>
<p>Ich habe die Ehre zu sein</p>
<p align="right">Ihr sehr ergebener<br><i>Karl Marx</i></p>
<p>Aus dem Französischen.</p>
