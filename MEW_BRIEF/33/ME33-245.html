<h1>69<br>Marx an Pjotr Lawrowitsch Lawrow<br>in London</h1>
<p align="right">[London] 12.Juli 1871</p>
<p>Mein lieber Freund,<br>Wollen Sie bitte am nächsten Sonntag um 5 Uhr abends zu uns zum Essen kommen?<br>Sie werden einige unserer Pariser Freunde antreffen.</p>
<p align="right">Mit brüderlichem Gruß<br><i>Karl Marx</i></p>
<p>Aus dem Französischen.</p>
