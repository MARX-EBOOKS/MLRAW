<h1>91<br>Marx an Friedrich Adolph Sorge<br>in Hoboken</h1>
<p align="right">[London] 5.Sept. 1871</p>
<p>Geehrter Herr Sorge,<br>
Einliegend Aufruf<a id="A95"></a> für die refugees<sup><a id="ZF1" href="#F1">1</a></sup>. Ihre Sendung von Amerika, d.d. 23.August, ist heut angekommen.<a id="A310"></a></p>
<p align="right">Ihr ergebenster<br><i>Karl Marx</i></p>
<aside>
<p><a id="F1" href="#ZF1">1</a> Flüchtlinge</p>
</aside>
