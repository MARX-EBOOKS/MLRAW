<p align="center">97</p>
<h1>Marx an Hermann Jung<br>in London</h1>
<p align="right">[London] 13.Sept. 71</p>
<p>Lieber Jung,<br>Wollen Sie so gut sein, von den einliegenden 3 £ 10 dem Col[onel] Naze 2 £ 15 und dem dicken Russen, den Lawrow uns gesandt, 15 sh. in meinem Namen zu geben gegen Quittung.</p>
<p align="right">Ihr<br><i>K.M.</i><br>1, Maitland Park Road</p>
</body>
