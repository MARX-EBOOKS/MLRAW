<h1>105<br>Marx an John Hales<br>in London<a id="A336"></a></h1>
<p>Lieber Hales,</p>
<p>Sie müssen die folgende Resolution<a id="A337"></a> kopieren und sie an die Londoner Tageszeitungen schicken (an die <i>englischen</i>; Serraillier schickt sie an die französischen Zeitungen).</p>
<p align="right">Brüderlich Ihr<br>Karl Marx</p>
<p>[London] 14. Oktober 1871</p>
<p>Aus dem Englischen.</p>
