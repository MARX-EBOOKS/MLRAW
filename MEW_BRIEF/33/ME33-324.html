<h1>124<br>Marx an Jules Johannard<br>in London<a id="A336"></a></h1>
<p align="right">London, 18.Nov. 1871</p>
<p>Mein lieber Jules Johannard,</p>
<p>Man erwartet Sie bei mir morgen abend (Sonntag) zwischen 7 und 8 Uhr. Zuerst werden einige internationale Angelegenheiten beraten. Später absolute Freiheit!</p>
<p align="right">Ganz der Ihre<br>Karl Marx</p>
<p>Aus dem Französischen.</p>
