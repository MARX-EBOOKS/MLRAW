<p align="center">147</p>
<h1>Marx an Hermann Jung<br>in London</h1>
<p align="right">[London] 19. Januar 1872</p>
<p>Mein lieber Jung,</p>
<p>Ich muß Sie unbedingt morgen abend sehen. Ich hoffe daher, daß Sie kommen werden; wenn es nicht möglich ist, werde ich Sie Sonntag früh aufsuchen.</p>
<p align="right">Brüderlich Ihr<br><i>Karl Marx</i></p>
<p>Aus dem Englischen.</p>
