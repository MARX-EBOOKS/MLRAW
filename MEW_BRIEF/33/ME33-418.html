<h1>163<br>Marx an Hermann Jung<br>in London</h1>
<p align="right">[London] 7. März 72</p>
<p>Mein lieber Jung,<br>
Ich kann die Statuten der Vermersch-Sektion<a id="A468"></a> nicht finden. Bitte sehen Sie nach, ob Sie sie haben.</p>
<p align="right">Brüderlich Ihr<br>K. Marx</p>
<p>Aus dem Englischen.</p>
