<h1>165<br>Marx an Émile Eudes<br>in London</h1>
<p align="right">[London] 9.März 1872</p>
<p>Mein lieber Eudes,<br>
Sagen Sie Ihrem Hauswirt nichts, bevor Sie <i>Ihre Möbel</i> aus Ihrer Wohnung <i>entfernt</i> haben. Sonst könnte er sie beschlagnahmen und Ihnen Schwierigkeiten machen.</p>
<p align="right">Ganz der Ihre<br>
<i>Karl Marx</i></p>
<p>Aus dem Französischen.</p>
