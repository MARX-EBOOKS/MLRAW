<h1>271<br>Marx an Ludwig Kugelmann<br>in Hannover</h1>
<p align="right">[London] 10. August 74</p>
<p>Lieber Kugelmann,<br>Ich kann nicht von hier abreisen vor dem 15. August (Sonnabend)<a id="A144"></a> und werde wohl 4 Tage bis zum Bestimmungsort brauchen, da ich Tussy nicht zuviel anstrengen darf.<br>Salut.</p>
<p align="right">Dein<br><i>K. M.</i></p>
