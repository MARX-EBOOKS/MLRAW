<h1>99<br>Marx an Pjotr Lawrowitsch Lawrow<br>in London<a id="A372"></a></h1>
<p align="right">[Poststempel: London, 21. April 1877]</p>
<p>Mein lieber Freund,</p>
<p>Wir erwarten Sie morgen (Sonntag) zum Essen (2 Uhr).</p>
<p>In großer Eile und mit Grüßen von Frau Marx.</p>
<p align="right">Ihr<br>K.M.</p>
<p>Aus dem Französischen.</p>
</body>
