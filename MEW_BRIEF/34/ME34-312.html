<h1>126<br>Engels an Ernst Dronke<br>in Waterloo<a id="A416"></a><br><b>(Abschrift)</b></h1>
<p align="right">[London] 20. Nov. [1877]</p>
<p>Wenn ich das Receipt<sup><a id="ZF1" href="#F1">1</a></sup> bis morgen früh nicht habe, so zwingst Du mich, hier auf das Central Office zu gehn und den ganzen Sachverhalt bloßzulegen.</p>
<aside>
<p><a id="F1" href="#ZF1">1</a> die Quittung (vgl. vorl. Band, S.224)</p>
</aside>
