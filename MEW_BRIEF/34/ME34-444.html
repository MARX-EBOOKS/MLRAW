<h1>192<br>Marx an Paul Lafargue<br>in London<a id="A545"></a></h1>
<p align="right">[London, 4. oder 5. Mai 1880]</p>
<p>Lieber Lafargue,<br>Beiliegend die Frucht meiner Konsultation (von gestern abend) mit Engels. Bringen Sie den Stil in Ordnung, aber lassen Sie den Inhalt unverändert.</p>
<p align="right">Ganz der Ihre<br><i>Karl Marx</i></p>
<p>Aus dem Französischen.</p>
</body>
