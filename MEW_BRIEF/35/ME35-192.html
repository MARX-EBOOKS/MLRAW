<h1>20<br>Marx an Friedrich Adolph Sorge<br>in Hoboken<a id="A244"></a></h1>
<p align="right">London, 2. Juni 1881</p>
<p>Lieber Sorge,<br>
Ich empfehle Dir sehr herzlich den Überbringer dieser Karte, meinen Freund Hartmann<sup><a id="ZF1" href="#F1">1</a></sup>.</p>
<p>Nach: „The New-York Herald“ Nr. 16455,<br>
vom 10. September 1881.<br>
Aus dem Englischen.</p>
<aside>
<p><a id="F1" href="#ZF1">1</a> L. N. Hartmann</p>
</aside>
