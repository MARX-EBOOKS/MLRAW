<h1>50<br>Engels an Lew Nikolajewitsch Hartmann</h1>
<p align="center">in London<br>(Entwurf)</p>
<p align="right">[London, Ende Dezember 1881]</p>
<p>Ich habe einen Brief aus Amerika für Dich, jedoch hat man mir befohlen, ihn nur Dir persönlich auszuhändigen. Kannst Du kommen, um ihn in Empfang zu nehmen?</p>
<p align="right">Dein</p>
<p>Aus dem Russischen.</p>
