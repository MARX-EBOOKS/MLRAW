<h1>41<br>Engels an Karl Kautsky<br>in London<a id="A117"></a></h1>
<p align="right">[London, 1. Dezember 1883]</p>
<p>Lieber Kautsky,<br>Was ist mit Ihnen los, daß Sie sich weder bei Tussy noch bei mir sehn lassen?</p>
<p align="right">Ihr<br>F. E.</p>
