<h1>62<br>Engels an John Darbyshire<br>in Manchester<a id="A176"></a><br><b>(Entwurf)</b></h1>
<p align="right">[London, nach dem 17. Februar 1884]</p>
<p>Kann in dieser Sache gar nichts tun. Soll ich Ihre Prinzipien der Democratic Federation<a id="A87"></a>, „Justice“ oder „To-Day“ übergeben?</p>
<p>Aus dem Englischen.</p>
