<h1>Engels an Karl Kautsky<br>in London</h1>
<p align="right">[London, 8. Juli 1886]</p>
<p>Glücklich wieder hier<a id="A624"></a> – war heute bei der G[uillaume]-S[chack], die aber nicht zu Hause – kam also soweit um das Vergnügen der Bekanntschaft. – Schorl[emmer] ist hier – kommt Ihr morgen abend herüber?</p>
<p align="right">Dein<br>F. E.</p>
