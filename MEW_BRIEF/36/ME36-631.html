<h1>Engels an die Fédération socialiste révolutionnaire<br>du centre du Parti ouvrier<br>in Paris<a id="A741"></a></h1>
<p align="right">London, 18.März [1887]</p>
<p>Bürger,<br>Von ganzem Herzen feiere ich mit Ihnen den achtzehnten März.</p>
<p align="right">F. Engels</p>
<p>Nach: „Le Socialiste“,<br>vom 26.März 1887.<br>Aus dem Französischen.</p>
