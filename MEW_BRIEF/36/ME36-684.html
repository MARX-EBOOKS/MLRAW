<h1>352<br>Engels an Karl Kautsky<br>in Ventnor</h1>
<p align="right">London, 22. Juli 87</p>
<p>Lieber Kautsky,</p>
<p>Gehn morgen weg. Adresse <b>4</b>, Cavendish Place, Eastbourne.<a id="A797"></a> Schicke hierbei ein Pack Zeitungen. Viele Grüße allerseits. Hoffentlich nicht zu heiß!</p>
<p>Hier Supra-Hemdsärmel-Wetter.</p>
<p align="right">Dein<br>F. E.</p>
</body>
