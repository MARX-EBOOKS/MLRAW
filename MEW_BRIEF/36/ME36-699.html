<h1>362<br>Engels an Karl Kautsky<br>in London</h1>
<p>Gestern abend zurück.<a id="A797"></a> Sind aber leider noch nicht soweit, Euch morgen ein Mittagessen offerieren zu können, werden uns aber freuen, Euch gegen 5 bei uns zu sehn.</p>
<p align="right">Dein<br>F. E.</p>
<p>[London] Samstag, [3. September 1887]</p>
