<title>Engels an Hermann Schlüter · 15. Juni 1888</title>

<h1>32<br>Engels an Hermann Schlüter<br>in London</h1>
<p align="right">122, Regent's Park Road<br>[London] 15. Juni 88</p>
<p>Lieber Schlüter,<br>Willst Du und will Tauscher mir den Gefallen tun, Sonntag mittag <i>halb drei</i> bei mir zu essen?</p>
<p align="right">Euer<br>F. Engels</p>
</body>
