<h1>102<br>Engels an Eleanor Marx-Aveling<br>in London</h1>
<p align="right">[London, um den 13.Mai 1889]</p>
<p>Da Laura ihren Brief an Dich im <i>offenen</i> Briefumschlag geschickt hat, füge ich dies bei.<a id="A227"></a> Sehe Dich heute abend bei Sam.</p>
<p>Aus dem Englischen.</p>
