<h1>165<br>Engels an Hermann Schlüter<br>in New York<a id="A363"></a></h1>
<p>Burns läßt uns sagen, daß er den Betreffenden<sup><a id="ZF1" href="#F1">1</a></sup> nicht kennt, ist also jedenfalls ein obskures Haus.<sup><a id="ZF2" href="#F2">2</a></sup></p>
<p>Viel Grippe hier herum, wir sind bis jetzt verschont. Sonst nichts Neues.</p>
<p align="right">Dein<br>F. E.</p>
<p>[London] 15.1.90</p>
<aside>
<p><a id="F1" href="#ZF1">1</a> George W.Reid</p>
<p><a id="F2" href="#ZF2">2</a> siehe vorl. Band, S.340</p>
</aside>
