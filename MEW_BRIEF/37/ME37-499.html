<h1>239<br>Engels an Karl Kautsky<br>in Stuttgart</h1>
<p>Unsere liebe, gute Nimmy ist gestern nachmittag um halb drei sanft entschlafen. Sie war nur kurze Zeit krank und hatte wenig, zuletzt gar keine Schmerzen.</p>
<p align="right">Dein<br><i>F. E.</i></p>
<p>[London] 5./11./90</p>
