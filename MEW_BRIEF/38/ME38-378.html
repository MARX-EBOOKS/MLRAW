<h1>168<br>Engels an Karl Kautsky<br>in Stuttgart</h1>
<p>Unser guter Schorlemmer ist heute morgen sanft gestorben. Ich gehe morgen hin.<a id="A429"></a></p>
<p>Nekrolog kommt im „Vorwärts".<sup><a id="ZF1" href="#F1">1</a></sup></p>
<p align="right">Dein<br>F. E.</p>
<p>[London] 27. Juni 92</p>
<aside>
<p><a id="F1" href="#ZF1">1</a> Friedrich Engels: „Carl Schorlemmer"</p>
</aside>
