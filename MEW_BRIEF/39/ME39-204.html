<h1>103<br>Engels an Albert Delon<br>in Nîmes<a id="A244"></a><br>(Notiz)</h1>
<p align="right">[London, um den 21. Januar 1894]</p>
<p>Soll den 2<sup>ten</sup> Band erst lesen und dann wiederkommen.<br>Nach Brief an Diamandi kann er noch nicht vollkommen Deutsch, sondern studiert noch dran, besonders an der Sprache der politischen Ökonomie.</p>
