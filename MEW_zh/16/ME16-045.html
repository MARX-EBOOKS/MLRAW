<p>关于军事问题的辩论，迄今只是在一边是政府和封建党派，另一边是自由的激进资产阶级之间进行。现在，危机日益迫近，该是工人政党也来发表意见的时候了。</p>
<p>我们只能从现存的实际关系出发来评论这里所谈的军事问题。只要在德国和欧洲还保持着目前的关系，我们便不可能指望普鲁士政府的行动不从普鲁士的观点出发。我们同样也不能要求资产阶级反对派不从自己的资产阶级利益的观点出发。</p>
<p>工人政党在所有使反动派和资产阶级分裂的问题上都站在直接冲突之外，因此它的优越性在于能够完全冷静地和公正地讨论这些问题。只有工人政党能够科学地、历史地（像对待已经过去的事情那样）解剖式地（像解剖尸体那样）来讨论这些问题。</p>
