<title>工人阶级同波兰有什么关系？——三</title>
</head>
<body>
<p style="text-indent: 0;">列斯维希—霍尔施坦归并于普鲁士或威尼斯归并于意大利，而是把奥地利所占领的波兰部分，和至少是把普鲁士所占领的波兰部分归并于俄国。</p>
<p>这就是民族原则运用于波兰事务的情形。</p>
