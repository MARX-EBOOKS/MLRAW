<h1>卡·马克思<br>辟 谣<sup>[182]</sup></h1>
<p>敬请“北德报”编辑部将下面的辟谣声明刊出。</p>
<p>致深切的敬意</p>
<p align="right">卡尔·马克思</p>
<p align="center">致“北德报”编辑部</p>
<p>在贵报第 5522 号上，想必是由于疏忽，刊载了如下一则简讯：</p>
<p>“寓居伦敦的马克思博士……即将周游大陆各国，其目的就是为此事（在波兰“即将爆发的起义”）进行宣传。”</p>
<p>显然，这只是警察当局为了不可告人的“目的”而编造出来的谎言。</p>
<p align="right">卡尔·马克思</p>
<p align="right">1867 年 2 月 18 日于伦敦</p>
