<h1>卡·马克思<br>总委员会就不列颠政府对沙皇俄国的态度所作的声明<sup>[224]</sup></h1>
<p>国际工人协会总委员会谴责不列颠政府对俄国的又一次奴颜婢膝的表现，——在俄国政府颁布命令废除波兰这一名称一个月之后，不列颠政府就取消了预算案中“流亡者”一词前面的“波兰的”这一形容词。</p>
<div class="src">
卡·马克思于 1868 年 7 月 14 日<br>
提出<br>

第 352 号
</div>
