<h1 align="center">卡·马克思<br>总委员会提交布鲁塞尔<br>代表大会的关于缩短工作日<br>的决议草案<sup>[228]</sup></h1>
<p>鉴于 1866 年日内瓦代表大会一致通过的一项决议中早已指明，从法律上限制工作日是今后任何一种社会改革所不可缺少的先决条件，因此总委员会认为，现在已经是根据该项决议做出实际结论的时候，国际工人协会所有分部务必根据有协会组织存在的各个国家的实际情况着手讨论这个问题。</p>
