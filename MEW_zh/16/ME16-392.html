<p>中承认：资本对于雇佣工人在工作时遭到造成残废或死亡的一切不幸事故负有一定的责任。但是工人们不应当像现在所发生的情形那样，让这种责任成为扩大资本的专横权力的一种借口，而应当<b>争取把这种责任在法律上明文规定下来。</b></p>
