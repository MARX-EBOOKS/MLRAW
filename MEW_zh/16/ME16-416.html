<p>（1）更广泛地征收在许多国家中业已存在的遗产税，把这样得来的资金用于社会解放的目的；</p>
<p>（2）限制<b>遗嘱继承权</b>，这种继承权不同于<b>没有遗嘱的继承权</b>或<b>家属继承权</b>，它甚至是私有制原则本身的恣意的和迷信的夸张。</p>
