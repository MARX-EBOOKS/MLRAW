<h1>卡·马克思<br>给各支部的机密通知<sup>[378]</sup></h1>
<p>（1）总委员会要求各支部就 1870—1871 年改变总委员会驻在地是否适宜的问题给本支部代表发出正式指示。</p>
<p>（2）如果问题得到肯定的解决，总委员会则建议布鲁塞尔作为上述年度总委员会的驻在地。</p>
