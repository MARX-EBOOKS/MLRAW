<p>这些事件也许能推动英国的许多自由思想者团体<sup>[460]</sup>，它们以前一直采取比较矜持的态度，现在可能使它们为了实际运用自己的研究而在人民面前行动起来。</p>
<p>芬尼亚社社员的事业<sup>[461]</sup>引起了英国工人阶级的深切同情，这是因为他们反对神甫，同时也因为他们是共和派。这一事实也是时代的象征。<sup><a id="ZF1" href="#F1">①</a></sup></p>
