<p style="text-indent: 0;">息，如果不和其他地方获胜的消息放在一起，即使说得极其轻描淡写，也不能让法军知道。而这个消息又无法隐瞒 12 小时以上。因此，我们可以预料，法皇将派出他的军队去寻求这种胜利，如果我们不能很快得到法军胜利的消息，那就奇怪了。但是同时，德军可能也会出动，因此，双方的先头部队将在几个地方而不是在一个地方发生接触。今天，或者至迟明天，预料第一次决战就要开始。</p>
