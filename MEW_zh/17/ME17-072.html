<p style="text-indent: 0;">不足道。至于昨天“旗帜报”<sup>[40]</sup>散布的巴赞已从麦茨撤退并在蒙梅迪同麦克马洪会师的消息，该报今天早晨发表的一篇军事评论的作者已给以充分有力的驳斥。即使巴赞的某些部队在不久前的马尔斯 - 拉 - 土尔附近的战斗以后或在战斗过程中得以逃向北方，但是他的主力仍然被围困在麦茨。</p>
