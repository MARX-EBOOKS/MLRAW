<title>战争短评（十九）</title>
</head>
<body>
<p>垒的斜堤而不被巴黎军队的出击破坏，那末这一事实说明，巴黎军队在数量上、组织上和士气上都太弱了，不能在强攻的夜间有胜利把握地进行出击。</p>
<p>只要拿下几座堡垒，预料城市就会放弃绝望的战斗。不然，围攻一定再次进行，打开几个缺口，然后再度建议城市投降。如果这一建议再度遭到拒绝，那末就可能发生同样绝望的街垒战。我们希望巴黎免于遭受这种无谓的牺牲。</p>
<div class="src">
载于 1870 年 9 月 27 日<br>
“派尔 - 麦尔新闻”第 1754 号
</div>
