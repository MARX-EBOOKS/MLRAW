<title>战争短评(二十二)</title>
</head>
<body>
<p>怎样呢？那时，甚至各第四营的 20 万人都不足以征服这样的民族了。但是这种高涨的民族热忱今天在文明国家中已不常见。它可以在墨西哥人和土耳其人中间找到，但是在追逐金钱的西欧，它的源泉已经枯竭；而第二帝国这个梦魔使法国窒息的这 20 年，绝没有使它的民族性格受到锻炼。结果我们看到：说得多而做得少；表面的事做得多而组织工作几乎完全被忽视；真正的抵抗很少而对敌人的屈服很多；真正的兵士很少而自由射手很多。</p>
<div class="src">
载于 1870 年 10 月 11 日<br>
“派尔 - 麦尔新闻”第 1766 号
</div>
