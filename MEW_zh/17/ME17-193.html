<title>战争短评(二十八)</title>
</head>
<body>
<p style="text-indent: 0;">耳是否在等待更多的援兵？他的传递情报的通信鸽是否迷了路？它和特罗胥之间是否有分歧？我们不能肯定。无论如何，这种迟延对他们来说是致命的。弗里德里希 - 卡尔亲王正在继续向前挺进，目前也许离梅克伦堡大公的军队近得能够和他协同作战了，而巴黎城下的 6 个师就可能留在原地。从出现这种局面时起，这两位法国将军将失去又一次获胜的机会，并且可能是他们最后的一次机会。</p>
<div class="src">
载于 1870 年 11 月 23 日<br>
