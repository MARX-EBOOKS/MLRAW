<title>战争短评（三十八）</title>
</head>
<body>
<p style="text-indent: 0;">止法军兵力重新增长。显然，普军已经放弃了征服和占领整个法国的一切希望；在南部的大片地区被占领以前，在北方的消极的、有时还是积极的抵抗（例如炸毁土尔附近摩塞尔河上的桥梁）停止以前，只要法国还没有被战争弄得筋疲力竭，我们便看不到任何足以迫使法国投降的理由。</p>
<div class="src">
载于 1871 年 1 月 26 日<br>
“派尔 - 麦尔新闻”第 1858 号
