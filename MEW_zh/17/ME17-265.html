<title>战争短评（三十九）</title>

<body>
<p>做到这一点的希望会更加小到什么程度呢？布尔巴基在他的进攻在伯尔福附近被彻底击退以后，显然就应当立刻向安全的阵地撤退。为什么他没有这样做，这是完全令人不解的。但是，如果他发生最坏的事情，那末考虑到他由麦茨到契泽耳赫斯特的神秘旅行<sup>[129]</sup>以及他在利尔拒绝向共和国致敬的情况，人们对这位皇家近卫军前任司令的忠诚当然会产生怀疑。</p>
