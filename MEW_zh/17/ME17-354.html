<body>
<p>但是今天要试图一一列举出那些轰击巴黎、在外国侵略者的卵翼下发起奴隶主叛乱的人们的一切暴行（而这些暴行仅仅是开始），那就太可笑了。在这一切惨象当中，梯也尔已忘记他的关于在他的侏儒肩膀上负有重大责任的议会辞令，居然在自己的公报上洋洋得意地说 l'Assemblée siège paisiblement（议会在平静地开着会），并且不断地大张筵席，时而同他的十二月政变的将军们欢宴，时而同德国王公们欢宴，以此来证明他依然健啖如初，甚至勒康特和克列芒·托马两人的幽灵也没有败坏他的胃口。</p>
