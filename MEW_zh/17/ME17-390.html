<h1>卡·马克思<br>给“派尔 - 麦尔新闻”编辑的信</h1>
<p align="center">致弗·格林伍德先生</p>
<p align="right">1871 年 6 月 8 日</p>
<p style="text-indent: 2em;">阁下：</p>
<p style="text-indent: 2em;">能否请您将下面的短简日内在贵报惠予刊载？</p>
<p style="text-indent: 2em;">顺致敬意</p>
<p align="right">卡·马克思</p>
<br>
<br>
<p align="center">致“派尔 - 麦尔新闻”编辑</p>
<p style="text-indent: 2em;">阁下：</p>
<p style="text-indent: 2em;">从贵报昨日刊载的巴黎通讯中得悉，在我以为自己是住在伦敦的时候，我却由于俾斯麦—法夫尔的要求而在荷兰被捕了。您难道不觉得，这个消息只是近两个月来不断由法国和普鲁士警察捏造、由凡尔赛报纸予以发表、并由欧洲其他报纸纷纷转载的无数耸人听闻的有关<em>国际</em>的谣言之一。</p>
</body>
