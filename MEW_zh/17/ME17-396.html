<title>卡·马克思</title>
</head>
<body>
<p>马丁堂的公开大会上选出的临时委员会通过的。托伦先生从来不是这个委员会的委员，在草拟这个纲领时他根本不在伦敦。</p>
<p>贵报断言，“米里哀尔”是“最残酷的公社委员之一”。但是米里哀尔从来不是公社委员。</p>
<p>贵报接着说：“我们还应当指出不久以前担任协会主席的阿西”，等等。</p>
<p>阿西从来不是国际的会员，至于“协会主席”一职，早在 1867 年就被撤销了<sup>[260]</sup>。</p>
