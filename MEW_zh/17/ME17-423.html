<p>同时在萨托里，被捕者像苍蝇般地死去，——铁石心肠的死神比这位渺小的国家要人的法庭判决干得更麻利些。在凡尔赛的单身牢房里关着一个不会说一句法语的身材魁梧的小伙子。据说他是爱尔兰人。究竟他是怎么落到这般境地的，现在还不得而知。在被捕者里面也有个名望很高的人，他叫…… 他在牢房里已经呆了两个月，到现在为止还没有对他进行审讯。这多么卑鄙。”</p>
<p align="right">您的顺从的仆人 正义</p>
<p align="right">1871 年 8 月 7 日于伦敦</p>
