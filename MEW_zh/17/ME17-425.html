<h1>卡·马克思<br>致“舆论”周报编辑<sup>[283]</sup></h1>
<p>私人信件</p>
<p style="text-indent: 0;">阁下：</p>
<p>我不仅要求您在贵报立刻发表随信附上的答复<sup><a id="ZF1" href="#F1">1</a></sup>，而且坚决要求您在贵报刊登过诽谤言论的同一地方刊登<b>详尽而彻底的辟谣声明</b>。</p>
<p>如果我不得不对贵报诉诸法律，我将感到非常遗憾。</p>
<p align="right">您的顺从的仆人 卡·马·</p>
<div class="src">

</div>
