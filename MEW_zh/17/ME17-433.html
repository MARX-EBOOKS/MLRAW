<title>给“太阳报”编辑德纳的信</title>
</head>
<body>
<p>这帮先生们妄想对我即国际总委员会关于内战的宣言的作者进行报复的可怜企图而已。在他们的报复和我的女儿之间有一张英国护照，是啊，梯也尔先生在对待强大的外国时是多么胆小，而对他本国的手无寸铁的同胞却是那样不择手段。</p>
<p>至于克吕泽烈，我不以为他是一个叛徒，不过，当然，他承担了他没有足够毅力去完成的事情，因而给公社带来了很大的危害。如今他在哪儿，我不知道。</p>
<p>现在 addio〔再见吧〕！</p>
<p align="right">您的老朋友 卡尔·马克思</p>
<div class="src">
载于 1871 年 9 月 9 日“太阳报”
</div>
