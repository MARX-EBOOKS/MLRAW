<title>弗·恩格斯</title>

<body>
<p>党不应当成为某一个资产阶级政党的尾巴，而应当成为一个独立的政党，它有自己的目的和自己的政策。</p>
<p>政治自由、集会结社的权利和出版自由，就是我们的武器；如果有人想从我们手里夺走这个武器，难道我们能够袖手旁观和放弃政治吗？有人说，进行任何政治行动都等于承认现存制度。但是，既然这个制度把反对它的手段交到我们手中，那末利用这些手段就不意味着承认现存制度。</p>
<div class="src">
第一次全文发表于 1934 年<br>
“共产国际”杂志第 29 期
