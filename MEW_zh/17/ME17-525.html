<p>甚至站到必定是由这些“正直先生”的朋友们所组成的“公意法庭”面前去吗？</p>
<p style="text-indent: 2em;">我跟查理·布莱德洛先生的账已经了结，现在我让他完全安心地自我欣赏，如果这能给他一点慰藉的话。</p>
<p align="right">阁下，我仍然是您的顺从的仆人</p>
<p align="right"><b>卡尔·马克思</b></p>
