<title>卡·马克思</title>
</head>
<body>
<p>骄奢淫逸的生活提供了充分发展的活动范围。表面上凌驾于市民社会之上的国家，实际上正是这个社会的一切龌龊事物的温床。普鲁士的刺刀揭穿了这个国家的彻底腐朽性以及似乎应由这个国家拯救的社会的全部腐朽性，但是，这种帝国制度是“秩序”的、即资产阶级社会“秩序”的如此不可避免的政治形式，以至于普鲁士自己之所以要把它的巴黎中心所在地推翻，无非是为了把它移到柏林去。</p>
<p>帝国并不像它的前驱正统王朝、立宪王朝、议会制共和国那样，只是资产阶级社会的一种政治形式，它同时还是资产阶级社会的最淫贱、最完整、最后的政治形式。它是近代阶级统治的国家政权，至少在欧洲大陆上是如此。</p>
