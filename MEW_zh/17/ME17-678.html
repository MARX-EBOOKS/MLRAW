<p style="text-indent: 0;">在普鲁士人所占领的卢昂，有 500 人遭到了逮捕，逮捕的借口是他们国际的会员。国际正在引起恐惧。若贝尔伯爵——老古董，1834 年的部长，一个以支持采取措施反对报刊而闻名的人物——在法国国民议会上发表了演说，他在这次演说中说道，在恢复秩序之后，政府的首要任务应该是追查国际的活动和打垮国际。</p>
