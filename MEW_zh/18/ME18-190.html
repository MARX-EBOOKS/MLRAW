<p>而罗马支部只是在这一次代表会议之后才向总委员会提出申请的（而且我想，这根本就不是曾经派代表去里米尼的那个支部）。</p>
<p>国际的意大利会员可以相信，只要国际、代表大会、总委员会、共同章程和条例存在，那末无论哪一个支部，如果不承认共同章程和条例规定的、所有的人都必须遵行的条件，它就不会为代表大会或者总委员会所接受。</p>
<p align="right"><b>弗里德里希·恩格斯</b></p>
