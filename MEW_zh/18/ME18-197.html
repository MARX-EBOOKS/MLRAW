<title>海牙代表大会的限权代表委托书</title>
</head>
<body>
<p>可见，那样反对权威，那样具有无政府主义精神等等的西班牙联合会委员会，为了派代表到海牙去，把会费集中在自己手中；它非常狡黠地自行<b>安排了</b>这些代表的选举，结果当选的都是同盟分子，最后，它还拟定了用他们自己的话来说是反映了西班牙国际会员意志的<b>集体的限权代表委托书</b>。</p>
<p>很难设想，还有什么比这样做更尊重自治了。</p>
