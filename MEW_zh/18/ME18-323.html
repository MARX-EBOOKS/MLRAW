<p>“在法国这些代理人把不听他们的话的会员开除出去，并擅自解散支部、委员会和联合会。”</p>
<p>贵报通讯员必须说明，在这些“代理人”中连一个还没有被任命的时候，他们怎么能干出这些骇人听闻的事情来呢。在法国有些人果真被开除出国际了，但是这是由各地方支部开除的，而决不是由纽约总委员会开除的。</p>
<p>阁下，我仍然是您的顺从的仆人</p>
<p align="right">卡尔·马克思</p>
<p align="right">1 月 2 日</p>
