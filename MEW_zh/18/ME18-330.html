<title>弗·恩格斯</title>

<body>
<p style="text-indent: 0;">产阶级，还没当政就已经堕落到法国资产阶级经过 80 年斗争和长期统治之后所达到的那种退化的地步。<i>Panem et circenses!</i> ——面包和娱乐！——堕落的罗马平民曾向自己的皇帝这样要求；<i>panem et circenses!</i> ——投机利润和穷奢极侈！——普鲁士资产阶级而不是普鲁士人民则向自己的皇帝这样要求。罗马的平民同他们的皇帝一起被日耳曼的野蛮人消灭了；而在普鲁士资产者的背后德国工人正在巍然奋起。</p>

<div class="src">
弗·恩格斯写于 1873 年 1 月初<br>
载于 1873 年 1 月 15 日“人民国家报”第 5 号
