<p>冷淡主义的第一批基督徒曾经需要皇帝的帮助，来使他们从被迫害者变成迫害者，那末政治冷淡主义的当代信徒则根本不相信，他们的永恒原则使他们必须放弃世间的欢乐和资产阶级社会的暂时特权。但是必须承认，他们会以真正基督徒的苦行主义精神来忍受 14 小时或 16 小时的劳动，只要这种劳动是由工厂工人承担的！</p>
<p align="right">1873 年 1 月于伦敦</p>
