<p>他不是密探，但是，看来这是一个软弱的和不坚定的人。</p>
<p>致兄弟般的敬礼</p>
<p align="right">弗·恩格斯</p>
<p>至今我一直没有收到过给总委员会的任何钱。除了关于“人民报”可能也已暂时停办的说法以外，从意大利同样没有得到任何消息。在博洛尼亚和米朗多拉逮捕同盟分子不会是长时期的，他们很快就会获得自由；即使他们有人间或由于误会而被捕，也永远不会真正吃到什么苦头。</p>
