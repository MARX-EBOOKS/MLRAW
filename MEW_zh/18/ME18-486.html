<p style="text-indent: 0;">部和联合会脱离出去了。因此，海牙代表大会通过的反对同盟的各项决定只是履行自己的义务罢了。代表大会不能让国际这个无产阶级的伟大创造陷入剥削阶级败类为它设置的罗网。至于那些想剥夺总委员会的职能的人，我们不能采取别的态度，只能把他们看做是叛徒或者傻瓜，因为失去这些职能国际就将变成一个无形的、涣散的，用同盟的语言来说就是“无定形的”东西。</p>
