<p>放。但是在俄国目前的发展水平下，有一点是毫无疑问的，就是一旦俄国失去波兰，俄国国内的运动就会壮大到足以推翻现存秩序的地步。波兰的独立和俄国的革命是互为条件的。但是，波兰的独立和俄国的革命——在社会、政治和财政无止境地崩溃下去的情况下，在贪污贿赂之风腐蚀着整个官方俄国的情况下，这个革命的爆发比乍看起来要快得多——对德国工人来说，就意味着德国的资产阶级和政府，简言之即德国的反动势力将只能依靠自己本身的力量了，而对于这些力量，随着时间的推移，我们自己是能够对付的。</p>
