<p>党人的诉讼中一向是出类拔萃的，而他的暴力行为却使我们的人加倍增长了。</p>
<p>这就是我们的人对所有暴力手段的回答，他们不仅不顾这些，而且甚至向它们挑战，把它们当做最好的鼓动手段。</p>
<p>致兄弟般的敬礼</p>
