<p>为强大，它不但席卷了欧洲的工人阶级，而且席卷了美洲的工人阶级；为了共同利益、反对共同敌人的共同斗争，将把工人们联结在一起，形成一个新的规模更大的自发的国际，这个国际将愈来愈超过协会的任何外在形式。</p>
