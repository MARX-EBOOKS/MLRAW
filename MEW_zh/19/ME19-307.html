<title>工人党</title>
</head>
<body>
<p>本家、小商人等阶级及其走狗——律师、新闻记者等等来照顾它的利益。难怪有利于工人的改革，是这样缓慢、这样可怜地一点点地实现。英国工人只要愿意，它是有力量实现他们的处境所要求的各项社会改革和政治改革的。那末，为什么不作这种努力呢？</p>

<div class="src">
弗·恩格斯写于 1881 年 7 月中<br>
作为社论载于 1881 年 7 月 23 日<br>
