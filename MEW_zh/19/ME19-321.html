<title>燕妮·马克思（冯·威斯特华伦）</title>

<body>
<p style="text-indent: 0;">为运动所做的事情，是社会公众看不到的，现代报刊的年鉴里也没有记载下来。这一切只有亲身经历的人才感受得到。但是我深信：那些巴黎公社流亡者的妻子们还会时常回忆起她，而我们也将时常为再也听不到她那大胆而合理的意见（大胆而不吹嘘、合理而丝毫不损尊严的意见）感到若有所失。</p>
<p align="right">1881 年 12 月 4 日于伦敦</p>
