<h1>*格奥尔格·维尔特</h1>
<h2>格奥尔格·维尔特的“帮工之歌”<br>(1846 年)<sup>[3]</sup></h2>
<p align="center">
樱花盛开的时节，<br>
我们找到了安身处，<br>
樱花盛开的时节，<br>
我们住到了法兰克福。
</p>
<p align="center">
饭馆老板对我们说：<br>
“你们的穿着真难看！”<br>
“你这讨厌的老板，<br>
这跟你有什么相干！”
</p>
<p align="center">
“把你的白酒给我们拿来，<br>
把你的啤酒给我们拿来，<br>
白酒和啤酒之外，<br>
再端来烤肉当菜！”
</p>
<p align="center">
酒桶龙头像雄鸡啼唱，<br>
酒也流得哗哗响。
</p>
