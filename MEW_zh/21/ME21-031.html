<title>第一版序言</title>
</head>
<body>
<p>在后面的叙述中，读者大体上很容易辨别出来，哪些是原来属于摩尔根的，哪些是我新补充的。在关于希腊和罗马历史的章节中，我没有局限于摩尔根的例证，而是补充了我所掌握的材料。关于克尔特人和德意志人的章节，基本上是属于我的；在这里，摩尔根所掌握的差不多只是第二手的材料，而关于德意志人的章节——除了塔西佗以外——还只是弗里曼先生的不高明的自由主义的赝品<sup>[31]</sup>。经济方面的论证，对摩尔根的目的来说已经很充分了，对我的目的来说就完全不够，所以我把它全部重新改写过了。最后，凡是没有明确引证摩尔根而做出的结论，当然都由我来负责。</p>
</body>
</html>
