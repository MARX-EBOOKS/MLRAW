<title>家庭、私有制和国家的起源</title>
</head>
<body>
<p style="text-indent: 0;">对不许服兵役和不许有武装的所谓无产者。</p>
<p>只是在那一位僭取了真正王权的最后一个勒克斯，即高傲的塔克文被驱逐以后，在两个拥有同等权力（像在易洛魁人那里那样）的军事首长（执政官）代替了一个勒克斯以后，这个新制度才得到了进一步的发展，而罗马共和国的全部历史也就在这个制度的范围内演变，这里包括，共和国的贵族与平民为了担任官职以及分享国有土地而进行种种斗争，最后贵族溶化在大土地所有者和金钱巨头的新阶级中，这种大土地所有者和金钱巨头逐渐吞并了因兵役而破产的农民的一切地产，并使用奴隶来耕种由此产生的广大庄园，把意大利弄到十室九空的地步，从而不仅给帝政而且也给帝政的后继者德意志野蛮人开辟了道路。</p>
