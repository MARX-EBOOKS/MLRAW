<title>九 野蛮时代和文明时代</title>
</head>
<body>
<p>所经过的时间，只是人类已经经历过的生存时间的一小部分，只是人类将要经历的生存时间的一小部分。社会的分解，即将成为以财富为唯一的最终目的的那个历程的终结，因为这一历程包含着自我消灭的因素。管理上的民主，社会中的博爱，权利的平等，普及的教育，将揭开社会的下一个更高的阶段，经验、理智和科学正在不断向这个阶段努力。<b>这将是古代氏族的自由、平等和博爱的复活，但却是在更高级形式上的复活。</b>（摩尔根“古代社会”第 552 页）<sup>[183]</sup></p>
