<title>马克思和洛贝尔图斯。“哲学的贫困”德文版序言</title>
</head>
<body>
<p>本版收入下列附录作为补充：（1）1859 年柏林出版的马克思“政治经济学批判”中论述<b>第一个</b>，即约翰·格雷提出的劳动货币交换乌托邦的一段，（2）马克思 1848 年在布鲁塞尔关于自由贸易的演说<sup>[210]</sup>的译文，这个演说和“哲学的贫困”属于作者的同一个发展时代。</p>

<p align="right"><b>弗里德里希·恩格斯</b></p>
<p align="right">1884 年 10 月 23 日于伦敦</p>

<br/>

<p style="float: left; width: 48%; text-indent: 0;">载于 1885 年 1 月“新时代”杂志<br>第 1 期和 1885 年在斯图加特出<br>版的卡尔·马克思“哲学的贫困”<br>一书</p>

<p style="float: right; width: 48%; text-align: right; text-indent: 0;">原文是德文<br>俄文是按 1892 年<br>德文版本译的</p>
