<title>“卡尔·马克思在科伦陪审法庭面前”一书序言</title>
</head>
<body>
<p>因此，德国小市民对德国社会民主工党的要求，就只有一个意义：这个党应当成为像小市民自己那样的小市民的党，决不要参加革命，而只是<em>忍受</em>革命。但是通过反革命和革命取得政权的政府也提出这样的要求，那就只能意味着：当革命由俾斯麦为了俾斯麦及其同伙而进行的时候，它就是好的，但是，当革命为了反对俾斯麦及其同伙而进行的时候，它就是坏的。</p>
<p align="right"><b>弗里德里希·恩格斯</b></p>
<p align="right">1885 年 7 月 1 日于伦敦</p>
