<title>不应该这样翻译马克思的著作</title>
</head>
<body>
<p>先生无论在哪一方面都不是一个能够翻译马克思著作的人，特别是因为他显然根本不了解什么是真正老老实实的科学工作。<sup><a id="ZM1" href="#M1">(1)</a></sup></p>
<div class="src">
写于 1885 年 10 月<br>
载于 1885 年 11 月“公益”<br>杂志第 10 期<br>
署名：弗里德里希·恩格斯
</div>
<div class="src">
原文是英文<br>
俄文译自“公益”杂志
</div>
<aside>
<p><a id="M1" href="#ZM1">(1)</a> 综上所述，可以看到，“资本论”不是一本可以根据合同来翻译的书。这本书的翻译工作正由卓越的翻译家们进行，但是，由于他们不能把自己的全部时间都投入这项工作，所以，耽误了。现在虽然还不能准确地确定出书日期，但是我们可以有把握地说，读者明年定能读到英文版的“资本论”。</p>
</aside>
