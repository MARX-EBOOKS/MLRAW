<p style="text-indent: 0;">开敌对地位的时代。</p>
<p>德国人的理论兴趣，现在只是在工人阶级中还没有衰退，继续存在着。在这里，它是根除不了的。在这里，没有对地位、利益的任何顾虑，没有乞求上司庇护的念头。反之，科学愈是毫无顾忌和大公无私，它就愈加符合于工人的利益和愿望。在劳动发展史中找到了理解全部社会史的锁钥的新派别，一开始就主要是面向工人阶级的，并且得到了工人阶级的同情，这种同情，它在官方科学那里是既寻找不到也期望不到的。德国的工人运动是德国古典哲学的继承者。</p>
