<title>“共产党宣言”1888 年英文版序言</title>
</head>
<body>
<p>度问题所提出的意见（第四章）虽然大体上至今还是正确的，但是由于政治形势已经完全改变，而当时所列举的那些党派大部分已被历史的发展进程所彻底扫除，所以这些意见在实践方面毕竟是过时了。</p>
<p>但是“宣言”是一个历史文件，我们已没有权利来加以修改。<sup>[406]</sup></p>
<p>本版译文是由译过马克思“资本论”一书大部分的赛米尔·穆尔先生翻译的。我同他一起把译文校阅过一遍，并且我还加进了一些历史备考性的附注。</p>
<p align="right">弗里德里希·恩格斯</p>
<p align="right">1888 年 1 月 30 日于伦敦</p>
