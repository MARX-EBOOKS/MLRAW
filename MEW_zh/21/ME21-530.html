<title>弗·恩格斯的遗稿</title>
</head>
<body>
<p>热。对俾斯麦的侮辱。——反社会党人法。<sup>[553]</sup>——对联合会的压制。——社会改革。——因兼并亚尔萨斯而产生的军国主义。——容克[在俾斯麦身上]突出到首位，因为缺乏其他思想。</p>
<table width="100%">
<tr>
<td>写于1887年12月底—1888年3月</td>
<td align="right">原文是德文</td>
</tr>
<tr>
<td>第一次用俄文发表于"马克思恩格斯文库"1948年版第10卷</td>
<td align="right">俄文是按手稿译的</td>
</tr>
