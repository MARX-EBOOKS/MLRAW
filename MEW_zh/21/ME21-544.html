<p>之后，起义军残部被迫退入瑞士。</p>
<p>在这次最后的战役期间，恩格斯是一支共产主义者志愿兵的队伍的指挥官维利希上校的副官。他参加了三次会战和最后一次在牟尔克河的决战。维利希上校流亡到美国，死时已膺将军衔，这是他在内战期间所得到的。</p>
<p>几千名起义者在既没有充分组织，又几乎没有火炮的情况下在开阔地的战斗中对于纪律严格的普军进行了顽强的抵抗，这表明我们莱茵河彼岸的社会主义者朋友在革命警钟响彻欧洲的那一天会做出什么事业来。</p>
