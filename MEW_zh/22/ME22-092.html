<title>给“社会民主党人报”读者的告别信</title>
</head>
<body>
<p style="text-indent: 2em;">进行暴动，因为暴动的结果毫无疑问会失掉二十五年来占领的一切重要阵地。</p>
<p style="text-indent: 2em;">党有一个更好得多的、经受住了考验的手段。一旦有人对普通法适用于我们这一点提出异议，“社会民主党人报”就会重新出现。为这种情况而保存下来的旧的机构将重新进行活动，这将是一个更加完善、更加有力和重新整顿了的机构。而且有一点是确定无疑的：下一次德意志帝国一定撑不住十二年。</p>
<p align="right">弗里德里希·恩格斯</p>
