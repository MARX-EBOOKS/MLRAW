<title>致“工人纪事周报”和“人民言论”编辑部</title>
</head>
<body>
<p style="text-indent: 0;">级斗争和力图推翻资产阶级资本主义世界秩序的工人政党。在匈牙利，如我从你们盛情寄给我的“工人纪事周报”上看到的，这个工人政党也在日益发展壮大；而且它具有这样一个优点，即从一开始它就是国际主义的政党，在它的队伍里联合着马扎尔人、德意志人、罗马尼亚人、塞尔维亚人和斯洛伐克人。我请你们向这个年轻的党转达我对它的代表大会的最良好的祝愿。</p>
<p align="center">国际社会民主党万岁！</p>
<p align="center">匈牙利党代表大会万岁！</p>
<p align="right"><b>弗里德里希·恩格斯</b></p>

<div class="src">载于 1890 年 12 月 14 日“工人纪事周报”第 50 号，并用匈牙利文载于 1890 年 12 月 14 日“人民言论”第 50 号</div>
<div class="src">原文是德文<br>俄文译自“工人纪事周报”</div>
