<title>布伦坦诺 CONTRA 马克思</title>
</head>
<body>
<p>的说法。</p>
<p>只有孤零零的一个“汉萨德”高傲地同所有这些报纸相对立。但是“汉萨德”是不像这些晨报那样难以驳倒的。“汉萨德”的报道要受检查，受发言人本人的检查。正因为如此，按一般惯例是根据“汉萨德”进行引证。</p>
<p>八个受到信任的证人对一个受到怀疑的证人！但是这和我们这位对胜利抱有信心的匿名作者有什么相干呢？<b>正因为</b>所有八家晨报的报道都把“这个声名狼藉的地方”强加在格莱斯顿身上，<b>正因为如此</b>，它们是在“为”匿名作者说话，它们恰恰正是以此证明马克思“增添”了这个地方！</p>
<p>的确没有什么能超过匿名的布伦坦诺的“厚颜无耻”了。</p>
