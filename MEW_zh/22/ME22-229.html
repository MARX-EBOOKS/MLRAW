</head>
<body>
<p>由的社会条件下成长起来的一代能够把这全部国家废物完全抛掉为止。</p>
<p>近来，社会民主党的庸人又是一听到无产阶级专政就吓得大喊救命。先生们，你们想知道无产阶级专政是什么样子吗？请看看巴黎公社吧。这就是无产阶级专政。</p>
<p align="right">弗·恩格斯<br>1891 年 3 月 18 日巴黎公社<br>二十周年纪念日于伦敦</p>
