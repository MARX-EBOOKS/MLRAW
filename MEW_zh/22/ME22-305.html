<title>致“人民之友报”编辑部</title>
</head>
<body>
<p style="text-indent: 0;">最大的喜悦：正当青年捷克的<sup>[260]</sup>和古老德国的资产者到处相互仇视的时候，捷克工人和德国工人却团结一致肩并肩地为整个无产阶级的解放而进行着斗争。</p>
<p>再一次衷心地感谢和祝贺你们。</p>
<p align="right">你们的老头 弗·恩格斯</p>

<div class="src">载于 1891 年 11 月 25 日<br>“人民之友报”第 22 号</div>
<div class="src">原文是德文<br>俄文译自“人民之友报”，<br>并根据草稿校对过</div>
