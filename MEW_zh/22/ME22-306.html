<h1>致“每日纪事报”编者的<br>声明的附函</h1>
<p style="text-indent: 0;">阁下：</p>
<p>兹对一项前所未有的无耻谰言<sup>[261]</sup>做一答复，随信寄上<sup><a id="ZF1" href="#F1">①</a></sup>，请予刊登，以明历史真相。</p>
<p>曾对英国工人阶级有过这样大贡献的“每日纪事报”，竟允许其外国通讯员对大陆上的工人运动及其领袖散布诽谤谰言，对此我感到遗憾。</p>
<p>谨致崇高的敬意</p>

<div class="src">写于 1891 年 11 月 17 日<br>
第一次用俄文发表于“马克思恩格斯全集”1940 年第 1 版第 28 卷</div>
<div class="src">原文是英文<br>俄文是按草稿译的</div>
<aside>
<p><a id="F1" href="#ZF1">①</a> 见本卷第 307—308 页。——编者注</p>
</aside>
