<title>关于已故的马克思夫人</title>
</head>
<body>
<p>牺牲因而根本做不出卑鄙之事的妇女去世之后破坏她的声誉。</p>
<p>阁下，我仍然是您的顺从的仆人</p>
<p align="right"><b>弗里德里希·恩格斯</b></p>
<p align="right">11 月 17 日于西北区<br>瑞琴特公园路 122 号</p>
<div class="src">载于 1891 年 11 月 26 日<br>“每日纪事报”第 9269 号</div>
<div class="src">原文是英文<br>俄文译自“每日纪事报”，并<br>根据草稿校对过</p>
</div>
