<h1 align="center">对卡·马克思“哲学的贫困”<br>德文第二版加的按语<sup>[284]</sup></h1>
<p>对于这第二版，我只想说几句话：在法文原文中霍吉斯金这个名字误作霍普金斯（第 45 页），现已改正；又威廉·汤普逊的著作的出版年份也已改为 1824 年<sup>[285]</sup>。希望安东·门格尔教授先生的图书学的良心将因此获得安慰。</p>
<p align="right"><b>弗里德里希·恩格斯</b></p>
<p align="right">1892 年 3 月 29 日于伦敦</p>
