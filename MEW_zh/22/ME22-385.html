<p><b>场所</b>。<b>因此，</b>在铁路、银行等等方面，<b>在纯属美国的投资场所，在印度贸易方面</b>的过分兴旺的投机活动，就使得危机没有可能发生，而同时小的危机却是可能的，例如已历时三年的阿根廷危机<sup>[330]</sup>。但是，所有这一切都证明，<b>特大的危机</b>在酝酿中。</p>
