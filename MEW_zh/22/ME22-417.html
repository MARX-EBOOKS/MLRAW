<p style="text-indent: 0;">France vaut bien une Marseillaise——很值得为法国奏一次“马赛曲”，这是亚历山大三世在他政治上无能为力，毫无出路的最紧张时刻而海军上将热尔韦却把法国奉献给他<sup>[385]</sup>时说过的话。</p>
