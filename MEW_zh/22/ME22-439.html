<p>因此，可以借以满足裁军需要的就只剩下一点了，这就是现役期。这里也正是阿基米得的支点所在：由大陆各大国协商，对一切兵种的最长现役期作国际性的规定，开头可以规定为两年，但是要预先说明，这个期限在将来一旦认为可能缩短时就立刻缩短，并宣布以民兵制度作为最终目的。我肯定说，正是德国首先应当提出这个建议，而且正是德国首先会因为提出这个建议而得到好处，即使这个建议不被接受。</p>
