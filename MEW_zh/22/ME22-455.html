<title>欧洲能否裁军？——五</title>
</head>
<body>
<p>边境线上的俄国军队，将在自己的国境内处于敌人的领土上，陷入波兰人和犹太人的包围中，因为沙皇政府把犹太人也变成了自己的死敌。只要俄国打了一两次败仗，战场就会从维斯拉河转向德维纳河和德涅泊河；在德军后方，在德军的保护下，就将建立起一支德军的波兰盟军；不过，如果普鲁士为了本身的安全而不得不去恢复强大的波兰，那它将受到应得的惩罚。</p>
<p>到现在为止我们仅仅考察了问题的纯军事方面，我们深信，在这个问题上可以不把俄国考虑进去。但是，只要我们看一下俄国的一般经济状况，特别是财政状况，这一点就更明显了。</p>
