<title>为庆祝 1893 年五一节给奥地利工人的贺信</title>
</head>
<body>
<p>件，这个节日要退居次要地位。对于奥地利人来说，它不仅是国际的问题，而且也是，也许还主要是国内的问题；因此在他们那里，它无疑始终是居于首要地位。</p>
<p>但愿今年的五一节也像以往那样过得有声有色。</p>
