<p>然而从 5 月 2 日到 5 月 1 日的进步是多么巨大啊！5 月 1 日标志着一个清楚而明显的形势——出现了两个截然不同和彼此对立的阵营：一边是在普遍解放的红旗下走向胜利的国际无产阶级，而另一边是为了维护自己的剥削特权而联合起来的各国有产阶级和反动阶级。斗争已经开始，红旗已经展开，胜利已有保障。前进！</p>
