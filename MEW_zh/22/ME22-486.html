<h1>致伦敦德意志工人共产主义教育协会</h1>
<p align="right">1893 年 12 月 1 日于伦敦西北区<br>瑞琴特公园路 122 号</p>
<p style="text-indent: 0;">尊敬的同志：</p>
<p>请您转达我对共产主义工人教育协会理事会和会员们的最真诚的谢意，感谢他们对我七十三岁生日的盛情祝贺。祝协会永久繁荣，愿它永远高举它在英国这里第一次举起的老的红旗！</p>
<p>致真挚的敬礼</p>
<p align="right">弗·恩格斯</p>
<aside>
<p>第一次用俄文发表于“马克思恩格斯全集”1946 年第 1 版第 29 卷</p>
<p align="right">原文是德文</p>
<p align="right">俄文是按手稿译的</p>
</aside>
