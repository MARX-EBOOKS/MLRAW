<title>未来的意大利革命和社会党</title>
</head>
<body>
<p>些先生们加入政府就完全瘫痪了他们声称自己代表着的工人阶级的革命活动。</p>
<p>所有这些都仅仅是我个人的意见；我只是应你的要求才提出来，而且是颇为踌躇的。至于一般的策略，在我的一生中我已确信到它的正确性；它从来没有使我失望过。但是说到怎样把它运用到意大利目前的状况，那是另一回事；这必须因地制宜地决定，而且必须由处于事变中心的人来决定。</p>
</div>
<div class="src">写于1894年1月26日<br>署名:弗里德里希·恩格斯</div>
