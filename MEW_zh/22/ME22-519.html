<h1>为纪念巴黎公社二十三周年<br>致法国工人党全国委员会</h1>
<p align="right">1894年3月18日于伦敦</p>
<p>我同你们一起为国际的3月18日的即将来临而干杯，这个日子将带来无产阶级的胜利，从而消灭阶级对抗和各民族之间的战争，并在各文明国家中实现和平和幸福。</p>
<p align="right">恩格斯</p>

<div class="src">载于 1894 年 3 月 25 日<br>"社会主义者报"第 183 号</div>
<div class="src">原文是法文<br>俄文译自"社会主义者报"</div>
