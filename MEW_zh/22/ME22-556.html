<html>
<head>
<title>致意大利劳动社会党第三次代表大会</title>
</head>
<body>
<p>法国和德国工人所做到的事情，意大利工人也同样能做到。梯也尔、麦克马洪和俾斯麦所未能得到的东西，姓克里斯比的也是得不到的。胜利属于你们!<sup><a id="ZF1" href="#F1">1</a></sup></p>
<p>革命的国际社会主义万岁!</p>
<p>致兄弟般的敬礼</p>
<p align="right"><b>弗里德里希·恩格斯</b></p>

<div class="src">译成意大利文载于 1894 年 9 月 22—23 日“阶级斗争”周报第 38 号</div>
<div class="src">原文是法文<br>俄文译自“阶级斗争”周报，并根据法文草稿校对过</div>
<aside>
<p><a id="F1" href="#ZF1">1</a> 在手稿中不是“属于你们!”，而是“属于我们!”——编者注</p>
</aside>
</body>
</html>
