<title>给西西里岛社会党人的贺信</title>
</head>
<body>
<p style="text-indent: 0;">地，难道他们不会感到幸福吗？这就是资本主义制度所造成的结果：自由人在怀念过去的奴隶制！</p>
<p>但愿他们不要丧失勇气。一个更好的新社会的曙光正在开始照亮各国被压迫阶级。而各地的被压迫群众都在团结自己的队伍，他们不顾边界的限制，不顾语言的差别，到处在相互达成协议。国际无产阶级大军正在形成，——即将来临的新时代将使它获得胜利！</p>
<p align="right"><b>弗·恩格斯</b></p>
<p align="right">（伦敦）</p>
