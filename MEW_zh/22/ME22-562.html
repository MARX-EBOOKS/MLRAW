<title>给“前进报”编辑部的信</title>
</head>
<body>
<p style="text-indent: 0;">私有者，而且永远保存剥削别人劳动的小佃农方面将是孤立的。</p>
<p>因此，如果我就这个问题发表了意见的话，那末我所说的就恰好是同福尔马尔所听说的相反的东西。</p>
<p>但是，既然我已被牵连进来，那末，看来除了把我的观点说得更明确之外，没有其他的办法了。因此我打算在“新时代”上登载一篇不长的文章，说明和论证我的观点<sup><a id="ZF1" href="#F1">1</a></sup>。</p>
<p align="center">弗·恩格斯</p>
<p align="right">1894 年 11 月 12 日于伦敦</p>
