<h1 align="center">致伦敦德意志工人<br>共产主义教育协会</h1>
<p align="right">1894 年 12 月 6 日于伦敦西北区<br>瑞琴特公园路 41 号</p>
<p>尊敬的同志：</p>
<p style="text-indent: 2em;">请您转达我对协会的真诚的谢意，感谢它对我的生日的友好祝贺。我希望，四年前已经纪念过成立五十周年的协会能像我这样活到七十四岁，并且到那时候它仍旧那样精神饱满，朝气蓬勃，能够再庆祝自己的一百周年。</p>
<p align="center">致真挚的敬礼</p>
<p align="right">您的 弗·恩格斯</p>
<table style="width: 100%; border: none;">
<tr>
<td style="width: 50%; text-align: left; vertical-align: top;">

</td>
<td style="width: 50%; text-align: right; vertical-align: top;">
<p>原文是德文<br>俄文是按手稿译的</p>
</td>
</tr>
