<h1>致伦敦德意志工人<br>共产主义教育协会理事会</h1>
<p align="right">1895 年 3 月 11 日于伦敦西北区<br>瑞琴特公园路 41 号</p>
<p>尊敬的同志：</p>
<p style="text-indent: 2em;">很遗憾，这次我不能参加你们的三月节日活动了。由于疾病又一次发作，虽说不严重，可是治疗要求绝对安静，所以我又要被困在家里好几个星期了。我希望，你们的节日活动不至于因我缺席而减色。</p>
<p style="text-indent: 2em;">致最好的祝愿</p>
<p align="right">您的 弗·恩格斯</p>
<div style="overflow: hidden; margin-top: 2em; font-size: 0.9em;">
<p style="float: left; width: 50%; margin: 0;">第一次用俄文发表于“马克思恩格斯全集”1946 年第 1 版第 29 卷</p>
<p style="float: right; width: 50%; margin: 0; text-align: right;">原文是德文<br>俄文是按手稿译的</p>
</div>
