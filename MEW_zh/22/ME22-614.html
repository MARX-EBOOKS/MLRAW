<h1>致独立工党执行委员会<sup>[524]</sup></h1>
<p>我衷心感谢执行委员会的盛情邀请，然而我无法赴邀，因为给我治病的医生坚决反对我此刻接受任何邀请。鉴于入场券可能对别人还有用，因此我不揣冒昧，将它随信奉还。</p>

<div class="src">写于 1895 年 4 月下半月<br>第一次用俄文发表于“马克思恩格斯全集”1946 年第 1 版第 29 卷</div>
<div class="src">原文是英文<br>俄文是按草稿译的</div>
