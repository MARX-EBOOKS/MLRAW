<title>弗·恩格斯对法国“闪电报”记者的谈话</title>
</head>
<body>
<p>取得政权的唯一手段。如果法国同俄国结成同盟进攻德国，德国将为保卫民族的生存而进行殊死的斗争，而对于民族的生存，德国社会党人远较资产者更为关心。因此社会党人将战到最后一人，并且将毫不犹豫地采取 1793 年法国采用过的革命手段。”</p>

<div class="src">载于 1892 年 4 月 6 日“闪电报”，<br>并摘要载于 1892 年 4 月 16 日<br>“社会主义者报”第 82 号</div>
