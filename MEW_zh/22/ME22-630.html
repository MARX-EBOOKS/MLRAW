<p>样说，我们可以确定大部分居民转到我们这边来的时间，我们的思想既在工人当中，也在教师、医生、法学家和其他人当中到处传播。如果明天我们必须掌握政权，我们就需要工程师、化学家、农艺师。我坚信，他们当中有许多人已经准备同我们在一起。再过五年或者十年，这样的人材在我们这里将会超过我们所能使用的数量。”</p>
<p>听了这些充满乐观精神的话以后，我就向弗·恩格斯先生告辞了。</p>
