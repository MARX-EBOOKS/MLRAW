<p>“一个人长得漂亮是环境造成的，会写字念书才是天生的本领”<sup><a id="ZM36" href="#M36">(36)</a></sup>。</p>
<aside>
<p><a id="M36" href="#ZM36">(36)</a> 《评政治经济学上的若干用语的争论》一书的作者和赛·贝利责备李嘉图，说他把交换价值从一种只是相对的东西变成一种绝对的东西。恰恰相反，李嘉图是把金刚石、珍珠这种物在作为交换价值时所具有的表面的相对性，还原为这种外表所掩盖的真实关系，还原为它们作为人类劳动的单纯表现的相对性。如果说李嘉图派对贝利的答复既粗浅而又缺乏说服力，那只是因为他们在李嘉图本人那里找不到关于价值和价值形式即交换价值之间的内部联系的任何说明。</p>
</aside>
