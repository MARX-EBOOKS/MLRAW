<body>
<p style="text-indent: 0;">件商品等等。因此，在麦克库洛赫、尤尔、西尼耳之流的经济家的著作中，在这一页可以读到，工人应当感谢资本发展了生产力，因为这种发展缩短了必要劳动时间，在下一页接着就会读到，工人为了表示这种感谢，以后必须劳动 15 小时，以代替原来的 10 小时。</p>
<p>在资本主义生产中，发展劳动生产力的目的，是为了缩短工人必须为自己劳动的工作日部分，以此来延长工人能够无偿地为资本家劳动的工作日的另一部分。</p>
<p>在商品没有变便宜的情况下，究竟会在多大的程度上达到这个结果，我们在下面考察相对剩余价值的各种特殊的生产方法时，就可以看到。</p>
