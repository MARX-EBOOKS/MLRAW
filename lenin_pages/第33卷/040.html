<p class='title1'>经济措施纲要草稿</p>
<p class='date'>（不早于1917年11月27日〔12月10日〕）</p>
<br>
<br>
　　银行国有化<br>
　　货币回笼<br>
　　大额票面的新币<br>
　　是采取革命措施使工厂转向有益的生产<br>
　　用强迫参加消费合作社的办法使消费集中&nbsp;<br>
　　国家垄断对外贸易<br>
　　工业国有化<br>
　　公债。<br>
<br>
<br>
