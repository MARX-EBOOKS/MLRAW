<p class='title1'>人民委员会关于赋予副人民委员在人民委员会会议上的表决权问题的决定草案<font size="3">[145]</font></p>
<p class='date'>（1918年1月23日〔2月5日〕）</p>
<br>
<br>
　　人民委员缺席时，副人民委员可以出席人民委员会的会议并享有表决权，但是，这些副人民委员必须是人民委员会作出决定，从相应的人民委员部部务委员中任命的。<br>
<br>
<br>
