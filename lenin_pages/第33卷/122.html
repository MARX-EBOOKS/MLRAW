<p class='title1'>在全俄中央执行委员会布尔什维克党团<br>
和左派社会革命党党团联席会议上的讲话</p>
<p class='date'>（1918年2月19日）</p>
<h3 style="text-align: center">简要报道</h3><br>
<br>
　　列宁的长篇讲话持续两小时。在讲话中，他阐发了下列论点：俄国没有别的出路，必须立即单独媾和，因为德国人正在以大批兵力在全线展开进攻，而我们是无力抵抗百万大军的进攻的。缔结和约后，我们就能处理国内事务和深入进行社会主义革命，就能顺利地完成那些必将使我们在俄国尽快实行社会主义制度的根本改革。<br>
<br>
