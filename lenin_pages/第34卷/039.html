<p class='title1'>对粮食专卖法令的补充</p>
<p class='date'>（1918年5月9日）</p>
<br>
<br>
　　凡有余粮而不把余粮运到收粮站者以及滥用存粮酿私酒者一律宣布为人民的敌人，交革命法庭判处10年以上的徒刑，没收全部财产，永远驱逐出村社；对酿私酒者还要处以强制性的社会劳动。<br>
<br>
