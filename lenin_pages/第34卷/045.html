<p class='title1'>《当前的主要任务》小册子序言</p>
<p class='date'>（1918年5月17日）</p>
<br>
<br>
　　这本小册子收集了两篇报纸上的文章：一篇收自1918年3月12日《中央执行委员会消息报》，另一篇收自1918年5月9―11日《真理报》。<font color="#003E00"><span style="font-size: 10.5pt">［注：见本卷第73―77、264―293页。――￥1￥编者注］</span></font>这两篇文章从不同的角度论述了这本小册子的标题所表明的同一个问题。<br>
