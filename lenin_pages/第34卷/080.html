<p class='title1'>俄罗斯联邦宪法第二章第二十条草稿<font size="3">[207]</font></p>
<p class='date'>（1918年7月5日以前）</p>
<br>
<br>
　　俄罗斯联邦承认在共和国领土上从事生产劳动的外国劳动者享有同俄国公民完全平等的公民权利和政治权利。<br>
<br>
<br>

<br>
