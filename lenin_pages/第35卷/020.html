<p class='title1'>关于贫苦农民委员会没收富农种子粮的问题</p>
<p class='date'>（不晚于1918年8月30日）</p>
<br>
<br>
　　是否应当补充一点？<br>
　　让贫苦农民委员会从富农那里<b>没收</b>种子粮，无论如何要这样做，如果现在不行，以后也得向富农征收――先暂时从地主农场拿出一部分粮食交给贫苦农民作种子。<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：建议是针对哪个文件提出的，未能确定。――俄文版￥1￥编者注］</span></font><br>
