<p class='title1'>对国防委员会关于加强军事防御工作的决定的意见<font size="3">[99]</font></p>
<p class='date'>（不晚于1919年4月21日）</p>
<br>
<br>
　　中央和地方的各人民委员部中，凡非绝对必要的部门和能向军队和后方提供有用人员从事战争、供给、宣传等工作的部门，均应暂停工作三个月或大幅度压缩编制。<br>
<br>
<br>

　　<b>注释：</b><br><br>　[99]1919年4月21日，列宁在国防委员会的会议上作了《关于加强军事防御工作的报告》。这个文件看来是关于这个问题的决定的结尾部分的初稿。——[309]。<br>
