<p class='title1'>人民委员会经济委员会关于改善工人生活状况的决定草案<font size="3">[103]</font></p>
<p class='date'>（1919年5月2日）</p>
<br>
<br>
　　（1）加强对工人子女的实物救济。<br>
　　（2）拨出一定的库存，<B>迅速</B>清点，低价配售给没有起码现金<B>收入</B>的最贫困的工人。<br>
　　（3）房租也如此。<br>
<br>
<br>
