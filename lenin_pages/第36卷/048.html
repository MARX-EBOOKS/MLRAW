<p class='title1'>工农国防委员会关于征召商业、工业、运输业工人和职员服兵役的法令</p>
<p class='date'>（1919年5月31日）</p>
<br>
<br>
　　兹宣布，作为补充动员，征召商业、工业和运输业工人和职员服兵役。征召手续、期限和数量由共和国革命军事委员会、最高国民经济委员会主席团和全俄工会中央理事会商定。<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：在法令打字稿的上方列宁签了字并作了批示：“不公布”。――俄文版￥1￥编者注］</span></font><br>
<br>
