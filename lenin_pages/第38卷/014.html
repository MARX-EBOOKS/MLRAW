<p class='title1'>俄共（布）中央政治局关于协约国企图通过俄国合作组织开始同俄国建立贸易关系问题的决定</p>
<p class='date'>（1920年1月17日或18日）</p>
<br>
<br>
　　鉴于协约国企图通过合作社进行商品交换，公然打算利用合作社这一机构来复辟资本主义，中央委员会责成中央消费合作总社主席、粮食人民委员部、最高国民经济委员会主席以及商业人民委员部根据上述看法特别仔细地讨论一下合作社问题，并立即制定措施，保证我们完全掌握合作社机构，首先要掌握那些可能进行商品交换的地点（乌克兰、远东）的所有合作社机构。<br>
