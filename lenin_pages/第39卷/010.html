<p class='title1'>在莫斯科第一机枪训练班红色指挥员第十一届毕业典礼上的讲话</p>
<p class='date'>（1920年5月12日）<br>
<br>
采访记录</p>
<br>
　　列宁向刚提升为红色指挥员的毕业生发表讲话，指出一个红色指挥员应该抱着什么目的奔赴西方战线。红色指挥员应该记住，我们不是同波兰的工人和农民作战，而是同波兰资产阶级和地主以及站在他们背后并指挥波兰老爷们的协约国资本家作战。列宁同志说，你们知道，这场战争是违背我们的意愿强加给我们的，但是我们决不让他们扼杀我们：宁死也不能失败。<br>
