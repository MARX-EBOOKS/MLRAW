<p class='title1'>对人民委员会关于高等学校必修科目的决定草案的补充</p>
<p class='date'>（1921年3月5日）</p>
<br>
<br>
　　根据全俄苏维埃第八次代表大会的决议，应加上：<br>
　　　　电气化计划，<br>
　　　　它的经济原理，<br>
　　　　俄国经济地理，<br>
　　　　实行计划的意义和条件。<br>
<br>
