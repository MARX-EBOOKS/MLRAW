<p class='title1'>就全俄中央执行委员会关于取消货币税的决定草案向俄共（布）中央政治局提出的建议<font size='3'>[68]</font></p>
<p class='date'>（1921年3月16日）</p>
<br>
<br>
　　我建议撤销（由于实行实物税和准备实行银本位制）。<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
