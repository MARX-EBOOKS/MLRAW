<p class='title1'>俄共（布）中央政治局关于坦波夫省的收购工作的决定草案<font size='3'>[69]</font></p>
<br>
　　3月19日<br>
<p class='date'>征求政治局各委员意见</p>
<br>
　　为撤销中央关于在坦波夫省完全停止收购的决定，兹决定：<br>
　　在坦波夫省只允许收购大量饲料，并且只供在当地剿匪的军队之需。<br>
<br>
