<p class='title1'>关于考察党员负责干部的一条意见<font size="3"><sup>[97]</sup></font></p>
<p class='date'>（1921年10月8日）</p>
<br>
<br>
	　　应仔细研究如何摸清党员负责干部情况的问题，看每个人适合做哪一级的工作和什么性质的工作，即使先把莫斯科市和一个省的情况摸清也好。<br>
<br>
<br>

	　　<b>注释：</b><br><br>
	　　[97] 1921年10月8日，俄共（布）中央全会根据维・米 
	・莫洛托夫关于负责工作人员的登记分配办法的报告作出了一项决议。列宁的这条意见写入了该决议。――158。<br>
