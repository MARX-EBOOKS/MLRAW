<p class='title1'>俄共（布）中央政治局关于社会保险的决定草案<font size="3"><sup>[100]</sup></font></p>
<p class='date'>（1921年10月10日）</p>
<br>
<br>
	　　委托全俄工会中央理事会主席团会同最高国民经济委员会、卫生人民委员部和社会保障人民委员部研究解决在实行新经济政策条件下的工人保险问题。<br>
<br>
<br>

<br><hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
	　　<b>注释：</b><br><br>
	　　[100] 
	这个决定草案由俄共（布）中央政治局于1921年10月10日通过。11月15日，人民委员会批准了《关于从事雇佣劳动人员的社会保险的法令》。―― 162。<br>
</span>
