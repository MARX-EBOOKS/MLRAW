<p class='title1'>在电力三厂（原“狄纳莫”厂）工人庆祝十月革命四周年大会上的讲话</p>
<p class='date'>（1921年11月7日）<br>
<br>
简要报道</p>
<br>
<br>
　　列宁同志用鲜明的例子证明，劳动人民愈来愈清楚地认识到苏维埃政权的意义，深信这样的政权是劳动者自己的政权。<br>
　　列宁同志说：“带枪的人过去在劳动群众的印象中是可怕的，现在已经不可怕了，因为他是红军的一员，是劳动群众的保卫者。”<br>
　　（列宁同志的讲话在雷鸣般的掌声中结束）<br>
