<p class='title1'>俄共（布）中央政治局关于出版格・瓦・普列汉诺夫文集的决定<font size="3">[134]</font></p><p class='date'>
（1922年4月27日）</p>
<br>
<br>
　　委托加米涅夫同志同捷尔同志商谈一下，将普列汉诺夫的革命著作编成一本文集出版。<br>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
译自《列宁全集》俄文第5版第45卷第166页<br>
</td></tr></table></div>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br><br>
　　[134]出版格・瓦・普列汉诺夫文集的问题是列宁向俄共（布）中央政治局提出的。在苏共中央马克思列宁主义研究院中央党务档案馆保存的1922年4月27日政治局会议议程表上，列宁在19项议程之后亲笔增加了一项：“普列汉诺夫文集”。――171。
</span>
