<p class='title1'>致《真理报》</p><p class='date'>
（1922年11月2日）</p>
<br>
<br>
　　亲爱的同志们：值此十月革命五周年之际，我热烈地祝贺你们。祝我们在今后的五年中，能争取到而且是和平地争取到不亚于过去用武力争取到的成就。<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
　你们的　<b>列宁</b><br>
　　1922年11月2日<br>
<br>
载于1922年11月7日《真理报》第252号<br>
