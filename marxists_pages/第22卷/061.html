<p class='title1'>致伦敦德意志工人共产主义教育协会</p>
<br>
<p align="right">1893年12月1日于伦敦西北区瑞琴特公园路122号</p>
<br>
尊敬的同志：<br>
　　请您转达我对共产主义工人教育协会理事会和会员们的最真诚的谢意，感谢他们对我七十三岁生日的盛情祝贺。祝协会永久繁荣，愿它永远高举它在英国这里第一次举起的老的红旗！<br>
　　致真挚的敬礼<br>
<br>
<br>
