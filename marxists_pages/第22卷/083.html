<p class='title1'>致伦敦德意志工人共产主义教育协会理事会</p>
<br>
<p align="right">1895年3月11日于伦敦西北区瑞琴特公园路41号</p>
<br>
尊敬的同志：<br>
　　很遗憾，这次我不能参加你们的三月节日活动了。由于疾病又一次发作，虽说不严重，可是治疗要求绝对安静，所以我又要被困在家里好几个星期了。我希望，你们的节日活动不至于因我缺席而减色。<br>
　　致最好的祝愿<br>
<br>
<br>
