<p class='title1'>马克思致《总汇报》编辑部</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
奥格斯堡<br>
1844年4月14日于巴黎<br>
</td></tr></table></div>
<h3 style="text-align: center">声明</h3>
　　在德国各报上出现的关于《德法年鉴》停刊的种种谣言，使我不得不声明：瑞士的出版社由于经济原因突然拒绝这项工作，因而使杂志在最近期间不能继续出版。[350]<br>
<br>
<p align="right"><b>卡尔・马克思</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[350]《德法年鉴》杂志是在苏黎世弗吕贝尔出版社的印刷所里排印的（见本卷第446―447页）。除了马克思在这封信中所指出的原因外，马克思和卢格之间的意见分歧对杂志的停刊起了很大的作用（见注8）。――第449页。<br>
</span>
