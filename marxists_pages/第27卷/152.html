<p class='title1'>马克思致尤利乌斯・康培<font size="3">[356]</font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
汉堡<br>
1844年10月7日［于巴黎］<br>
</td></tr></table></div>
<br>
　　……如果海涅还在汉堡，就请您对他寄来的诗转致谢意。到目前为止，我还没有发表关于这些诗的报道，因为我想同时报道第一部分――叙事诗……<br>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[356]马克思这封信的原件没有找到。所引的这一段是弗・希尔特在《亨利希・海涅和卡尔・马克思》一文中发表的（《金门》（《Das　Goldene　Tor》）杂志1947年第2年卷第11/12期）。――第453页。<br>
</span>
