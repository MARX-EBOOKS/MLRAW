<p class='title1'>马克思致阿尔诺德・卢格</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
巴黎<br>
1845年［1月于巴黎］<br>
</td></tr></table></div>
<p class='author'>致卢格博士先生</p>
<br>
　　我从可靠方面得知，警察局有命令，责令您、我和其他一些人在二十四小时以内离开巴黎，并且在最短期限以内离开法国。[25]进一步的细节伯恩施太因会告诉您。我认为应该把这个消息告诉您，怕万一您还不知道。<br>
<br>
<p align="right"><b>卡・马克思</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[25]马克思由于参加《前进报》的编辑工作而被驱逐出法国。驱逐令是法国政府在普鲁士的压力下在1845年1月发布的。1845年2月3日马克思从巴黎迁往布鲁塞尔。――第22、456页。<br>
</span>
