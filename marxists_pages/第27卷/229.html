<p class='title1'>马克思致海尔曼・贝克尔<font size="3">[431]</font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
科伦<br>
1851年4月9日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的贝克尔：<br>
　　附上金克尔派的一篇可笑的拙劣文章。这里为同盟<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：共产主义者同盟。――￥1￥编者注］</span></font>筹集了十五先令。还差十先令，这笔款子已经有人认捐，但是钱还没有拿到。我将按照你的建议行事。请让我负担一英镑吧。应该付五先令的那个会员的生活状况更加恶化，这笔钱拿不到了……<br>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[431]马克思的这封信的原件没有找到。本文是科伦共产党人案件的起诉书中所引用的一段。――第572页。<br>
</span>
