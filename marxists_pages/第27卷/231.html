<p class='title1'>马克思致罗兰特・丹尼尔斯<font size="3">[432]</font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
科伦<br>
［1851年5月于伦敦］<br>
</td></tr></table></div>
　　……共产主义者应当指出，只有在共产主义关系下，工艺学上已经达到的真理方能在实践中实现……<br>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[432]马克思的这封信的原件没有找到。本文摘自丹尼尔斯1851年6月1日致马克思的复信。――第575页。<br>
