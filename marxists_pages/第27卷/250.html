<p class='title1'>马克思致特利尔市市长格尔茨</p>
<br>
<p align="right">［1845年］10月17日于布鲁塞尔卢万门外同盟路5号</p>
<br>
阁下：<br>
　　恳请极可尊敬的王国特利尔行政区政府发给我一份迁居北美合众国的许可证。我的免服普鲁士王国兵役的证明[460]，应该是在特利尔市长公署或者王国特利尔行政区政府。<br>
<br>
<p align="right">忠实于阁下的　<b>卡尔・马克思</b>博士</p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[460]1838年马克思因肺病免于在柏林服兵役，1841年马克思被认为不适于服兵役。――第623页。<br>
</span>
