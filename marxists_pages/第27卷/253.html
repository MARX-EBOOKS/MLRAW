<p class='title1'>马克思致科伦警察局</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
科伦<br>
1848年4月13日于科伦使徒街7号<br>
</td></tr></table></div>
<p align="center">致可敬的警察局</p>
<br>
　　我恳请贵局向有关机关为我申请科伦市的公民权<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见《马克思恩格斯全集》中文版第5卷第451―454页。――￥1￥译者注］</span></font>。我于1818年5月5日生于特利尔，在该城读中学，后在波恩和柏林读大学，1842年和1843年住在科伦，任前《莱茵报》编辑。因该报停刊，我去国外并放弃了普鲁士公民权。事变发生以后，我回到祖国，现拟同我全家住入科伦。<br>
　　谨致敬意。<br>
<br>
<p align="right"><b>卡尔・马克思</b>博士</p>
<br>
