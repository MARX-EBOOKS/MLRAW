<p class='title1'>马克思致警察局长盖格尔</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
科伦<br>
1848年8月5日于科伦<br>
</td></tr></table></div>
警察局长盖格尔阁下：<br>
　　兹通知阁下，我对您所发出的公函<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：指警察局于1848年8月3日致马克思的复函（见《马克思恩格斯全集》中文版第5卷第452页）。――￥1￥译者注］</span></font>已立即向内务部提出申诉，我认为自己象过去一样仍是德国公民。<br>
<br>
<p align="right">《新莱茵报》总编辑　<b>卡尔・马克思</b>博士</p>
