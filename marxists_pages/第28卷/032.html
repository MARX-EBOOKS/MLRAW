<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
［1852年］5月13日于［伦敦］索荷区第恩街28号<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　今天只给你写几行。老赛雷耳梅伊已经完成了自己的第一分册，现在他为他的会战一书写广告<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第58―59页。――￥1￥编者注］</span></font>的事每天纠缠我。如果你现在没有可能做这件事，那末至少请你赶快把他的草稿寄还给我。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
