<p class='title1'>恩格斯致马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1852年5月21日于曼彻斯特<br>
</td></tr></table></div>
<br>
亲爱的马克思：<br>
　　我的老头<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：恩格斯的父亲老弗里德里希・恩格斯。――￥1￥编者注］</span></font>已经走了。一切都很好。附上十英镑银行券的前半截。希望下星期末能在这里看到你。你的来信可能现在已经在我家里了，但是我没有时间回去。银行券的后半截将交今天第二次邮班或于明天寄出。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
<br>
