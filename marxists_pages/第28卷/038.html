<p class='title1'>恩格斯致马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1852年6月30日于曼彻斯特<br>
</td></tr></table></div>
<br>
亲爱的马克思：<br>
　　你们不是在那里埋头誊写手稿<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡・马克思和弗・恩格斯《流亡中的大人物》。――￥1￥编者注］</span></font>，就是发生了什么不愉快的事情，不然我早已收到你的消息。现附上魏德迈的信和剪报。<br>
　　你那个装科伦信件的小信夹子已经找到了，――我今天没有把它带来，否则就随信一起给你寄去了。<br>
　　衷心问候――匆匆。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
