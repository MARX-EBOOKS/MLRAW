<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1852年10月20日于伦敦索荷区第恩街28号<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　介绍持信人普莱耶耳上校来见你。虽然我自己不认识他，但他是由你认识的班迪亚上校“竭诚”推荐的。<br>
<br>
<p align="right">你的　<b>卡・马克思</b></p>
