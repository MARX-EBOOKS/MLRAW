<p class='title1'>恩格斯致马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1854年7月6日星期四［于曼彻斯特］<br>
</td></tr></table></div>
<br>
亲爱的马克思：<br>
　　希望五英镑已经收到。附上为明天写的一篇关于战争的第一阶段的文章<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：弗・恩格斯《多瑙河战争》。――￥1￥编者注］</span></font>。<br>
　　如果这些家伙真要把法国士兵送到波罗的海，那末他们至少必须占领阿兰群岛。这是上策。<br>
　　附上一首宗教诗歌。我想知道：<br>
　　（1）<b>它是哪一世纪的</b>？<br>
　　（2）<b>作者是谁</b>？<br>
　　请马上回答。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
