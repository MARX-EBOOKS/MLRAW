<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1855年3月16日于［伦敦］<br>
索荷区第恩街28号<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　我不相信可爱的穆希<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：埃德加尔・马克思。――￥1￥编者注］</span></font>会对付住疾病。你知道这种前景对我们家有多大的影响。我的妻子又完全垮了。现在事情无论如何很快就会见分晓。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
