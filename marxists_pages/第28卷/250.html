<p class='title1'>马克思致阿道夫・克路斯[517]</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
华盛顿<br>
1852年8月初于伦敦］<br>
</td></tr></table></div>
<br>
　　……为什么对科伦人<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：被捕并在科伦受审的共产主义者同盟盟员。――￥1￥编者注］</span></font>的审判又没有举行，这个秘密现在被发现了。主要证人、叛徒、汉堡的豪普特逃到巴西去了。第二个重要证人裁缝帮工也溜走了。这样，在政府那里连一点证据的影子也没有了。这个卑鄙的政府以拖延审前羁押来为自己的失败进行报复……<br>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[517]这封信只找到克路斯1852年10月15日给魏德迈的信中所引用的一小段。――第545页。<br>
</span>
