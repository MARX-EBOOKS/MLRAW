<p class='title1'>燕妮・马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
［1854年3月底于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的恩格斯先生：<br>
　　卡尔请您<b>立即</b>把拉萨尔的地址寄来。您没有把拉萨尔的第一封信退回来，那上面有他的地址。<br>
　　全家向您致最友好的问候。<br>
<br>
<p align="right">您的　<b>燕妮・马克思</b></p>
