<h4 style="text-align: center">18．</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1856年<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：在手稿中，年份是恩格斯填写的。――￥1￥编者注］</span></font>5月29日于[伦敦]索荷区第恩街28号<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　在<b>下</b>星期末之前，我未必能够动身，因为同特吕布纳的事情只有到那个时候才能解决，此外，我还必须和齐施克商谈一下，而他在上述日期以前不一定能回到伦敦。无论如何，我一定预先写信告诉你我什么时候动身。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
