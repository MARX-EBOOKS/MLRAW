<h4 style="text-align: center">61．</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
[1857年]7月3日星期五于[伦敦]哈佛斯托克小山梅特兰公园格拉弗顿坊9号<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　明天再写信。今天只是告诉你，银行券的后半截到今晚还没有寄到。好些时候以来，恶运老是跟随着我，在这种倒霉的情况下，它大概也可能遗失。威廉斯那里我不能去，因为妻子的情况――大致从你离开以后起――不允许我离开她。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
