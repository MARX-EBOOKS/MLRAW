<h4 style="text-align: center">106．</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德里克：<br>
　　无论如何在星期五（1月1日）我必须写完勒克瑙―奥德战役。你能否在后天以前寄来一篇关于这个问题的文章――哪怕是很短的？这将是非常及时的。<br>
　　新年好！<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
　　附上的贺信，到新年那天再给<b>鲁普斯</b>。<br>
</span>
