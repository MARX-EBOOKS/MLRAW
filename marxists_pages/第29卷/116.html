<h4 style="text-align: center">116．</h4>
<p class='title1'>恩格斯致马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1858年1月15日[于曼彻斯特]<br>
</td></tr></table></div>
<br>
亲爱的马克思：<br>
　　根据附上的哈尼的信来看，施拉姆恐怕已经不在人世。我立刻给哈尼回了信。再听到什么新的情况，就马上告诉你。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
<br>
