<h4 style="text-align: center">140．</h4>
<p class='title1'>恩格斯致马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
[于曼彻斯特]<br>
</td></tr></table></div>
<br>
亲爱的摩尔：<br>
　　寄上五英镑银行券一张，号码写在下面<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：该信原稿中银行券号码没有保留下来。――￥1￥编者注］</span></font>。《骑兵》正在写；在蒙森的《罗马史》中我又发现一些好材料（汉尼拔的骑兵）。可惜，关于七年战争很难找到什么材料。<br>
　　昨天寄给你的《卫报》想必已收到了。这是唯一有巴黎通讯或者说总还有点意思的报纸。<br>
　　匆匆草此，已七点半了，店员正等着关门。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
<br>
