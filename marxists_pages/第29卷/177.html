<h4 style="text-align: center">177．</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1859年1月8日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德里克：<br>
　　附上弗莱里格拉特的信（我曾写信告诉他关于金克尔事件的一些情况）、《海尔曼》周报的广告[298]、维利希先生的信。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[298]马克思寄给恩格斯的《海尔曼》周报的广告，是一份预告这家周报即将出版的宣传性质的说明书，上面的日期是1858年12月24日，并有金克尔的签名。――第368页。<br>
</span>
