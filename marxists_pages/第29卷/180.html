<h4 style="text-align: center">180．</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
[1859年1月26日于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德里克：<br>
　　两英镑已收到无误；手稿<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡・马克思《政治经济学批判》。――￥1￥编者注］</span></font>已寄走；昨天为《论坛报》写了一篇经济评论[301]。<br>
　　明天我再多写一些，还要告诉你一件十分有趣的事。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[301]《纽约每日论坛报》编辑部没有发表马克思的这篇文章。――第372、374页。<br>
</span>
