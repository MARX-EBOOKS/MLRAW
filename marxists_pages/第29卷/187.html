<h4 style="text-align: center">187．</h4>
<p class='title1'>恩格斯致马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1859年2月14日于曼彻斯特<br>
</td></tr></table></div>
<br>
亲爱的马克思：<br>
　　我忘了写信告诉你：可以在你的书<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡・马克思《政治经济学批判》。――￥1￥编者注］</span></font>上注明，翻译权归你所有。这样做，至少可以防止哪个蠢驴或奸诈之徒糟塌你的书。况且，这是人人都可以毫不客气地履行的一种纯法律手续。<br>
　　国家活动家布林德在电报局有个朋友，时常供给外省报纸各种奇闻。关于此事，以后详谈。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
<br>
