<h4 style="text-align: center">231．</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　你能不能在星期五以前寄给我一点关于中国的军事方面的东西？今天（上星期五因为有人对我作很讨厌的访问而报销了）我写完了关于意大利和匈牙利的文章<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡・马克思《科苏特和路易－拿破仑》。――￥1￥编者注］</span></font>。纯粹的政治材料已经用完，在议会开幕以前不会有新的东西了。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
</span>
