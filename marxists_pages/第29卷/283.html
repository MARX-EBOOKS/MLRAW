<h4 style="text-align: center">26．</h4>
<p class='title1'>马克思致斐迪南・拉萨尔</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
柏林<br>
于伦敦<br>
</td></tr></table></div>
<br>
亲爱的拉萨尔：<br>
　　今天我把序言<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡・马克思的著作《政治经济学批判》的序言。――￥1￥编者注］</span></font>给敦克尔寄去了。请费心帮一下忙，<b>让手稿一付印</b>，就把稿酬寄给我。这一点要不是由于意外的情况而成为紧迫的问题，我自然不会写信同你谈起。<br>
　　望你不久能来信告诉一些“祖国的情况”，尽管你对这些情况毫不在意，或者至少谈一些对评价这些情况有重大意义的议论。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
