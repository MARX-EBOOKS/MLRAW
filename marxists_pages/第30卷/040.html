<p class='title1'>恩格斯致马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1860年6月26日于曼彻斯特南门街7号<br>
</td></tr></table></div>
<br>
亲爱的摩尔：<br>
　　我能否写成那篇文章，这很难说；明天或后天我妹夫<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：看来是指艾米尔・布兰克。――￥1￥编者注］</span></font>要来看我，他现在正在伦敦。<br>
　　所以对文章不能抱太大希望。我最多只能议论一下加里波第在大陆成功的可能性；关于印度的贸易我知道得很少，不足以写一篇文章。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
