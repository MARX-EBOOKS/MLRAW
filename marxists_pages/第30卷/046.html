<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
　　[1860年]7月21日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　帕麦斯顿将于星期一晚上提出关于英国防御工事的提案；这是一个大骗局。如果你能在星期三以前（因为我要在星期三把这篇东西<b>从这里</b>寄出）就这件事给我为《<b>论坛报</b>》写一篇短文<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：弗・恩格斯《不列颠的国防》。――￥1￥编者注］</span></font>，那就太好了。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
