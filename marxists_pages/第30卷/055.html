<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
[1860年9月初于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德里克：<br>
　　如果你能寄给我几号《卫报》<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：《曼彻斯特卫报》。――￥1￥编者注］</span></font>，我将非常感激。我似乎在最近的一封信中已经通知你收到五英镑。收到一封龚佩尔特从苏格兰寄来的信。<br>
　　下次再多写些。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
　　济贝耳那里还没有什么消息。<br>
　　依我看，事态发展最近会有一个转变，这就是皮蒙特反对马志尼。<br>
</span>
