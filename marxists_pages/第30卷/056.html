<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1860年9月13日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　只要有任何可能，希望你在星期六以前寄一篇文章来。<br>
　　附上戚美尔曼对我提出的问题<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第84页。――￥1￥编者注］</span></font>所作的法律上的结论（你要在下星期<b>寄还</b>给我）。<br>
　　此外，为了消遣，将埃卡留斯交给我的一封信抄寄给你。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
