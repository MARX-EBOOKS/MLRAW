<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1860年10月11日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德里克：<br>
　　我现在很忙。星期六将写信给你。布拉斯的小册子<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：奥・布拉斯《我们需要什么》。――￥1￥编者注］</span></font>中有一些好东西。<br>
　　如有可能，你就加里波第的光辉战役[119]写些指导性的意见给我（星期六以前）。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[119]1860年10月1日加里波第的军队在沃耳土诺击败那不勒斯国王弗兰契斯科二世的军队。南意大利的解放基本上由于这次胜利而完成。――第104、105页。<br>
</span>
