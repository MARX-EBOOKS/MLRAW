<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1860年12月23日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德里克：<br>
　　非常感谢你的酒和五英镑。我妻子认为波尔图酒非常好。<br>
　　从今天起，我又觉得健康了。<br>
　　凯尔从莱比锡来信说，书<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡・马克思《福格特先生》。――￥1￥编者注］</span></font>一到就马上卖出了一百二十本。<br>
　　李希特尔从汉堡（从《改革报》）来信说，书的销路很广。<br>
　　我妻子向你问好。<br>
<br>
<p align="right">你的　<b>卡・马克思</b></p>
