<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
　　[1862年6月6日左右于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　现在才告诉你两英镑已经收到，请原谅。这个星期缠得我完全抽不出时间。房东和其他半打魔鬼把我折腾坏了。<br>
　　附上拉萨尔写的书<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：斐・拉萨尔：《文学史家尤利安・施米特先生》。――￥1￥编者注］</span></font>两本（一本给你，一本给鲁普斯）。对书的意见望告诉我。<br>
　　接到施特芬来信，回信以后，日内就把信寄给你。他在波士顿。看来情绪很不好。魏德迈被提升为陆军中校。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
