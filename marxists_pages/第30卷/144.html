<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
　　[1862年]7月11日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　拉萨尔来这里已经两天了；他打算在这里逗留几个星期。你必须到这里来住几天，因为你和沃尔弗收到他的著作后一直没有给他写信，他本来就很“委屈”。况且你原来也打算到这里来参观几天博览会。<br>
　　因我正紧张写书<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第251页。――￥1￥编者注］</span></font>，就写这寥寥数笔。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
