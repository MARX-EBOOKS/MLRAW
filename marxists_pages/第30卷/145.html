<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
　　[1862年]7月21日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　到弗莱里格拉特那里去过了，<b>一切都顺利</b>。<br>
　　伊戚希<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：拉萨尔。――￥1￥编者注］</span></font>――他的虚荣一定使你发笑――下星期走。你有可能，就星期五来。莱茵哈特昨天也来过了，他已经做了商人。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
　　你对于麦克累伦有什么看法？<br>
</span>
