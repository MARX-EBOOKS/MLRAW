　　附上智者男爵<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：拉萨尔。――￥1￥编者注］</span></font>名下的期票一张。<b>你必须</b>写信通知他签字日期，支付日期，并告诉他，到期将收到钱，但期票要延期到1月1日，那时我再付给他十五英镑的差额。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
