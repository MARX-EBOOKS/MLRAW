<p class='title1'>恩格斯致马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
[1862年8月21日于曼彻斯特]<br>
</td></tr></table></div>
<br>
亲爱的摩尔：<br>
　　附上给拉萨尔的便条<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第631页。――￥1￥编者注］</span></font>。对于这种蠢事，不要太生气。你干脆要求收回期票，并寄给拉萨尔承兑；或者立即直接从柏林来办理。你知道，我能从波克罕那里弄到的不会比你多，甚至要更少。他爱吹牛，这我是知道的。<br>
　　匆匆。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
