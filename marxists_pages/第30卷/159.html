<p class='title1'>恩格斯致马克思(1862年9月初)</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
[1862年9月初于曼彻斯特]<br>
</td></tr></table></div>
<br>
亲爱的摩尔：<br>
　　我深深陷进了规模巨大的棉纺织品投机买卖，――谁有胆量，谁就能赚大钱，遗憾的是<br>
　　无论是欧门还是恩格斯都没有这种胆量，――再加上我的工作极多；一有可能，就给你写信。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
