<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1862年11月20日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　十英镑银行券的前半截已经收到，<b>衷心感谢</b>，为此赶忙通知你。<br>
　　要是墨西哥人（“最下等的人”！）把癞蛤蟆<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：法国人。――￥1￥编者注］</span></font>再揍一顿就好了，而这些狗东西――假激进资产者――现在甚至在巴黎谈起“旗帜的荣誉”来了！<br>
　　如果斯宾斯在小战争中赢不了北部人，那末什么也无济于事；甚至连麦克累伦的拙劣的军事艺术也帮不了忙！<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
