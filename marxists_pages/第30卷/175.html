<p class='title1'>恩格斯致马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1863年<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：原稿为：“1862年”。――￥1￥编者注］</span></font>1月7日于曼彻斯特<br>
</td></tr></table></div>
<br>
亲爱的摩尔：<br>
　　玛丽<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：玛丽・白恩士。――￥2￥编者注］</span></font>去世了。昨天晚上她很早就去睡了，当莉希<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：莉希・白恩士。――￥3￥编者注］</span></font>在夜间十二点不到准备上床的时候，她已经死了。非常突然：不是心脏病就是脑溢血。今天早晨我才知道，星期一晚上她还是好好的。我无法向你说出我现在的心情。这个可怜的姑娘是以她的整个心灵爱着我的。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
