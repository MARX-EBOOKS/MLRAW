<p class='title1'>恩格斯致马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1863年2月19日于曼彻斯特<br>
</td></tr></table></div>
<br>
亲爱的摩尔：<br>
　　关于波兰，完全同意你的意见。<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第323页。――￥1￥编者注］</span></font>大约两个星期以来，我脑子里就在转念头要写一本小册子。不过象你提议的那样办好些，因为同时把外交部分加进去，就会有一个优点，就是我们将共同合作来搞这东西。<br>
　　全篇要多少印张，据你看，我应担当多少？写作计划或多或少取决于这一点。由谁来印？你的那部分打算在什么时候付印？<br>
　　关于机器，这几天就写。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
