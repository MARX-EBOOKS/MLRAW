<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1864年[3月11日]星期五[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德里克：<br>
　　明天早上十点钟我将从这里的尤斯顿车站上车，约于下午五点到达曼彻斯特。[363]<br>
　　再等好天气是愚蠢的。<br>
　　此外，在最近两星期中阻留我的是，在我身体的不同部位意外地出现了几个新的疖子。<br>
<br>
<p align="right">　　你的　<b>摩尔</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[363]1864年3月12日以后的几天马克思在曼彻斯特恩格斯那里，同他谈了自己去德国和荷兰的结果。――第383页。<br>
</span>
