<p class='title1'>马克思致法律顾问维贝尔</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
柏林<br>
1860年8月20日于伦敦<br>
</td></tr></table></div>
<br>
尊敬的先生：<br>
　　大约两星期以前，我曾请您将上诉法院驳回的您的控诉书中<b>控诉的几点</b>抄一份寄给我<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第553页。――￥1￥编者注］</span></font>。我必须重申这个请求，因为没有这个抄件，上诉法院的决定中有几点我无法理解。<br>
　　致深切的敬意。<br>
<br>
<p align="right">　　忠实于您的　<b>卡尔・马克思</b>博士</p>
<br>
