<p class='title1'>马克思致斐迪南・拉萨尔[533]</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
亚琛<br>
[1860年9月15日于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的拉萨尔：<br>
　　刚给你发出一封信，就收到这封信，现在寄上。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br><br>
　　[533]这封信是马克思在弗莱里格拉特1860年9月15日给他的信的第一页上端写的附言。马克思曾根据拉萨尔的请求向弗莱里格拉特打听瑞士银行总行的情况，弗莱里格拉特的信是对这一问题的答复（见本卷第562页和注531），马克思把它转寄给了拉萨尔。――第565页。<br>
</span>
