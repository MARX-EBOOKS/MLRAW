<h4 style="text-align: center">1．</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1864年11月2日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　你很久不来信使我感到不安。我料想你已经回来了。[1]为什么得不到你一点消息？<br>
　　我有许多重要事情要告诉你，一有你的音信，我马上就写信给你。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[1]恩格斯在1864年9―10月间到什列斯维希－霍尔施坦去了一趟。――第5页。<br>
</span>
