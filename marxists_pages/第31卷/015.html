<h4 style='text-align: center'>15.</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1864年12月22日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德里克：<br>
　　十分匆忙。请将贝克尔的信寄回。<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第38页。――￥1￥编者注］</span></font>但愿你没有遗失。<br>
　　恭贺新年！<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
