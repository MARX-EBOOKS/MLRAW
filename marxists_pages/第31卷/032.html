<h4 style='text-align: center'>32.</h4>
<p class='title1'>恩格斯致马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1865年2月20日[于曼彻斯特]<br>
</td></tr></table></div>
<br>
亲爱的摩尔：<br>
　　附上马策腊特的信<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第75页。――￥1￥编者注］</span></font>。<br>
　　至于佩茨累尔，摄影师完全是另外一个佩茨累尔，而不是那一个。前天我在席勒协会的科学晚会上正好见到了摄影师；这个人至少要年轻二十岁，外貌完全不一样。音乐家怎么样了，鬼知道。<br>
<br>
<p align="right">你的　<b>弗・恩・</b></p>
<br>
<center>[<b>信背面的铅笔字</b>]</center><br>
　　昨天完全忘记把信寄出。汉堡方面<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：迈斯纳（见本卷第66―67页）。――￥2￥编者注］</span></font>还没有回信。<br>
</span>
