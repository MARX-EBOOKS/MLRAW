<h4 style='text-align: center'>34.</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
[1865年2月22日以前于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德里克：<br>
　　附上一些关于波拿巴的上流社会的秘密材料[99]，作为星期日的<b>消遣</b>，作为余兴。<br>
　　这封短信务请保存。向莉希夫人致良好的祝愿。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[99]马克思把不知是谁抄写的关于波拿巴王朝的成员们的丑行的材料附入给恩格斯的这封短信中。――第81页。<br>
</span>
