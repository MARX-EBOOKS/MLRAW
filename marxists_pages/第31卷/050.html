<h4 style='text-align: center'>50.</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1865年4月22日星期六[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德：<br>
　　附上从《莱茵报》上剪下的拙劣的东西。<br>
　　明天再给你详细写信。今天我疲倦得要死，一方面是因为深夜工作（不是实践方面的），另一方面是因为我吃了阿魏<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：药名。――￥1￥译者注］</span></font>。<br>
　　如果我能象德朗克那样把铜变成黄金，也许他就满意了。现在，资产阶级报刊抢登对诽谤的反声明，这个时机无论如何必须加以利用，因为一旦斗争严重化，它们大概就想赞成诽谤了。<br>
　　祝好。向莉希夫人致良好的祝愿。<br>
<br>
<p align="right">　　你的　<b>摩尔</b></p>
