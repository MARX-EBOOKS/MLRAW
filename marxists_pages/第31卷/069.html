<h4 style='text-align: center'>69.</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1865年10月19日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德：<br>
　　我将于明天下午四点四十分左右抵曼彻斯特，并往你办公的地方[174]。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[174]1865年10月20日至11月初，马克思在曼彻斯特恩格斯处。――第155、168、487、490、494页。<br>
</span>
