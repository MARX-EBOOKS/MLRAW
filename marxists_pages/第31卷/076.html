<h4 style='text-align: center'>76.</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
[1865年12月2日于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德：<br>
　　刚刚回家（我刚才在博物馆<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：英国博物馆的图书馆。――￥1￥编者注］</span></font>找材料），看到你的信。还来得及告诉你，十英镑收到了，非常感谢。其余的明天再谈。<br>
　　祝好，并向莉希夫人致意。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
