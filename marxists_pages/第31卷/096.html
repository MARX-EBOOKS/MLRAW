<h4 style='text-align: center'>96.</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
[1866年3月16日]于马尔吉特兰塞尔街5号<br>
</td></tr></table></div>
<br>
亲爱的弗雷德：<br>
　　我昨天晚上来到这里。今天（洗完温海水澡）在户外散步了一整天，刚回到住所（紧靠大海），以便在邮局关门以前把我的住址寄给你。明天你将得到较详细的报道。你的关于波兰的第一篇文章<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：弗・恩格斯《工人阶级同波兰有什么关系？》一组文章中的第一篇。――￥1￥编者注］</span></font>将不在这个星期，而在下个星期发表。这里的空气太好了。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
