<h4 style='text-align: center'>144.</h4>
<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1867年2月25日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德：<br>
　　非常感谢你寄来的二十英镑。<br>
　　附上库格曼医生的信。<br>
　　现在我只能给你写这几行字，因为房东的代理人正在这里，我对他不得不扮演巴尔扎克喜剧中的梅尔卡岱<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：巴尔扎克的喜剧《生意人》中的主角。――￥1￥编者注］</span></font>的角色。讲到巴尔扎克，我建议你读一读他的《不出名的杰作》和《言归于好的麦尔摩特》。这两本小杰作充满了值得玩味的讽刺。<br>
　　祝好。<br>
<br>
<p align="right">你的　<b>卡・马・</b></p>
<br>
