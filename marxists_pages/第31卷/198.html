<h4 style='text-align: center'>198.</h4>
<p class='title1'>马克思致恩格斯<font size="3">[396]</font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1867年11月9日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德：<br>
　　附上库格曼的信。<br>
　　祝好。<br>
<br>
<p align="right">　　你的 <B>摩尔</B></p>
<br>
<p align="center">[<B>劳拉・马克思的附笔</B>]</p>
<br>
亲爱的恩格斯：<br>
　　作为摩尔的秘书，我真不好意思寄出这样一封信。<br>
<p align="right">　　忠实于您的　<b>白鹦鹉</b><br><font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：劳拉的绰号，是根据古小说中一个人物时装裁缝的名字起的。――￥1￥编者注］</span></font></p>
 <br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[396]马克思的这封信以及他的女儿劳拉的附笔，是写在库格曼1867年11月6日给马克思的一封信上的。――第388页。<br>
</span>
