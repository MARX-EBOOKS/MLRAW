<h4 style='text-align: center'>207.</h4>
<p class='title1'>马克思致恩格斯<font size="3">[409]</font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1867年11月29日[于伦敦]<br>
</td></tr></table></div>
<br>
　　你看，我是多么健忘。刚才寄给你一封信，没有把库格曼的信附进去。<br>
 <br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[409]这封信马克思写在库格曼1867年11月25日给恩格斯的一封信上。――第400页。<br>
</span>
