<h4 style='text-align: center'>36.</h4>
<p class='title1'>马克思致海尔曼・荣克</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">伦敦<br>
[1865年]9月30日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的荣克：<br>
　　明天（星期日）我等您来吃午饭（完全是家常便饭）。我也邀请了德・巴普和贝克尔<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：约翰・菲力浦・贝克尔。――￥1￥编者注］</span></font>。务请<b>以我的名义</b>邀请一下<b>考布</b>。今天上午我忙于各种事务，所以不能写两封信。<br>
　　致兄弟般的敬礼。<br>
<br>
<p align="right">　　<B>卡・马克思</B></p>
