<p class='title1'>马克思致所罗门・富尔德</p>

<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
美因河畔法兰克福<br>
1865年11月9日于伦敦<br>
</td></tr></table></div>

博士先生阁下：<br>
　　由于我遗失了我姑母的地址，烦您将所附的信转寄给巴・布吕姆夫人。<br>
<br>
<p align="right">　　尊敬您的 <B>卡・马克思博士</B></p>
