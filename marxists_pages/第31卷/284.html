<h4 style='text-align: center'>66.</h4>
<p class='title1'>马克思致保尔・拉法格</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1866年12月7日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的拉法格：<br>
　　星期一以前必须结束的工作，占去了我全部时间，因此无法立即给您回信。如果您觉得我写给您的独白太尖锐，因而感到委屈，那末请您原谅。您不要生气，即使在您有理的时候。<br>
　　祝好。<br>
<br>
<p align="right">　　<b>卡尔・马克思</b></p>
