<h4 style='text-align: center'>86.</h4>
<p class='title1'>马克思致卡尔・济贝耳</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
马德拉岛<br>
1867年11月10日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的济贝耳：<br>
　　暂时把我个人使用的这本书<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：《资本论》第一卷。――￥1￥编者注］</span></font>寄给你。同时我已写信给迈斯纳，他真是该死！要知道，我曾托他把在德国出版的<b>第一本</b>书寄给你。我希望，马德拉岛对你有好处。<br>
<br>
<p align="right">　　<B>卡尔・马克思</B></p>
