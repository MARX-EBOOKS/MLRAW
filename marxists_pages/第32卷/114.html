<p class='author'>第二封信</p>
<br>
　　<b>又及</b>：<br>
　　我刚从波克罕那里回来。同预料相反，我已争取到他将<b>不</b>赞助刊载你的文章<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：弗・恩格斯《民主的泛斯拉夫主义》。――￥1￥编者注］</span></font>。<br>
