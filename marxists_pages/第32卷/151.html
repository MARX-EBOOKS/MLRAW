<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1869年2月15日［于伦敦］</td></tr></table></div>
<br>
亲爱的弗雷德：<br>
　　随信附上威斯特伯立债务事件的材料等等。小书你可以留下，附上的英文信请务必寄还。我告诉过波克罕，我需要为一个<b>在荷兰的熟人</b>打听些情况。<br>
　　不要忘记把福斯特的《对外汇兑》<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：约・莱・福斯特《商业汇兑原则概论》。――￥1￥编者注］</span></font>尽快给我寄来。我读完后立即归还。这里弄不到这本书。<br>
　　祝好。<br>
<br>
<br><p align="right">你的　<b>卡・马・</b></p><br>
<br>
