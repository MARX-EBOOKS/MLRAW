<p class='title1'>马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼彻斯特<br>
1869年12月12日［于伦敦］</td></tr></table></div>
<br>
亲爱的弗雷德：<br>
　　邮局正要关门，我发现我桌子上有一封佐林根人的来信。我昨天忘了附上，现在寄去。<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第394、396―397页。――￥1￥编者注］</span></font><br>
　　随信还寄去比斯利寄给我的校样，但无接续部分。有画像的小报――<b>巴黎</b>――是小燕妮的，你看完后要寄回来。<br>
　　祝好。<br>
<br><p align="right">　　你的　<b>摩尔</b></p><br>
　　对于《蜂房》，将通过各种决议，先只将其收入我们的记录簿，然后<b>俟机</b>发表。<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第474页。――￥2￥编者注］</span></font><br>
