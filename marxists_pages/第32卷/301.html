<p class='title1'>马克思致约瑟夫・狄慈根<font size="3">[497]</font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
彼得堡<br>
［1868年5月9日于伦敦］<br>
</td></tr></table></div>
<br>
　　……一旦我卸下经济负担，我就要写《辩证法》。辩证法的真正规律在黑格尔那里已经有了，自然是具有神秘的形式。必须把它们从这种形式中解放出来……<br>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[497]原信没有找到。这段话引自约・狄慈根《社会民主主义的哲学》（《Sozialdemokratische　Philosophie》）一文，该文发表于1876年1月9日《人民国家报》第3号。――第535页。<br>
</span>
