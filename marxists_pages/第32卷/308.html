<p class='title1'>马克思致弗里德里希・列斯纳</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1868年8月11日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的列斯纳：<br>
　　由于有些字写错了，我把附上的呼吁书[502]整个重抄了一遍。现在你应当<b>亲手</b>复抄一下。<br>
　　祝好。<br>
<br>
<br><p align="right">你的　<b>卡・马・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[502]随这封信附有一份《告伦敦德国工人书》（见《马克思恩格斯全集》中文版第16卷第644―645页），这是列斯纳鉴于即将在1868年9月召开第一国际布鲁塞尔代表大会而以伦敦德意志工人共产主义教育协会的名义起草的。――第545页。<br>
</span>
