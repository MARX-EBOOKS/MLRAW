<p class='title1'>马克思致弗朗斯瓦・拉法格</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
波尔多<br>
1869年7月7日于伦敦<br>
</td></tr></table></div>
<br>
我亲爱的朋友：<br>
　　您的来信使我不得不立即动身到巴黎去。<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第610―611页。――￥1￥编者注］</span></font>在那里我才能对情况作出判断和按您指出的方针采取行动。我完全同意您的看法。我从巴黎给您写信，在那里我将逗留两三天。关于您的健康状况的消息使我和真诚爱您的我的全家感到不安。<br>
　　请代我向拉法格夫人问好。<br>
<br><p align="right">　　忠实于您的　<B>卡尔・马克思</b></p><br>
