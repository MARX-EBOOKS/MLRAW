<p class='title1'>马克思致路德维希・库格曼</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
汉诺威<br>
1869年10月12日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的库格曼：<br>
　　匆匆写几行，因为小杜西和恩格斯刚刚来到。你从这封短信可以知道，我们昨天白天已顺利到达英国。<br>
　　我们在海上和陆地都有一些奇遇，小燕妮会写信详告。<br>
　　谨向全家衷心问好。<br>
<br>
<br><p align="right">你的　<b>卡・马・</b></p><br>
<br>
　　特别向伯爵夫人和小猫头鹰<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：库格曼的夫人盖尔特鲁黛和女儿弗兰契斯卡。――￥1￥编者注］</span></font>问好。恩格斯、拉法格、马克思夫人等也向她们问好。小家伙<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：沙尔・埃蒂耶纳・拉法格。――￥2￥编者注］</span></font>又好些了。<br>
</span>
