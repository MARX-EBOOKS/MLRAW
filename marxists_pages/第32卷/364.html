<p class='title1'>马克思致路德维希・库格曼</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
汉诺威<br>
1870年3月28日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的库格曼：<br>
　　我右胯股上的肿瘤使我不能久坐，所以我把<b>专为不伦瑞克委员会即白拉克及其同事写的一封信</b>附寄给你，免得再抄一遍。你阅后最好亲自转交，并且再一次提醒他，这个通知是机密的，不打算公开发表。<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：马克思在这封信里附上他写的《机密通知》。――￥1￥编者注］</span></font><br>
