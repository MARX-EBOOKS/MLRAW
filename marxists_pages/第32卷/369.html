<p class='title1'>马克思致路德维希・库格曼</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
汉诺威<br>
[1870年5月5日左右于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的库格曼：<br>
　　讨厌的咳嗽使我目前不能写信，因此只能在此对你寄来的美好的生日礼物表示衷心的感谢。<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第489页。――￥1￥编者注］</span></font><br>
<br><p align="right">　　忠实于你的　<b>卡尔・马克思</b></p><br>
