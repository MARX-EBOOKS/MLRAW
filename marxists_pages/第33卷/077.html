<p class='title1'>马克思致路德维希・库格曼</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
汉诺威<br>
1870年9月14日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的温采尔：<br>
　　附上宣言<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡・马克思《国际工人协会总委员会关于普法战争的第二篇宣言》。――￥1￥编者注］</span></font>。<br>
　　我的时间全部被“国际的事务”占去了，以致从来不能在夜里三点钟以前睡觉。因此请原谅我这么久没有给你写信。<br>
　　衷心问候伯爵夫人和小弗兰契斯卡<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：盖尔特鲁黛・库格曼和弗兰契斯卡・库格曼。――￥2￥编者注］</span></font>。<br>
<br>
<br><p align="right">你的　<b>卡・马・</b></p><br>
