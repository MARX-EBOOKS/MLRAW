<p class='title1'>马克思致约翰・菲力浦・贝克尔</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
日内瓦<br>
[1870年9月15日于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的贝克尔：<br>
　　几天以前，我已将译本<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：指总委员会关于普法战争的第二篇宣言的德译本。――￥1￥编者注］</span></font>寄给《人民国家报》，因为此事比较紧急。但是<b>这个</b>译本有些地方作了修改。<br>
　　祝好。<br>
<br>
<br><p align="right">你的　<b>卡・马・</b></p><br>
<br>
</span>
