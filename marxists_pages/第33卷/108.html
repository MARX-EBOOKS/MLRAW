<h4 style="text-align: center">48．</h4>
<p class='title1'>恩格斯致威廉・李卜克内西</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
莱比锡<br>
［1871年4月13日于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的李卜克内西：<br>
　　现在把《德法年鉴》上我的那篇旧文章重新刊载在《人民国家报》上是无论如何不行的<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见上一封信，本卷第208页。――￥1￥编者注］</span></font>。这篇文章<b>已经完全过时</b>，而且有许多不确切的地方，只会给读者造成混乱。加之它还完全是以黑格尔的风格写的，这种风格现在也根本不适用。这篇文章仅仅具有历史文件的意义。<br>
　　衷心问好。<br>
<br><p align="right">你的　<B>弗・恩・</B></p><br>
