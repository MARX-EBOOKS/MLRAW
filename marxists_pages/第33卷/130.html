<h4 style="text-align: center">70．</h4>
<p class='title1'>马克思致彼得・拉甫罗维奇・拉甫罗夫</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1871年7月12日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　您能不能在最近这个星期日下午五点钟到我们这里来吃饭？<br>
　　您将在我们这里见到一些我们的巴黎朋友。<br>
　　致兄弟般的敬礼。<br>
<br><p align="right"><B>卡・马克思</B></p>
