<h4 style="text-align: center">117．</h4>
<p class='title1'>马克思致海尔曼・荣克</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1871年11月4日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的荣克：<br>
　　请您下星期给博弗尔（他已经没有房子住）十个先令。如果他在下星期内还找不到工作，我们得把他送到布鲁塞尔去，从那里他可以设法回法国。<br>
<br>
<p align="right">　　你的　<b>卡・马・</b></p>
