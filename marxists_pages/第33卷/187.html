<h4 style="text-align: center">127．</h4>
<p class='title1'>马克思致茹尔・若昂纳尔<font size='3'>[151]</font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1871年11月18日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的茹尔・若昂纳尔：<br>
　　明天（星期日）晚上七八点钟之间，我在家里等您。先讨论一下国际的一些事务。然后就完全自由！<br>
<br><p align="right">您的　<B>卡尔・马克思</B></p><br>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[151]这封信是用国际工人协会总委员会的公用笺写的。――第158、195、199、273、328、353、401、416、420、430页。<br>
</span>
