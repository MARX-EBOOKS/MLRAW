<h4 style="text-align: center">144．</h4>
<p class='title1'>恩格斯致威廉・李卜克内西</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
莱比锡<br>
1872年1月3日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的李卜克内西：<br>
　　寄去《东邮报》的剪报。<br>
　　附上的文章<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：弗・恩格斯 《桑维耳耶代表大会和国际》。――￥1￥编者注］</span></font><b>极需马上</b>发表。章程<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡・马克思 《国际工人协会的共同章程和组织条例》德文版。――￥2￥编者注］</span></font>可以等一等。我正采取措施，以便在《平等报》上刊登该文的译文，并<b>通过这种途径</b>，使它到达比利时、意大利和西班牙的各个角落。<br>
<br><p align="right">你的　<B>弗・恩・</B></p><br>
