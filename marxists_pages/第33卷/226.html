<h4 style="text-align: center">166．</h4>
<p class='title1'>马克思致海尔曼・荣克</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1872年3月7日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的荣克：<br>
　　我找不到韦梅希的支部[436]的章程。请看一下是否在您那里。<br>
　　致兄弟般的敬礼。<br>
<br><p align="right">您的　<B>卡・马克思</B></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[436] 指1871年法国人支部（见注322）解散后建立的一个小组。由于该小组的章程同国际共同章程的原则相抵触，总委员会没有接纳该小组加入国际。――第420页。<br>
</span>
