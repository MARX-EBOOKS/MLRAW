<h4 style="text-align: center">168．</h4>
<p class='title1'>马克思致艾米尔・埃德</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1872年3月9日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的埃德：<br>
　　在您还<b>没有把自己的家具</b>从住宅里<b>搬出</b>时，什么也别对您的房东讲。否则他会把家具扣押下来，给您造成种种麻烦。<br>
<br><p align="right">您的　<B>卡尔・马克思</B></p><br>
