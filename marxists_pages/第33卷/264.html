<h4 style="text-align: center">204．</h4>
<p class='title1'>马克思致路德维希・库格曼</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
汉诺威<br>
1872年7月23日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的库格曼：<br>
　　假如没有什么干扰，我将于9月2日到达海牙，并且很高兴在那里见到你。我已给你寄去《分裂》<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡・马克思和弗・恩格斯 《所谓国际内部的分裂》。――￥1￥编者注］</span></font>，但显然被扣压了。因此在这封信里再附上一份。请原谅我今天就写这么几句。我要给巴黎寄去校样<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：《资本论》第一卷法文版校样。――￥2￥编者注］</span></font>，总之我有很多事要办。<br>
<br>
<p align="right">　　你的　<b>卡・马・</b></p>
<br>
