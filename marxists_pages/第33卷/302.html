<h4 style="text-align: center">242．</h4>
<p class='title1'>恩格斯致欧根・奥斯渥特</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1873年3月18日于［伦敦］瑞琴特公园路122号<br>
</td></tr></table></div>
<br>
亲爱的奥斯渥特：<br>
　　对您盛情寄来的音乐会的票，表示衷心的感谢――同时，我还替您推销了两张，请把它交给彭普斯，现送上票款十先令。<br>
　　衷心问候奥斯渥特夫人和奥斯渥特小姐。<br>
<br><p align="right">忠实于您的　<B>弗・恩格斯</B></p><br>
