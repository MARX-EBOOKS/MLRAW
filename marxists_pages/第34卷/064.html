<p class='title1'>马克思致彼得・拉甫罗维奇・拉甫罗夫</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1875年5月8日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　我刚刚收到一个商人<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡尔・奥古斯特・施拉姆。――￥1￥编者注］</span></font>（至少在人们和警察心目中是不问政治的十分诚实的人）从柏林寄来的信，他请求我对《资本论》的若干地方加以说明。我立即答复了他，并利用这个机会为您的俄国来信向他要一个可靠地址。我的信今天就寄出。<br>
<br>
<br><p align="right">您的　<B>卡尔・马克思</b></p><br>
<br>
