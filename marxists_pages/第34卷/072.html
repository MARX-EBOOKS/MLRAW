<p class='title1'>马克思致麦克斯・奥本海姆</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
布拉格<br>
1875年9月6日于卡尔斯巴德“日耳曼尼亚”<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　上周给您去信之后没有得到任何回音，我由此推断，您不在布拉格。因此星期六（9月11日）我将不经过布拉格，而经过法兰克福直接回去。<br>
　　再见。<br>
<br><p align="right">　　友好地忠实于您的　<B>卡尔・马克思</b></p><br>
