<p class='title1'>马克思致麦克斯・奥本海姆</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
布拉格<br>
1875年9月9日于卡尔斯巴德“日耳曼尼亚”<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　我将在星期六（11日）三点五十七分动身，八点五十分到达布拉格国家铁路车站。<br>
　　我单独一人，没有旅伴<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：爱琳娜・马克思。――￥1￥编者注］</span></font>，因此只需要一间卧室。<br>
　　收到《<b>布拉格旅行指南</b>》，感谢之至。<br>
<br><p align="right">　　友好地忠实于您的　<B>卡尔・马克思</b></p><br>
