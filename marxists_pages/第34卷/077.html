<p class='title1'>马克思致彼得・拉甫罗维奇・拉甫罗夫</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1875年10月8日于[伦敦]西北区梅特兰公园路41号<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　您惠临我家时，我和妻子都不在，非常抱歉。<br>
　　我从恩格斯那里拿来了这本《一群俄国人的若干意见》<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第144页。――￥1￥编者注］</span></font>，您如允许，我在退回以前再给我的一个朋友看看。对这种幼稚之作不值得回答。<br>
<br><p align="right">　　忠实于您的　<B>卡・马・</b></p><br>
