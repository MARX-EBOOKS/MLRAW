<p class='title1'>马克思致彼得・拉甫罗维奇・拉甫罗夫</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
［1875年12月17日于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　亲爱的勒布朗病得厉害，很希望有人去看他。最后那些印张（就是法文版《资本论》的最后一册――第四十四册）的数额是<b>规定好的</b>。拉沙特尔先生肯定地说，按照和印刷所订的合同的条件，不能超过四十四个印张。因此，我不得不把<b>已经编好的名目索引</b>割爱。只要我找到一本，就给您寄去。<br>
<br><p align="right">　　您的　<B>卡・马・</b></p><br>
