<p class='title1'>恩格斯致彼得・拉甫罗维奇・拉甫罗夫</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1876年6月30日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的拉甫罗夫先生：<br>
　　关于俾斯麦先生在德国查禁《前进！》一事，可以向您告慰的是，不过六天以前我在海得尔堡曾看见这种报纸公开摆在书店的橱窗里。俾斯麦先生还没能教会自己的所有警察读俄文。<br>
<br><p align="right">　　您的　<B>弗・恩格斯</b></p><br>
