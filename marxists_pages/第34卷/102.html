<p class='title1'>马克思致麦克斯・奥本海姆</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
布拉格<br>
1876年8月30日于卡尔斯巴德城堡山“日耳曼尼亚”<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　我同女儿<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：爱琳娜・马克思。――￥1￥编者注］</span></font>住在这里已经两个星期了，尽管气候多变和下雨，我想在这里再呆两星期。[42]我们很乐于在这里见到您。无论如何，请给一个回音。<br>
<br><p align="right">　　友好地忠实于您的　<B>卡尔・马克思</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[42]1876年8月15日至9月15日，马克思在卡尔斯巴德治病。他的女儿爱琳娜与他一起到卡尔斯巴德。――第23、24、180、182、193页。<br>
</span>
