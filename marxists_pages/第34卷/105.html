<p class='title1'>马克思致麦克斯・奥本海姆</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
布拉格<br>
1876年9月9日［于卡尔斯巴德］<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　我和我的女儿<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：爱琳娜・马克思。――￥1￥编者注］</span></font>非常感谢您的盛情来信。她曾经发高烧，在床上躺了三天，现在仍然被关在家里；但是由于小弗累克勒斯博士的迅速诊治，一切危险已经过去。星期三以前我们未必能够前往布拉格。我一定在动身的前一天通知您。<br>
　　好吧，很快就会见面。<br>
<br>
<br><p align="right">您的　<B>卡尔・马克思</b></p><br>
<br>
