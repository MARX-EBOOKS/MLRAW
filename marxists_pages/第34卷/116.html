<p class='title1'>恩格斯致艾米尔・布兰克</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
莱茵河畔洛伊特斯多夫<br>
［<B>副本</B>］<br>
1876年10月16日［于伦敦］<br>
</td></tr></table></div>
<br><center><b>致艾・布兰克</b></center><br>
　　如果你同意以保险单寄存你处为条件贷给德朗克一百五十英镑，那么一旦你需要用这笔钱，我愿意通过海尔曼<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：海・恩格斯。――￥1￥编者注］</span></font>把钱付给你，并且将承担与这笔交易有关的其他一切费用。等德朗克还了那笔钱，你可以随便用什么办法把这笔钱汇给我，并把保险单退还给他。<br>
</span>
