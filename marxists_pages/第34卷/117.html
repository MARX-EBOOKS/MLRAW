<p class='title1'>恩格斯致恩斯特・德朗克</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
利物浦<br>
［<B>副本</B>］<br>
1876年10月20日［于伦敦］<br>
</td></tr></table></div>
<br><center><b>致德朗克</b></center><br>
　　我的妹夫布兰克写信给我说，他完全拒绝你提出的那笔交易。他还说，他同欣斯贝格―费舍公司彻底断绝关系已经三年，这是完全属实的。<br>
　　我很抱歉，这件事情毫无成果，因为我本来是非常愿意尽我的力量为你帮忙的。<br>
<br>
