<p class='title1'>马克思致彼得・拉甫罗维奇・拉甫罗夫</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1877年2月24日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　如果您明天（星期日）两点钟能来我们家进餐，我妻子和我将非常感激。那时我将向您说明自己长期没写信的原因――喉病和多少有些违背我的意志而强加于我的工作[311]。<br>
<br>
<br><p align="right">您的　<B>卡尔・马克思</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[311]从1876年10月到1877年8月，马克思校订了普・利沙加勒的《一八七一年公社史》的德译文。――第235页。<br>
</span>
