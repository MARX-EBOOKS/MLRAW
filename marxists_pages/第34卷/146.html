<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
［1877年3月27日于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　您能否告诉我伊格纳切夫的名字，以及他的家庭和他本人的一些详细情况？至于他的政治功绩，我多少知道一些。<br>
　　莫斯科发生了严重的工商业恐慌。<br>
<br><p align="right">　　您的　<B>卡・马・</b></p><br>
