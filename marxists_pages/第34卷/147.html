<p class='title1'>马克思致彼得・拉甫罗维奇・拉甫罗夫</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
［1877年3月29日于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　昨晚收到了您的便函，非常感谢。“自由的”英国报刊的卑鄙和怯懦，您是想象不到的。我所以还不能就您的文章[314]的命运向您作明确答复，这是唯一的原因。<br>
<br><p align="right">　　您的　<B>卡・马・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[314]指的是彼・拉・拉甫罗夫《俄国的司法》一文，这篇文章在马克思的协助下于1877年4月14日发表于《名利场》周刊上。――第237、241、244页。<br>
</span>
