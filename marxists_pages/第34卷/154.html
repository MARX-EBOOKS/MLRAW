<p class='title1'>马克思致彼得・拉甫罗维奇・拉甫罗夫</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1877年4月23日（莎士比亚诞辰）［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　我代表我的女儿杜西送上<b>艺术剧院</b>[320]池座戏票一张（两人）。是看今天的演出的（星期一）。上演《理查三世》<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：莎士比亚的戏剧。――￥1￥编者注］</span></font>。您最好七点多一点到剧院。<br>
<br>
<br><p align="right">您的　<B>卡尔・马克思</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[320]艺术剧院（Lyceum　Theatre）是伦敦的话剧院。――第249页。<br>
</span>
