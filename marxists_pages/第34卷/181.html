<p class='title1'>马克思致某报编辑部<font size="3">[359]</font></p>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1877年12月19日于［伦敦］西北区梅特兰公园路41号<br>
</td></tr></table></div>
<br>
尊敬的编辑部：<br>
　　附上从布勒斯劳<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：波兰称作：弗罗茨拉夫。――￥1￥编者注］</span></font>寄来的、让我转寄给您们的一封信。我不认识发信人霍罗维茨；但是，他在信中告诉我，他是社会民主党柏林支部的成员。<br>
　　致衷心的问候。<br>
<br>
<p align="right">卡尔・马克思</p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[359]这封信显然是马克思写给在伦敦出版的一家德文报纸的。――第291页。<br>
</span>
