<p class='title1'>恩格斯致弗里德里希・列斯纳</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1878年9月12日［于伦敦］凌晨一时三十分<br>
</td></tr></table></div>
<br>
亲爱的列斯纳：<br>
　　死亡刚刚使我可怜的妻子摆脱了她长期的病痛。<br>
　　葡萄酒我不能给你送去了，但是你可以随时派人来取。<br>
<br>
<br><p align="right">你的　<b>弗・恩・</b></p><br>
