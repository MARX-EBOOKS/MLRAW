<p class='title1'>恩格斯致鲁道夫・恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
巴门<br>
1878年9月12日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的鲁道夫：<br>
　　今晨一时半我的妻子在长期病痛之后安详地去世了。头天晚上我们结成了合法夫妻。<br>
　　我当前要应付各种各样的特别开支，而我在银行里的存款很少，所以您如果能火速给我汇来大约二百英镑，我将非常感激。<br>
<br><p align="right">　　你的　<b>弗里德里希</b></p><br>
