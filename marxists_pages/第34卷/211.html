<p class='title1'>恩格斯致恩斯特・德朗克</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
利物浦<br>
［<b>草稿</b>］<br>
1878年11月29日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的德朗克：<br>
　　我从惠・和马・两先生<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：惠特利和马多克。――￥1￥编者注］</span></font>处得知，你已经通知他们说，打算不办理转让保险单的手续。此外，我没有得到你本人有关此事的任何答复或说明。在这种情况下，我只能再次重申，保险单属于德朗克夫人，你根本无权支配。因此，在她按法律规定的方式转让以前，保险单对于我来说不能算作保证。如果不办理这个手续，我知道该怎样对待我们的交易，我也自然不会为保持保险单的效力而缴付任何保险费。<br>
<br>
<p align="right">　　你的</p>
