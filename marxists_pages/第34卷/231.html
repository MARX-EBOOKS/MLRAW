<p class='title1'>马克思致卡尔・希尔施</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1879年9月18日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的希尔施：<br>
　　我已经到达伦敦！[168]<br>
　　祝好。<br>
<br><p align="right">　　您的　<B>卡・马・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[168]1879年8月21日到9月17日马克思在兰兹格特（见本卷第93―94页）。――第92、368、384、385、386页。<br>
</span>
