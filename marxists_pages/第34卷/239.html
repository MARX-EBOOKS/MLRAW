<p class='title1'>马克思致阿基尔・洛里亚</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
曼都亚<br>
1879年12月3日于伦敦西北区梅特兰公园路41号<br>
</td></tr></table></div>
<br>
阁下：<br>
　　我的健康状况曾使我不得不离开伦敦一个时期。今天回来后，见到您11月23日的来信和您的著作<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：阿・洛里亚《地租和地租的自然消失》。――￥1￥编者注］</span></font>。现在就赶快告诉您已经收到并向您表示感谢。<br>
<br><p align="right">　　忠实于您的　<B>卡尔・马克思</b></p><br>
