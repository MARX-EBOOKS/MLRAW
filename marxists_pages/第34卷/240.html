<p class='title1'>马克思致某人<font size="3">[470]</font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1879年12月11日［于伦敦］<br>
</td></tr></table></div>
<br>
阁下：<br>
　　您可否在下星期日两点钟到我这里来吃饭？<br>
<br><p align="right">　　忠实于您的　<B>卡尔・马克思</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[470]这封信收在布罗歇收藏的名人真迹集中。――第405页。<br>
