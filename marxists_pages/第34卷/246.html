<p class='title1'>马克思致贝尔纳德・克劳斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
［<B>副本</B>］<br>
1880年3月26日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的克劳斯博士：<br>
　　我完全忘记了今天是耶稣受难节，因此我同女儿爱琳娜在十二点去时发现“罗亚尔”咖啡馆关着门，我们等到一点，因为您没有来，我们就去<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：在这封信的副本中，这个字上面加了一个问号。――￥1￥编者注］</span></font>您住的旅馆了。请您费心今天就写信给我（好让我明天能得到答复），您可否在星期日五点（而不是两点）到我们这里来进餐。<br>
　　爱琳娜小姐向您问好。<br>
<br>
<br><p align="right">您的　<B>卡尔・马克思</b></p><br>
<br>
