亲爱的拉法格：<br>
　　以上论述是我（昨天晚上）同恩格斯商量的结果。请在词句上加以修饰，但是不要改变内容。<br>
<br>
<br><p align="right">您的　<B>卡尔・马克思</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[483]这封信马克思写在他为恩格斯的《社会主义从空想到科学的发展》这本著作的法文版写的导言（见《马克思恩格斯全集》中文版第19卷第259―263页）的最后一页上。――第420页。<br>
