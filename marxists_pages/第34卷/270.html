<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
卡尔斯巴德<br>
［1880年11月12日于伦敦］<br>
</td></tr></table></div>
<br>
　　大概您已经收到了我的妻子终于寄出的信。她和所有生病的妇女一样，对目前给她治病的那些医生总是不相信。<br>
