<h4 style="text-align: center">8.</h4>
<p class="title1">马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
布里德林顿码头<br>
1881年8月16日[于阿尔让台]<br>
</td></tr></table></div>
<br>
亲爱的恩格斯：<br>
　　我们明天必须动身，因为我收到梅特兰小姐的信，说杜西<b>病得很厉害</b>，不让梅特兰小姐继续照看她，也不找医生看，等等。或许，甚至很可能得琳蘅陪妈妈<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：燕妮・马克思。――￥1￥编者注］</span></font>去伦敦；而我必须立即（也就是说明天）到那里去。<br>
<br><p align="right">你的　<b>卡・马・</b></p>
<br>
　　关于杜西的情况我当即写信给唐金医生了；但可能他已不在伦敦。<br>
