<h4 style="text-align: center">12.</h4>
<p class="title1">马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
布里德林顿码头<br>
1881年8月19日夜11时半[于伦敦]<br>
</td></tr></table></div>
<br>
　　妈妈<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：燕妮・马克思。――￥1￥编者注］</span></font>和海伦<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：德穆特。――￥2￥编者注］</span></font>刚刚经过福克斯顿到达这里，他们在布伦停留了一下。<br>
　　我没有写信告诉你，龙格和小哈利都病得很厉害。目前家里尽是不幸的事。<br>
　　祝好。<br>
<br><p align="right">　　<b>卡・马・</b></p>
