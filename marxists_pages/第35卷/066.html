<h4 style="text-align: center">66.</h4>
<p class="title1">恩格斯致马克思[118]</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
文特诺尔<br>
[1882年12月13日于伦敦]<br>
</td></tr></table></div>
<br>
　　晚上九点二十分刚收到这封信当然，保尔<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：拉法格。――￥1￥编者注］</span></font>到蒙吕松法院去受审以后，会马上被释放的。明天我就暂且给劳拉寄一笔必要的钱去。梅特兰公园41号一切都好。<br>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[118]恩格斯写给马克思的这几行字，是附带写在劳拉・拉法格1882年12月12日寄给他的信上的。劳拉通知说，保尔・拉法格刚被巴黎警察局逮捕。按照警察当局的命令，拉法格必须被送往蒙吕松城受审。――第122页。<br>
</span>
