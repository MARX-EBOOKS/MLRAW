<h4 style="text-align: center">69.</h4>
<p class="title1">马克思致恩格斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1882年12月18日[于文特诺尔]<br>
</td></tr></table></div>
<br>
亲爱的弗雷德：<br>
　　手稿<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：弗・恩格斯《马尔克》。――￥1￥编者注］</span></font>寄还；<b>非常好</b>！<br>
　　医生<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：威廉森。――￥2￥编者注］</span></font>刚才又来过；不能说我感到有好转，宁可说恰好相反。外面不冷，但是有雨，潮湿，所以医生坚持，不出现好天气，他就不能让我出去；否则，他说他不承担责任。<br>
　　真见鬼！必须有耐性！<br>
　　祝好。<br>
<br><p align="right">　　<b>摩尔</b></p>
