<h4 style="text-align: center">29.</h4>
<p class="title1">马克思致卡尔・希尔施</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
巴黎<br>
1881年8月<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：手稿为：“7月”。――￥1￥编者注］</span></font>6日于阿尔让台镇梯也尔林荫路11号<br>
</td></tr></table></div>
<br>
亲爱的希尔施：<br>
　　我在这里已经将近两个星期了；既没有去巴黎游览，也没有拜访任何熟人。我妻子的状况不允许这样做。<br>
　　由于她日益虚弱，我也许得比原先的计划大大提前离去，所以我想（如果没有意外事情干扰的话）明天一早就同琳蘅和琼尼去巴黎。我将去看你，如果你的时间允许的话，还打算让你陪陪我们。<br>
　　问候考布。<br>
<br><p align="right">你的　<b>卡・马克思</b></p><br>
