<h4 style="text-align: center">33.</h4>
<p class="title1">马克思致彼得・拉甫罗维奇・拉甫罗夫</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
巴黎<br>
1881年8月16日[于阿尔让台]<br>
</td></tr></table></div>
<br>
亲爱的拉甫罗夫：<br>
　　我明天要离开，所以这次没有机会再和您见面了。但是，既然我已经找到我来巴黎的路，以后我会随时来看看的。<br>
　　就此搁笔，再见。<br>
<br><p align="right">　　完全属于您的　<B>卡・马克思</b></p><br>
