<h4 style="text-align: center">39.</h4>
<p class="title1">马克思致敏娜・考茨基</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
巴黎<br>
1881年10月1日于伦敦西北区梅特兰公园路41号<br>
</td></tr></table></div>
<br>
尊敬的夫人：<br>
　　给您寄去一封写给我女儿<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：燕妮・龙格。――￥1￥编者注］</span></font>的短信。阿尔让台紧靠巴黎，从圣拉查尔车站乘车，大约只需要二十分钟。<br>
　　要不是我妻子得了重病，恐怕是<b>不治</b>之症，使我们中断了同外界的交往，我本来是准备请您来伦敦到我家作客的。您的儿子<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡尔・考茨基。――￥2￥编者注］</span></font>大概已转告您，我们全家多么赞赏您的作品。<br>
　　真诚地祝您身体健康。<br>
<br><p align="right">　　最忠实于您的　<B>卡尔・马克思</b></p><br>
