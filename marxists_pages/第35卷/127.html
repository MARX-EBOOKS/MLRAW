<h4 style="text-align: center">54.</h4>
<p class="title1">马克思致阿马利亚・丹尼尔斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
科伦<br>
1882年1月12日于威特岛[文特诺尔]圣博尼费斯花园1号<br>
</td></tr></table></div>
<br>
我亲爱的丹尼尔斯夫人：<br>
　　就是在我给您写信的那一天，我的女儿<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：爱琳娜・马克思。――￥1￥编者注］</span></font>在她从伦敦带来的文件中还发现了我的一张比较旧的照片。当时我立即把它装在现随信附上的信封里寄往科伦，但“帝国邮局”把它退还给我了。劳驾请通知我<b>您的准确地址</b>。<br>
　　然后我再把这个罪证寄给您。致衷心的问候。<br>
<br><p align="right">　　忠实于您的　<B>卡・马克思</b></p><br>
