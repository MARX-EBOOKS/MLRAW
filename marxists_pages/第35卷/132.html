<h4 style="text-align: center">59.</h4>
<p class="title1">恩格斯致彼得・拉甫罗维奇・拉甫罗夫</p>
<p class='date'><font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：这封信是用明信片写的。――￥1￥编者注］</span></font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1882年2月18日于[伦敦]瑞琴特公园路122号<br>
</td></tr></table></div>
<br>
亲爱的拉甫罗夫先生：<br>
　　非常遗憾，今天午饭后没有碰到您；不过我希望，假使您今天晚上能收到这张明信片的话，可否劳驾明天，即星期天下午七、八点之间到我这里来一下。您可以在我这里见到一些朋友。我们大家都很高兴和您见面。<br>
<br><p align="right">　　您的　<B>弗・恩格斯</b></p><br>
<center>[<b>恩格斯在明信片的背面写着</b>]</center><br>
　　西中央区托登楠大院路阿尔弗勒德街13号彼・拉甫罗夫先生<br>
<br><br><br></body></html>
