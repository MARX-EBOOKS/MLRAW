<h4 style="text-align: center">62.</h4>
<p class="title1">马克思致燕妮・龙格</p>
<p class='date'><font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：这封信是用明信片写的。――￥1￥编者注］</span></font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
阿尔让台<br>
1882年2月23日[于阿尔及尔]<br>
</td></tr></table></div>
<br>
亲爱的孩子：<br>
　　气候一直很好；我住在阿尔及尔城堡外小山上的一所非常舒适的别墅里。现在我需要的唯一的东西，就是安静；但愿很快恢复健康。<br>
　　吻所有的孩子们；问候龙格。<br>
<br><p align="right">　　深深爱你的　<b>老尼克</b></p><br>
<center>[<b>马克思在明信片的背面写着</b>]</center><br>
　　（法国）巴黎阿尔让台镇梯也尔林荫路11号沙尔・龙格夫人<br>
</span>
