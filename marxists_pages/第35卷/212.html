<h4 style="text-align: center">139.</h4>
<p class="title1">恩格斯致弗里德里希・列斯纳</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1883年3月15日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的列斯纳：<br>
　　我们的老马克思于昨天下午三时平静而安详地长眠了。致死的原因首先大概是内出血。<br>
　　葬礼将在星期六十二时举行，杜西请你务必参加。<br>
　　匆匆草此。<br>
<br><p align="right">　　你的　<b>弗・恩格斯</b></p><br>
