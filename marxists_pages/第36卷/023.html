<p class='title1'>致爱德华・伯恩施坦</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
苏黎世<br>
1883年6月22日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的伯恩施坦：<br>
　　您如果去巴黎，务必渡过海峡到我们这里呆几天。路上来回的花费，要比您这段时间呆在巴黎的花费省一些。这里房间已经给您准备好了。到时我要给您看的既有前一封信提到的大胆的稿子<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第40页。――￥1￥编者注］</span></font>，也有其他的稿子。拉法格夫人会告诉您最方便的走法。<br>
<br><p align="right">　　您的　<B>弗・恩・</b></p><br>
　　向李卜克内西问好。<br>
