<p class='title1'>致彼得・拉甫罗维奇・拉甫罗夫</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
巴黎<br>
1884年3月3日于［伦敦］<br>
瑞琴特公园路122号<br>
</td></tr></table></div>
<br>
亲爱的拉甫罗夫：<br>
　　上星期五，我给您寄去一箱已经跟您提过的书籍<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第96―97页。――￥1￥编者注］</span></font>，由巴黎保尔・勒隆路27号弗拉若勒兄弟代办处转，<B>寄费已在这里付清</B>；如果他们向您索款，请即通知我。如未收到，则劳驾去上述地点取书。<br>
　　在这里是托吉当斯公司寄运的。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩格斯</b></p>
