<p class='title1'>致萨拉・艾伦</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
［<B>草稿</B>］<br>
［1884年7月6日以后于伦敦］<br>
</td></tr></table></div>
<br>
夫人：<br>
　　现在答复昨天收到的您5日的来信，因为我不在城里，所以未能立即回复。现谨荣幸地告诉您，我认为爱・艾威林先生对您是非常合适的房客，并且相信，您把住房租给他，是不会后悔的。<br>
<br>
<p align="right">　　您的……</p>
