<p class='title1'>致詹姆斯・利・乔因斯</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
［<B>草稿</B>］<br>
1884年7月30日［于伦敦］<br>
</td></tr></table></div>
<br>
尊敬的先生：<br>
　　很遗憾，我现在不能同意您把我的著作《发展》<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：弗・恩格斯《社会主义从空想到科学的发展》。――￥1￥译者注］</span></font>译给《今日》刊登，因为已经答应了另一位先生<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：艾威林。――￥2￥编者注］</span></font>，我得受此约束。<br>
　　至于我答应过给《今日》写文章，那是我向巴克斯先生应许的，但据我所知，巴克斯先生已经不再是《今日》的编辑了。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩・</b></p>
