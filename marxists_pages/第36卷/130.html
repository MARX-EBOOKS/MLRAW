<p class='title1'>致约翰・林肯・马洪<font size="3">[254]<font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1884年11月28日于［伦敦］<br>
西北区瑞琴特公园路122号<br>
</td></tr></table></div>
<br>
尊敬的先生：<br>
　　您的便笺我今天早晨才收到，因为地址门牌写得不对（122号写成132号）。<br>
　　您如能在明天星期五晚上七点到八点来我处，要同我谈什么问题，我都乐意听取。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩格斯</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[254]英国工人社会主义者约・林・马洪在1884年11月26日写信给恩格斯，请求恩格斯接见他以便交谈英国工人运动问题。――第246页。<br>
</span>
