<p class='title1'>致卡尔・考茨基</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1885年2月14日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的考茨基：<br>
　　前天我忘记向你提了，我们跟往常一样，盼望你和你的妻子<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：路易莎・考茨基。――￥1￥编者注］</span></font>星期日（明天，15日）来吃饭，就是说，如果你们那里没有什么更好的安排的话；并希望今后每个星期日你们到我这里来作客。<br>
<br><p align="right">　　你的　<b>弗・恩格斯</b></p>
