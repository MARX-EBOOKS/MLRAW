<p class='title1'>致帕斯夸勒・马尔提涅蒂</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
贝内万托<br>
1885年4月11日于伦敦<br>
西北区瑞琴特公园路122号<br>
</td></tr></table></div>
<br>
尊敬的先生：<br>
　　我给您写这几行字，仅仅是为了告诉您译稿<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：恩格斯《家庭、私有制和国家的起源》一书的意大利文译稿。――￥1￥编者注］</span></font>已经收到并且正在校阅。希望过十天半个月后，能将译稿连同我的意见和建议一起寄还。就我至今已经读了的那部分来看，我认为译得很好。<br>
　　衷心感谢您。<br>
<br><p align="right">　　仍然忠实于您的　<B>弗・恩格斯</b></p>
