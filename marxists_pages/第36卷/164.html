<p class='title1'>致爱德华・伯恩施坦</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
苏黎世<br>
［1885年5月15日以前于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的爱德：<br>
　　谢谢。奥古斯特来信说：他没有承认国会党团的职权范围，党团在为时三天的辩论之后<B>一致</B>决定停止<B>个人的</B>争论，而把实质性的争论挪到国会会议<B>以后</B>进行，这一点奥古斯特是同意了的。可见，所谓失败的消息是造谣，我们取得了全线的胜利。<br>
<br><p align="right">你的　<b>弗・恩・</b></p>
