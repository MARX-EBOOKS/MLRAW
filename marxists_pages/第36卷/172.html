<p class='title1'>致帕斯夸勒・马尔提涅蒂</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
贝内万托<br>
1885年6月13日于伦敦<br>
</td></tr></table></div>
<br>
尊敬的先生：<br>
　　请费神把您的译作<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：恩格斯《家庭、私有制和国家的起源》一书的意大利文译本。――￥1￥编者注］</span></font>寄六本给我――这就足够了。<br>
　　约在译稿<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第315―316页。――￥2￥编者注］</span></font>寄走十天之后发出的信，谅已收到。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩格斯</b></p><br>
　　同时给您寄去一册（马克思和恩格斯的）《1847年共产党宣言》。不管这个《宣言》多老，我认为永远值得一读。<br>
</span>
