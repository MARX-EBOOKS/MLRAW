<p class='title1'>致维拉・伊万诺夫娜・查苏利奇</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
日内瓦<br>
1886年3月31日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的女公民：<br>
　　您寄来《哲学的贫困》的译本，我已及时收到，非常感谢。<br>
　　我在打纸包时，把纸包上的寄发人地址撕碎了。我费了很大工夫才把碎纸片拼凑起来，认出我现在写的这个地址。但是我不敢确信我把地址认对了，请再把您的地址寄给我，因为我想把我从圣彼得堡收到的《资本论》第二卷俄译本寄给您。<br>
　　我的笨手笨脚，给您添了麻烦，请原谅，并请接受我的最忠诚的感情。<br>
<br><p align="right">　　<b>弗・恩格斯</b></p>
