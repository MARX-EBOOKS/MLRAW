<p class='title1'>致埃・特・<font size="3">[529]<font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
［1886年11月13日以前于伦敦］<br>
</td></tr></table></div>
<br>
　　对上述询问答复如下：您所说的小册子已有了译者<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：艾威林――￥1￥编者注］</span></font>；由于翻译这本小册子相当困难，我当然不希望看到有未经我预先校阅的译本发表。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩格斯</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[529]这封信是恩格斯对一个叫埃・特・的人的答复。这个人曾写信给《公益》杂志编辑部，询问恩格斯的小册子《社会主义从空想到科学的发展》是否有英译本，以及是否任何一个愿意翻译的人都可以翻译这本书。――第556页。<br>
</span>
