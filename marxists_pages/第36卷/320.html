<A style='text-decoration: none' href='../../index.html'>中文马克思主义文库</A> -&gt; <a style='text-decoration: none' href='../../marx/index.htm'>马克思</a> - <a style='text-decoration: none' href='../../engels/index.htm'>恩格斯</a> -&gt; <a style='text-decoration: none' href='../index.htm'>《马克思恩格斯全集》</a> -&gt; <a style='text-decoration: none' href='index.htm'>第三十六卷</a><hr color='#808080' size='1'>
<p class='title1'>致法国工人党中央联合会<font size="3">[570]<font></p>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
巴黎<br>
1887年3月18日于伦敦<br>
</td></tr></table></div>
<br>
公民们：<br>
　　我全心全意地和你们一起庆祝三月十八日。<br>
<br>
<p align="right">弗・恩格斯</p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[570]这封信是恩格斯写给法国工人党中央联合会为巴黎公社十六周年纪念日而组织的集会的。在1887年3月18日举行的集会上宣读了这封信。――第617页。<br>
</span>
