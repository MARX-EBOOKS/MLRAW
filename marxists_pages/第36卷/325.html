<p class='title1'>致保尔・拉法格</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
巴黎<br>
1887年4月11日于伦敦<br>
西北区瑞琴特公园路122号<br>
</td></tr></table></div>
<br>
亲爱的拉法格：<br>
　　您要求我以卡尔・马克思的遗著处理人的资格正式授权给您洽谈有关《哲学的贫困》以及马克思其他著作的法文本再版事宜。[580]我当然乐于授权给您，尽管我们两人之间这样做是没有什么必要的。<br>
　　祝好。<br>
<br><p align="right">　　<b>弗・恩格斯</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[580]拉法格这时正为马克思的著作《哲学的贫困》法文第二版再次进行洽谈，但当时这一版没有出成，到1896年才出版。――第625、626页。<br>
</span>
