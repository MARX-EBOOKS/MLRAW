<p class='title1'>致尼古拉・弗兰策维奇・丹尼尔逊</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
彼得堡<br>
1887年4月24日于伦敦<br>
</td></tr></table></div>
<br>
尊敬的先生：<br>
　　我匆匆写上几句告诉您一下，两包挂号寄来的书信<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：指卡・马克思写给丹尼尔逊的书信。――￥1￥编者注］</span></font>和您在旧历4月7日发出的通知我邮包寄出的信，都已平安寄到。本来不必急于把这些书信寄来，但我还是非常感激您把这些珍贵的遗物信托给我。我将以极大的兴趣阅读它们，必要时要使用它们，并且随时准备奉还给您。<br>
<br><p align="right">　　忠实于您的　<B>派・怀・罗舍</b><br><font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：恩格斯的化名。――￥2￥编者注］</span></font></p>
