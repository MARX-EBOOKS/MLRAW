<p class='title1'>致卡尔・考茨基</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1887年6月15日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的考茨基：<br>
　　你是哪一天给李卜克内西写信谈沙克的事的？刚才收到李卜克内西夫人的来信，这封信使人觉得，好象至少<B>她</B>对整个这件事毫无所知。希望弄清这个疑团。<br>
<br><p align="right">你的　<b>弗・恩・</b></p>
