<p class='title1'>致帕斯夸勒・马尔提涅蒂</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
贝内万托<br>
1887年6月20日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的朋友马尔提涅蒂：<br>
　　鲍尔先生没有回信，据我从韦德那里了解，是因为他现时外出。因此，现在询问他是否收到了您的照片，是无用的。<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第641―642页。――￥1￥编者注］</span></font>我大概很快有可能得知此事，希望在这期间您收到鲍尔本人的通知。<br>
　　衷心问好。<br>
<br><p align="right">　　您的　<B>弗・恩格斯</b></p>
