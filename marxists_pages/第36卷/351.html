<p class='title1'>致卡尔・考茨基</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
文特诺尔<br>
1887年7月22日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的考茨基：<br>
　　我们明天动身。我们的地址是：伊斯特勃恩市卡文迪什街4号。[611]同时寄去报纸一束。大家向你问好。希望你们那里不太热！这里热得要死。<br>
<br><p align="right">你的　<b>弗・恩・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[611]恩格斯从1887年7月23日至9月2日在伊斯特勃恩休养。――第663、664、667、669、672、674、676、677页。<br>
</span>
