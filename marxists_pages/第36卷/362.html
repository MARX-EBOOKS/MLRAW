<p class='title1'>致彼得・拉甫罗维奇・拉甫罗夫</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
巴黎<br>
1887年9月3日于伦敦<br>
</td></tr></table></div>
<br>
　　从圣彼得堡的丹尼尔逊那里得到了关于格・洛帕廷逝世的消息。关于此事，您是否得到了证实？但愿这是误传。[627]如果这个消息不幸属实，请告诉我，我马上写一篇悼文寄给苏黎世的《社会民主党人报》。<br>
<br><p align="right">　　您的　<B>弗・恩・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[627]格・洛帕廷逝世的消息原来是讹传。――第677页。<br>
</span>
