<p class='title1'>致卡尔・考茨基</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1887年12月20日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的考茨基：<br>
　　今天我要到布莱顿去，争取明天晚上回来。但是由于其间可能发生什么事情，所以你们如果不是在明天而是在星期四<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：12月22日。――￥1￥编者注］</span></font>晚上到我们这里来，那也许更可靠些。<br>
　　衷心问好。<br>
<br><p align="right">你的　<b>弗・恩・</b></p>
