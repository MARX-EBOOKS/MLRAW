<h4 style="text-align: center">51.</h4>
<p class="title1">致弗里德里希・阿道夫・左尔格</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
霍布根<br>
1888年9月12日星期三于纽约州<br>
普拉茨堡市福凯公寓<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：这封信是用旅馆信笺写的。――￥1￥编者注］</span></font><br>
</td></tr></table></div>
<br>
亲爱的左尔格：<br>
　　今晚从普莱锡德湖回来，明天将沿香普冷湖顺流而下。<br>
　　好象我在上一封信里忘了请你给我们再买一百五十支那种雪茄烟，我们钱都用完了。<br>
　　多多问候。<br>
<br><p align="right">　　你的　<b>弗・恩格斯</b></p>
