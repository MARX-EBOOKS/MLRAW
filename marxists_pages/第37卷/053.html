<h4 style="text-align: center">53.</h4>
<p class="title1">致《纽约人民报》编辑部<font size='3'>[83]</font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
［<B>草稿</B>］<br>
1888年9月18日于霍布根<br>
</td></tr></table></div>
<br>
私人信件<br>
<center><b>致《纽约人民报》编辑部</b><br>
（致《社会主义者报》编辑部）</center><br>
　　我本来打算在美国短期旅行结束的时候亲自拜访贵报编辑部。但是，遗憾的是，在乘“纽约号”离开之前，我在纽约逗留的时间太短，我的这个打算不能实现了，因此请你们多多原谅。<br>
<br>
<p align="right">　　忠实于你们的　<B>弗・恩・</B></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[83]保存下来的恩格斯的这封信和下一封信的草稿是写在一张纸上的。――第90页。<br>
</span>
