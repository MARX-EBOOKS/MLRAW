<h4 style="text-align: center">54.</h4>
<p class="title1">致《芝加哥工人报》编辑部</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
［<B>草稿</B>］<br>
[1888年9月18日于霍布根]<br>
</td></tr></table></div>
<br>
私人信件<br>
<center><b>致《芝加哥工人报》</b></center><br>
　　很遗憾，我在美国短期旅行期间，没有能够去芝加哥亲自拜访贵报编辑部。为此，请允许我向你们表示歉意。<br>
<br><p align="right">　　忠实于你们的　<B>弗・恩・</B></p>
