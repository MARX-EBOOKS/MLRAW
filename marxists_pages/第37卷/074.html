<h4 style="text-align: center">74.</h4>
<p class="title1">致卡尔・考茨基</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
维也纳<br>
1889年1月18日于伦敦<br>
</td></tr></table></div>
<br>
　　原来打算同杜西和爱德华商量一下，但目前还不行，因为他们两人在康瓦尔，要到下星期或者更晚才能回来。而杜西早些时候已经就那件事情给你妻子写信谈了她所知道的情况。但是，无论如何我们还应当找你们来这里。不管怎样，这件事大概在春天以前能够做到。现在我必须重新着手搞我那些手稿<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：《资本论》第三卷。――￥1￥编者注］</span></font>，由于大雾，由于要写各种有关巴黎和伦敦的纠纷的信件，我已经搁了一个月了。衷心问候路易莎。<br>
<br><p align="right">　　你的　老<b>将军</b></p>
<br>
