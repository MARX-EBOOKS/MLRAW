<h4 style="text-align: center">102.</h4>
<p class="title1">致爱琳娜・马克思-艾威林</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
[1889年5月13日左右于伦敦]<br>
</td></tr></table></div>
<br>
　　由于劳拉给你的信<B>没有加封</B>，我便附上我这封信[195]。我希望今天晚上能在赛姆那里见到你。<br>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[195]这封信是写在劳・拉法格1889年5月12日给恩格斯的那封信的最后一页上的。劳・拉法格在那封信中说，目前她还没有得到瓦扬和其他人的同意把信寄给《星报》，因此她本人对这种做法是否合适表示怀疑。恩格斯5月14日的信（见本卷第198―200页）是为了答复这封信而写的。――第198页。<br>
</span>
