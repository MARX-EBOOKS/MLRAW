<h4 style="text-align: center">108.</h4>
<p class="title1">致阿・弗・罗宾逊</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1889年5月21日于伦敦<br>
西北区瑞琴特公园路122号<br>
</td></tr></table></div>
<br>
　　阿・弗・罗宾逊先生<br>
　　汉普斯泰特路小乔治街47号<br>
<br>
尊敬的先生：<br>
　　据悉，您现在有了一个好的职位，完全能够逐步偿还我借给您的那二十五个先令，而您的邻居拉尔先生现在没有工作，我请您把这些钱按周付给他，至于每周您能够付给他多少，你们可以相互协商一下。拉尔先生和夫人得到这些钱的收据，同我本人的收据一样有效。<br>
<br><p align="right">　　尊敬您的　<B>弗・恩格斯</b></p>
