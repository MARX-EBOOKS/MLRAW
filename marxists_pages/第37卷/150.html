<h4 style="text-align: center">150.</h4>
<p class="title1">致帕斯夸勒・马尔提涅蒂</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
贝内万托<br>
1889年11月30日于伦敦<br>
</td></tr></table></div>
<br>
亲爱的朋友：<br>
　　我急需告诉您的，就是我收到您的信后马上写信给拉法格谈了拉布里奥拉的事[283]。拉法格今天告诉我，他已经给拉布里奥拉写信谈了您的事，并要他尽可能为您办到。因此未必需要我再给他写信了。<br>
　　希望这些活动获得成功。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩格斯</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[283]马尔提涅蒂请恩格斯通过拉法格，把他介绍给安东尼奥・拉布里奥拉。提到的恩格斯给拉法格的信没有保存下来。――第310页。<br>
</span>
