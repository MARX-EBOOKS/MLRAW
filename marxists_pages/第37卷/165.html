<h4 style="text-align: center">165.</h4>
<p class="title1">致海尔曼・施留特尔</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
纽约<br>
1890年1月15日[于伦敦]<br>
</td></tr></table></div>
<br>
　　白恩士要我转告，他不认识提到的那个人<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：里德。见本卷第337页。――￥1￥编者注］</span></font>，可见，这无论如何是一个令人怀疑的人。<br>
　　这里流行性感冒蔓延，但是我们至今没有感染。其他没有什么新闻。<br>
<br><p align="right">你的　<b>弗・恩・</b></p>
