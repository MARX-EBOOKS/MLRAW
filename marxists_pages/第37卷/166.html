<h4 style="text-align: center">166.</h4>
<p class="title1">致查理・罗舍</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
［<B>草稿</B>］<br>
[1890年1月19日以前于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的查理：<br>
　　在您为派尔希安排工作的这两个月中，您写信给我要求借钱，并且措词使人丝毫不会怀疑，即使我不能满足您的愿望，您也不会解除这个合同。可是我一作了否定的答复，您实际上就解除了合同。您未必能否认，如果您想表达这样的思想，即这个合同不过是为借钱作准备，那末这件事您就不可能办得更好。但是现在您说，这两个问题之间完全没有任何联系，当然，我应该相信您。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩・</b></p>
