<h4 style="text-align: center">198.</h4>
<p class="title1">致路德维希・库格曼</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
汉诺威<br>
1890年6月30日[于伦敦]<br>
</td></tr></table></div>
<br>
　　衷心感谢你多次给我寄来东西。我试图弄到那一号《每日电讯》，[367]但是没有结果，因为我说不出文章登出的日期。此外，有人告诉我，那一号报纸大概已经卖光。向这里的商人问不出结果，因为只是一个便士的事情！<br>
<br><p align="right">你的　<b>弗・恩・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[367]路德维希・库格曼在1890年6月13日的信中，请恩格斯把载有金斯敦写的俾斯麦访问记的那两号《每日电讯》寄给他。――第419页。<br>
</span>
