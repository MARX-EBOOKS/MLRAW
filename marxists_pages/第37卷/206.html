<h4 style="text-align: center">206.</h4>
<p class="title1">致约翰・亨利希・威廉・狄茨</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
斯图加特<br>
1890年8月5日于伦敦<br>
</td></tr></table></div>
<br>
最尊敬的狄茨先生：<br>
　　费舍对<B>立即</B>再版《起源》<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：弗・恩格斯《家庭、私有制和国家的起源》。――￥1￥编者注］</span></font>又提出反对。对此我确实感到高兴，因为我还打算去海滨，在那里根本无法考虑工作，何况现在工作对我也绝无好处。这样，在这一切还没有得到各方面都满意的解决之前，我就等着。<br>
　　附上给卡・考茨基的信，在送去之前请你看一下内容，如需要，可采取必要的措施。<br>
　　致衷心的问候。<br>
<br><p align="right">　　您的　<B>弗・恩格斯</b></p>
<br>
