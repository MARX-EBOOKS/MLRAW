<h4 style="text-align: center">230.</h4>
<p class="title1">致卡尔・考茨基</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
斯图加特<br>
1890年10月5日[于伦敦]<br>
</td></tr></table></div>
<br>
亲爱的考茨基：<br>
　　你是否能设法再给我寄一份《新时代》；这是给我们的朋友赛姆的，<br>
<div align="center"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
　　“在遥远、遥远的尼日尔河畔，<br>
　　眼下他正在那里捕猎狮子和老虎”，<br>
</td></tr></table></div>
　　如果我<B>马上</B>收到第一期，那在下星期五就可以寄出。<br>
　　狄茨可以从我的稿费中扣款。<br>
　　我和肖利迈<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：肖莱马的绰号。――￥1￥编者注］</span></font>多多问候你。<br>
<br><p align="right">你的　<b>弗・恩・</b></p>
<br>
