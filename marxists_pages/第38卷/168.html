<h4 style="text-align: center">168.</h4>
<p class="title1">致卡尔・考茨基</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
斯图加特<br>
1892年6月27日［于伦敦］<br>
</td></tr></table></div>
<br>
　　我们优秀的肖莱马已于今晨安静地去世了。明天我就动身去那里。[330]<br>
　　悼文<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：弗・恩格斯《卡尔・肖莱马》。￥1￥编者注］</span></font>将在《前进报》上发表。<br>
<br><p align="right">你的　<b>弗・恩・</b></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[330]1892年6月29日―7月2日，恩格斯去曼彻斯特参加了卡・肖莱马的葬礼。――第376、377、393页。<br>
</span>
