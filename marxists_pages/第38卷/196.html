<h4 style="text-align: center">196.</h4>
<p class="title1">致帕斯夸勒・马尔提涅蒂<font size='3'>[376]</font></p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
贝内万托<br>
1892年8月22日于赖德<br>
</td></tr></table></div>
<br>
　　……我估计，关于父姓勒夫累的公爵夫人<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：卡扬尼埃洛公爵夫人。――￥1￥编者注］</span></font>是发生了什么误会。我没有听到爱琳娜・马克思-艾威林夫人什么时候谈过这位太太。艾威林夫人现在在挪威；她回来后，我问她一下，然后告诉您。<br>
<br><p align="right">　　您的　<B>弗・恩格斯</b></p><br>
（伦敦的地址不变）<br>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[376]这几行字是恩格斯写在一张明信片上的，明信片贴邮票的一角残缺。――第433页。<br>
</span>
