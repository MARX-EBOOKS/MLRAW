<h4 style="text-align: center">233.</h4>
<p class="title1">致谢尔盖・米哈伊洛维奇・克拉夫钦斯基（斯捷普尼亚克）</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1892年11月15日于伦敦西北区瑞琴特公园路122号<br>
</td></tr></table></div>
<br>
亲爱的斯捷普尼亚克：<br>
　　您能否于<B>星期四</B><font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：11月17日。――￥1￥编者注］</span></font>同斯捷普尼亚克夫人和沃尔霍夫斯基及其小女儿一起到我们这里来吃午饭？假如你们于三点半至四点之间到达，我们还可以谈些事情，<B>五点</B>吃饭。您知道，从您家到我这里路并不近，如果我们能按上面讲的说定，你们尽可以不在家里吃饭。<br>
　　考茨基夫人和我衷心问候斯捷普尼亚克夫人。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩格斯</b></p>
<br>
