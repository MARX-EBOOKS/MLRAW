<h4 style="text-align: center">附录4.</h4>
<p class="title1">致某人<font size='3'>[464]</font>
</p>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
［1892年12月底于伦敦］<br>
</td></tr></table></div>
<br>
　　向一八九三年致敬！<br>
　　希望和欢乐与它一起重新来临。<br>
　　愿它始终快乐光明，<br>
　　这一祝愿来自最忠实于您的人。<br>
<br>
<p align="right"><B>弗・恩・</B></p>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[464]这封信是一首诙谐诗，作者不详。恩格斯的签名是用铅笔写的。――第572页。<br>
</span>
