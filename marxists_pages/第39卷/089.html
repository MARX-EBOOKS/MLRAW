<h4 style="text-align: center">89.</h4>
<p class="title1">致保尔・阿伦特</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
[<B>草稿</B>]<br>
1893年12月5日[于伦敦]<br>
</td></tr></table></div>
<br>
尊敬的阿伦特先生：<br>
　　我非常明白您不愿意在一个星期日来我这儿，因为在这个时期所发生的那些事情以后，我不能同您保持我们之间先前的那种坦率的关系。<br>
　　如果您仍然希望同我谈一谈，那末星期四，即后天晚上八点以后我在家。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩・</b></p>
