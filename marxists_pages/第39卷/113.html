<h4 style="text-align: center">113.</h4>
<p class="title1">致尼古拉・弗兰策维奇・丹尼尔逊</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
彼得堡<br>
1894年3月20日于伦敦<br>
西北区瑞琴特公园路122号<br>
</td></tr></table></div>
<br>
阁下：<br>
　　今天用<B>挂号印刷品</B>邮件寄去第三卷<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：指《资本论》。――￥1￥编者注］</span></font>的第一至六印张（第九十六页以前的都在内），包括第一篇的大部分。其余的我一收到即陆续寄去。<br>
　　您11月4日、23日和2月24日的来信已收到。一有可能当即回复。<br>
<br><p align="right">　　忠实于您的　<B>路・考・</b><br>
<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：恩格斯的化名。――￥2￥编者注］</span></font></p>
