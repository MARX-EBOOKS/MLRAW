<h4 style="text-align: center">135.</h4>
<p class="title1">致维托德・约德科－纳尔凯维奇</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1894年6月5日于伦敦<br>
西北区瑞琴特公园路122号<br>
</td></tr></table></div>
<br>
亲爱的约德科：<br>
　　我不确切记得，您是否翻译了我的论文《波兰宣言》（载《〈人民国家报〉国际问题论文集》）并将它刊登在《黎明》上。如有此事，请将载有这篇文章的《黎明》再寄给我一份。有几个维也纳来的波兰大学生要求我允许他们翻译这篇文章。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩格斯</b></p>
