<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
［<B>草稿</B>］<br>
［不早于1894年8月15日，于伦敦］<br>
</td></tr></table></div>
<br>
　　根据多年的私交，我认为斯・门德尔森先生是一个可以信任的正派人。如果我处在您的地位，我将毫不犹豫地把您提到的那所房子租给他。<br>
