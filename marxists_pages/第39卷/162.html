<h4 style="text-align: center">162.</h4>
<p class="title1">致玛丽亚・门德尔森</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1894年10月26日于［伦敦］<br>
西北区瑞琴特公园路41号<br>
</td></tr></table></div>
<br>
亲爱的门德尔森夫人：<br>
　　我们终于可以接待我们的朋友了，虽然这所房子的样子仍然象遭受过围攻和炮轰一样。我们欢迎你们夫妇星期日晚上来。<br>
　　路易莎和大夫<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：弗赖贝格尔。――￥1￥编者注］</span></font>问好。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩格斯</b></p>
