<h4 style="text-align: center">164.</h4>
<p class="title1">致卡尔・希尔施</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
科伦<br>
1894年11月8日［于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的希尔施：<br>
　　谢谢你按期寄来《莱茵报》，请你把地址改一下，不是<B>122号</B>，而是<br>
　　伦敦西北区瑞琴特公园路41号，<br>
　　这座房子在马路的对面，就在樱草丘的<B>下面</B>，靠近公园的入口。此外一切都好！<br>
<br><p align="right">你的　<b>弗・恩・</b></p>
<br>
