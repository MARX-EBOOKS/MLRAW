<h4 style="text-align: center">167.</h4>
<p class="title1">致奥古斯特・倍倍尔和保・辛格尔</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
柏林<br>
1894年11月14日于伦敦<br>
</td></tr></table></div>
<br>
奥古斯特・倍倍尔和保尔・辛格尔：<br>
　　我曾经立遗嘱把一千英镑――扣除遗产税――赠给你们“用于选举的需要”<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第483页。――￥1￥编者注］</span></font>，我只有用这种方式遗赠，在这里才有法律效力，我不能以任何其他方式把这笔钱直接遗赠给党。这就是要做这种限制的唯一原因。请首先考虑得到这笔钱，然后再考虑不要让这笔钱落到普鲁士人手里。在通过关于这个问题的决议时，请喝一瓶好酒来纪念我。<br>
<br>
<p align="right">　　<B>弗里德里希・恩格斯</B></p>
