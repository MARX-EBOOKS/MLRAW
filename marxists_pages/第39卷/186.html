<h4 style="text-align: center">186.</h4>
<p class="title1">致乔治・威廉・兰普卢</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1894年12月21日于［伦敦］<br>
西北区瑞琴特公园路41号<br>
</td></tr></table></div>
<br>
　　我们已搬到瑞琴特公园路41号。门上的小牌写的名字是弗赖贝格尔博士。如果什么时候您肯到我们这里来，我们将很高兴。祝您和您全家愉快地迎接圣诞节。<br>
<br><p align="right">　　忠实于您的　<B>弗・恩格斯</b></p><br>
　　今天是一年中最短的一天，的确是短极了！<br>
