<h4 style="text-align: center">248.</h4>
<p class="title1">致斯塔尼斯拉夫・门德尔森</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1895年4月23日于［伦敦］<br>
西北区瑞琴特公园路41号<br>
</td></tr></table></div>
<br>
亲爱的门德尔森：<br>
　　<B>假如天气好</B>，我准备明天（星期三）下午三点到四点钟之间到您那里去，不知是否合适。<br>
　　向门德尔森夫人和您问好。<br>
<br><p align="right">　　您的　<B>弗・恩格斯</b></p>
