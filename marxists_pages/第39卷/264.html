<h4 style="text-align: center">264.</h4>
<p class="title1">致爱德华・伯恩施坦</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
伦敦<br>
1895年7月4日于伊斯特勃恩市<br>
皇家大校场4号<br>
</td></tr></table></div>
<br>
亲爱的爱德：<br>
　　来信收到。谢谢。一切如旧，也就是说，心情随着身体状况的好坏而变化无常。工作还根本不用想，只能写写最必要的信。昨天劳拉走了，路易莎又到这里来了；她和我衷心问候你，问候孩子们和吉娜。<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：伯恩施坦的养子养女和妻子。――￥1￥编者注］</span></font><br>
<br><p align="right">你的　<b>弗・恩・</b></p>
