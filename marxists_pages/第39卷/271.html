<h4 style="text-align: center">附录2.</h4>
<p class="title1">致娜塔利亚・李卜克内西</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
柏林沙洛顿堡<br>
［1894年7月1日于伦敦］<br>
</td></tr></table></div>
<br>
亲爱的李卜克内西夫人：<br>
　　我们大家聚会在瑞琴特公园路122号，喝着德国啤酒并等待着关于选举的电报。<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
弗・列斯纳，爱德・伯恩施坦，弗・德穆特，威・梭恩，威廉<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：威廉・李卜克内西。――￥1￥编者注］</span></font>，弗・恩格斯，玛丽亚・门德尔森，路・弗赖贝格尔，奥托・维特耳斯赫弗尔，吉娜・伯恩施坦，斯塔尼斯拉夫・门德尔森，尤利乌斯<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：尤利乌斯・莫特勒。――￥2￥编者注］</span></font>，路易莎・弗赖贝格尔<br>
</td></tr></table></div><br>
