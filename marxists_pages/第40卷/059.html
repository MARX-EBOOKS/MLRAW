<p class='title1'>亨利希・马克思致卡尔・马克思</p>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
　　柏林[190]<br>
　　[1838年]2月16日<br>
</td></tr></table></div>
<br>
　　亲爱的卡尔，写几个字向你问好。更多的话我暂时也写不出来了。<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
你的父亲<br>
　　　<B>马克思</B><br>
<br>
第一次发表于《马克思恩格斯全集》1929年国际版第1部分第1卷第2分册<br>
原文是德文<br>
</td></tr></table></div>
<br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[190]这两行字是亨利希・马克思写给儿子的最后一封信。这几句话是附在给罕丽达・马克思的一封信上的，她于1838年2月中将此信转寄给马克思。1838年5月10日身患重病的亨利希・马克思逝世。――第887页。<br>
</span>
