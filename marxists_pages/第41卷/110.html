<p class='title1'>［一年制志愿兵弗里德里希・恩格斯的品行证书］</p>
<br>
<br>
<h3 style="text-align: center">品行证书</h3><br>
　　持证人一年制志愿兵<B>弗里德里希・恩格斯</B>，近卫炮兵旅第十二步兵连炮手，杜塞尔多夫专区爱北斐特区巴门人，现年二十一岁零十个月，服役已满一年，服役期间品德和执勤均表现优异，特此证明。<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
冯・<B>韦德尔</B>，<br>
　　上尉连长<br>
</td></tr></table></div><br>
<br>
　　1842年10月8日于柏林<br>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
第一次发表于《马克思恩格斯全集》1930年国际版第1部分第2卷<br>
原文是德文<br>
</td></tr></table></div><br>
