<p class='title1'>*国民议会中左派的立场</p>
<br>
<br>
　　<B>科伦</B>11月22日。据私人提供的消息说，法兰克福国民议会中的<U><B>左派</B></U>和中间派<U><B>左翼</B></U>在昨晚举行的秘密会议上决定<U><B>退出该议会，并成立一个德国民主委员会，同时还向德国人民发出呼吁</B></U>。<br>
　　我们发表这则消息，并不能担保它可靠，但我们相信，除上述办法外，左派和中间派左翼没有别的出路。如果他们不走这条路，那就等于自杀。<br>
<br>
