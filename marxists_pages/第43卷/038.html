<p class='title1'>国民院会议</p>
<br>
<br>
　　<B>伯尔尼</B>11月27日。在国民院今天的会议上，再次讨论了发表辩论公报的问题，但由于出席人数太少，这个问题立即被推迟到明天再讨论。<br>
