<p class='title1'>*被拆的信件</p>
<br>
<br>
　　<B>科伦</B>11月28日晚十一时。今天晚上我们收到两封信，一封写明是“<B>伯尔尼</B>”，另一封是“<B>巴黎</B>”。这两封信显然被官方或半官方<B>拆过</B>。加封的印章不见了。重新粘上的封缄纸<B>还没干</B>。和<B>文迪施格雷茨</B>同时进行宣传的还有<B>泽德尔尼茨基</B>。<br>
<br>
