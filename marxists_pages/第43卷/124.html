<p class='title1'>*马扎尔人的胜利</p>
<br>
<br>
　　科伦4月12日。我们今天发行了增刊，这并不是为了向读者报道昨天在法兰克福举行的根本无关紧要的辩论，而是为了向读者报道一条更为重要得多的消息，即马扎尔人取得了对帝国军队的重大胜利，全线被击溃的帝国军队已撤退到佩斯城下（见“匈牙利”栏）<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见下一篇文章。――￥1￥编者注］</span></font>。<br>
