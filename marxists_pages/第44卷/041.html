<p class='title1'>阿穆塞特炮</p>
<br>
<br>
　　<b>阿穆塞特炮</b>――一种过去在山地使用的发射一磅重圆形炮弹的轻型小炮，这种小炮曾受到萨克斯元帅的高度评价，但是现在已经完全不使用了。<br>
<br>
