<p class='title1'>*关于在1866年召开国际全协会代表大会的决议</p>
<br>
<br>
　　常务委员会建议中央委员会同意将下述决议案提交代表会议批准：<br>
　　如果没有发生必须使大会延期举行的意外情况，中央委员会将在1866年召开全协会代表大会。<br>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
