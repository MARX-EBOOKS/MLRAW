<p class='title1'>伦敦德国政治流亡者救济委员会的现款收据</p>
<br>
<br>
<p align="right">　　1849年11月13日</p>
　　兹收到经蒂森先生从施特廷转来的十一英镑十四先令，仅以贫困的德国政治流亡者的名义对此表示感谢。<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">

签名：卡尔・马克思博士，亨利希・鲍威尔，卡尔・普芬德<br>
　　　　　　　　1849年11月13日于伦敦<br>
<br>
载于1849年11月23日《北德意志自由报》第208号<br>
