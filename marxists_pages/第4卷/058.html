<p class='title1'>马克思所做的关于1847年8月5日建立共产主义者同盟布鲁塞尔支部和区部的记录</p>
<br>
<br>
　　<b>8月5日</b>。建立新支部。<br>
　　马克思当选为主席，<br>
　　日果当选为秘书兼财务员。<br>
　　<b>区部委员会</b>：日果、荣格、马克思、沃尔弗<br>
