<p class='title1'>译后记</p>
<br>
<br>
　　本书是根据“马克思恩格斯全集”俄文第二版并参照有关的原文翻译的。其中“共产党宣言”一文是在“马克思恩格斯文选”两卷集中译文的基础上校订的，由唯真同志最后定稿，并请朱文叔先生从中文上提过修辞意见。“哲学的贫困”一文在译校过程中曾参考了何思敬同志的译本（1956年人民出版社版）。<br>
　　参加本书翻译工作的有冯世熹、王燕华、汤钰卿、张文焕、任田升、朱中龙、张植芳、沈渊等同志。译文最后由樊以楠等同志校订。<br>
<p align="right">中共中央马克思恩格斯列宁斯大林著作编译局</p>
