<p class='title1'>马克思致迈尔<font size='3'>[128]</font></p>
<br>
<center><b>伦敦</b></center>
<br>
［<B>草稿</B>］<br>
<p align="right">　　［1853年2月3日左右于伦敦］</p>
　　查理・威廉斯<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：马克思的化名。――￥1￥编者注］</span></font>谨向迈尔先生致敬并不揣冒昧附上一信恳请转交瑟美列先生。<br>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">

原文是英文<br>
</td></tr></table></div><br>
<br>
<hr color="#C0C0C0" width="60%" size="1" align="left"><span style="font-size: 10.5pt">
　　<b>注释：</b><br>
　　[128]这个附言保存在迈尔1853年2月3日的信上。迈尔曾把这封信连同瑟美列从巴黎写给马克思的信一起转交给马克思并提出由他来转递马克思给瑟美列的回信。――第415页。<br>
