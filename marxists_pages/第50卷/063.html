<p class='title1'>马克思致阿舍尔公司[164]</p>

<center><b>伦敦</b></center>
<br>
<p align="right">　　［18］72年2月13日［于伦敦］</p>

　　随信附上我手头仅有的一份《成立宣言》<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：马克思《国际工人协会成立宣言》。――￥1￥编者注］</span></font>。<br>
