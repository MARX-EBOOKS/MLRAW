<p class='title1'>恩格斯致“施马尔特”公司</p>
<br>
<center><b>莱斯特</b><br>
<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：写在公司的信笺上。――￥1￥编者注］</span></font></center>
<br>
［<B>草稿</B>］<br>
<p align="right">　　［1872年7月3日于伦敦］</p>
　　格［拉泽］先生是个非常可敬的人，在布鲁塞尔很有名气，所以我相信，您会发现他在商务上永远是一个非常正派和讲信誉的人。据我所知，他没有丧失资产，假如我必须同他共事，我会毫不犹豫地给他开立一二百镑以内的信贷帐户。<br>
<br>
