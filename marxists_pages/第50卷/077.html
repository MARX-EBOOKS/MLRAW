<p class='title1'>恩格斯致瓦尔特・惠特<font size='3'>[184]</font></p>
<br>
<center><b>伦敦</b></center>
<br>
［<B>草稿</B>］<br>
<p align="right">　　［1873年6月24日于伦敦］</p>
阁下：<br>
　　为了答复您的询问，我冒昧地通知您，我认为德・摩尔根先生是个很正派的人，但我不能确切地说出他有多少资产。<br>
<br>
<br>

　　[184]1873年6月24日瓦・惠特请恩格斯介绍德・摩尔根作他的房客。这里是恩格斯对他的答复。――第454页。<br>
