<p class='title1'>马克思致查理・沃尔斯顿<br>
（瓦尔德施泰恩）</p>
<br>
<center><b>伦敦</b></center>
<br>
<p align="right">　　1880年1月26日［于伦敦］</p>
亲爱的瓦尔德霍恩：<br>
　　你如不在家，我就留下这个字条。如果天气好，我准备星期三晚上七点来，也就是说，不是冷得对我的corpus　delicti<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：文字游戏：“corpus”是机体，身体；“corpus　delicti”――犯罪构成。――￥1￥编者注］</span></font>的当时状况来说受不了，我就来。世上一切的诺言都是相对的。此致<br>
　　敬礼。<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
　　你的　<B>摩尔</B><br>
<br>
