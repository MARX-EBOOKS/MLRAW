<center><b>阿尔让台</b></center>
<br>

　　1881年8月20日于伦敦<br>

我亲爱的：<br>
　　上面歪歪曲曲潦草的字你大概看不清楚写了些什么<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：见本卷第528―529页。――￥1￥编者注］</span></font>。但重要的是：妈妈和海伦昨晚顺利到达了。<br>
