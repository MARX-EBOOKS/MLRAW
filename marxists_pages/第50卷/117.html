<p class='title1'>恩格斯致恩玛・恩格斯</p>
<br>
<center><b>圣莫里茨</b><br>
<font color="#003e00"><span style="FONT-SIZE: 10.5pt">［注：写在明信片上。――￥1￥编者注］</span></font></center>
<br>
<p align="right">　　［18］93年8月23日于阿尔普纳赫施达特</p>
亲爱的恩玛：<br>
　　我今天在此地，明天要到伯尔尼高地，一周后返回苏黎世。我希望你们大家在恩格丁健康愉快。<br>
　　向你们大家问好<br>
<br>
<center><b>［恩格斯在明信片上亲笔写的地址：］</b></center>
<br>
　　巴门（恩格耳斯基尔亨）的海尔曼・恩格斯太太<br>
　　贝来维旅馆<br>
　　圣莫里茨恩格丁浴场<br>
<br>
<br>
