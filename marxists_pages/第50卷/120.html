<p class='title1'>恩格斯致阿德尔海德・德沃夏克和尤利乌斯・波普</p>
<br>
<center><b>维也纳</b></center>
<br>
<p align="right">　　［1894年2月于伦敦］</p>
　　请您们，亲爱的阿德尔海德和波普，接受我的衷心的祝贺[232]；在我们周围有的是好榜样，我若不是一匹老跛马，谁晓得，我就不会再套上轭。<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
　　您的　老<B>弗・恩格斯</B><br>
<br>
