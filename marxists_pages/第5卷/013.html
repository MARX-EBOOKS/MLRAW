<p class='title1'>反动派</p>
<br>
<br>
　　<b>科伦</b>6月5日。愿死者安然升入天堂[29]。康普豪森先生背弃了革命，反动派竟敢建议妥协议会辱骂革命是暴乱。在6月3日的会议上有一个议员提议给3月18日死亡的士兵建立纪念碑。<br>
<br>
<br>
<div align="right"><table border="0" cellspacing="0" cellpadding="0"><tr><td style="line-height: 200%">
写于1848年6月5日<br>
载于1848年6月6日“新莱茵报”第6号<br>
原文是德文<br>
俄文译自“新莱茵报”<br>
俄译文第一次发表<br>
</td></tr></table></div>
<br>
<br>

　　<b>注释：</b><br><br>
　　[29]引自哥・奥・毕尔格尔的叙事诗“列诺尔”。――第41页。<br>
