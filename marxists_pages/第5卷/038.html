<p class='title1'>巴黎消息</p>
<br>
<br>
　　<b>科伦</b>6月24日晚10时。23日的巴黎邮件没有收到。据到达这里的信差说，当他离开巴黎的时候，群众跟国民自卫军的厮杀已经开始了，在离城不远的地方他曾听到猛烈的炮声。<br>
<br>
<br>
