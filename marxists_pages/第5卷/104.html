<p class='title1'>“新莱茵报”复刊</p>
<br>
<br>
　　大家为维持“新莱茵报”的存在而给予的援助（特别是在<b>科伦</b>），使我们得以克服戒严状态所造成的<b>财政</b>困难，使报纸得以复刊。编辑委员会原有成员不变。不久前<b>斐迪南・弗莱里格拉特</b>参加了编委会。<br>
<br>
