<p class='title1'>马克思就维也纳事件发表的谈话</p>
<p class='author'>（摘自1848年11月6日科伦工人联合会委员会会议记录）</p>
<br>
<br>
　　……主席马克思博士扼要地报告了维也纳事件的经过，并且特别强调指出，只是由于维也纳资产阶级屡次叛变，文迪施格雷茨才得以夺取该城……<br>
<br>
