<p class='title1'>声明</p>
<br>
<br>
　　<b>科伦</b>11月16日。11月16日“科伦日报”把“民主主义者莱茵区域委员会的呼吁书”和似乎由普鲁士国民议会极左派在各省散发的关于拒绝纳税的“<b>保证性的声明</b>”莫名其妙地联系在一起。我们对于极左派散布的国民议会已作出拒绝纳税的决定的消息毫无所闻，特此声明。<br>
<br>
