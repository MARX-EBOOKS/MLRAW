<p class='title1'>卡尔・马克思离开科伦</p>
<br>
<br>
　　<b>科伦</b>。昨天早晨，“新莱茵报”前总编辑卡尔・马克思先生同其他几个编辑一道离开了科伦，前往上莱茵河地区；在那里，他的活动将会像在这里一样卓有成效。<br>
<br>
