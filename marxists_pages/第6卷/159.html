<p class='title1'>译后记</p>
<br>
<br>
　　本卷中“雇佣劳动与资本”一文及“资产阶级和反革命”这一组文章中的第二篇是在“马克思恩格斯文选”两卷集中译文的基础上校订的。“民主的泛斯拉夫主义”、“匈牙利的斗争”、“‘科伦日报’论马扎尔人的斗争”、“匈牙利”这几篇文章在译校过程中参考了中央民族学院出版的“马克思恩格斯关于殖民地及民族问题的论著”一书中的译文。<br>
